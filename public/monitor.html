<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Monitor · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  body { background: var(--bg); }
  .mon-wrap { max-width: 1200px; margin: 0 auto; padding: var(--s-4) var(--s-4) var(--s-8); }

  /* Gate */
  .gate-wrap { max-width: 400px; margin: 80px auto; }

  /* Stats bar */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--s-3); margin-bottom: var(--s-4); }

  /* Map */
  .map-box { width: 100%; height: 500px; border-radius: var(--r-lg); border: 1px solid var(--border); overflow: hidden; background: #1a1a1a; margin-bottom: var(--s-4); }

  /* Monitor grid */
  .mon-grid { display: grid; grid-template-columns: 1fr 380px; gap: var(--s-5); }
  @media (max-width: 900px) { .mon-grid { grid-template-columns: 1fr; } }
  @media (max-width: 640px) {
    .map-box { height: 280px; border-radius: var(--r-md); }
    .stats-bar { grid-template-columns: repeat(2, 1fr); gap: var(--s-2); }
    .correction-row { grid-template-columns: 1fr; }
    .mon-wrap { padding: var(--s-3) var(--s-3) var(--s-6); }
  }

  /* Alerts */
  .alert-item { padding: var(--s-4); border-radius: var(--r-md); border: 1px solid var(--border); margin-bottom: var(--s-2); display: flex; gap: var(--s-3); align-items: flex-start; background: var(--surface); }
  .alert-item .alert-icon { font-size: 22px; flex-shrink: 0; }
  .alert-info { flex: 1; }
  .alert-info strong { font-size: 14px; }
  .alert-info .small { font-size: 12px; color: var(--ink-2); margin-top: 3px; }

  /* Correction form */
  .correction-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); }

  /* Dot legend */
  .legend { display: flex; flex-wrap: wrap; gap: var(--s-3); font-size: 12px; color: var(--ink-2); margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Live badge */
  .live-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 999px;
    background: rgba(76,175,80,0.15); color: #2E7D5B;
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  }
  .live-dot2 { width: 7px; height: 7px; border-radius: 50%; background: #5CB85C; animation: pulse 1.6s ease-in-out infinite; }

  /* Mapbox popup — force legible dark text regardless of page theme */
  .mapboxgl-popup-content {
    color: #1a1a1a !important;
    background: #fff !important;
    font-size: 13px !important;
    line-height: 1.5;
  }
  .mapboxgl-popup-content strong { color: #0a0a0a !important; }
  .mapboxgl-popup-content span   { color: #1a1a1a !important; }
  .mapboxgl-popup-content button { color: #333 !important; }

  /* Expandable team standings */
  .mon-team-row {
    display: flex; align-items: center; gap: var(--s-2);
    padding: 10px var(--s-3); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: background var(--t-fast);
  }
  .mon-team-row:hover { background: var(--surface-2); }
  .mon-team-row.is-open { background: var(--surface-2); }
  .mon-team-arrow { font-size: 10px; color: var(--ink-2); transition: transform var(--t-fast); min-width: 12px; }
  .mon-team-row.is-open .mon-team-arrow { transform: rotate(90deg); }
  .mon-team-body { display: none; border-bottom: 2px solid var(--border); }
  .mon-team-body.is-open { display: block; }
  .mon-player-row {
    display: flex; align-items: center; gap: var(--s-2);
    padding: 7px var(--s-3) 2px calc(var(--s-3) + 20px);
    font-size: 13px;
  }
  .mon-player-actions {
    display: flex; gap: var(--s-1);
    padding: 2px var(--s-3) 8px calc(var(--s-3) + 20px);
  }
</style>
</head>
<body>

<div id="gate-section">
  <div class="gate-wrap">
    <div class="card">
      <div class="text-center mb-4">
        <img src="https://jordgolf.com/cdn/shop/files/logo_4b5652a8-0699-40c3-978e-6a2dd03ba41d_small.svg?v=1738678077"
             alt="JORD Golf" style="height:56px;width:auto;margin:0 auto var(--s-3);display:block">
        <div class="brand-name">JORD GOLF</div>
        <div class="brand-sub">Tournament Monitor</div>
      </div>
      <form id="gate-form" class="col gap-3">
        <div class="field">
          <label for="pwd">Admin password</label>
          <input id="pwd" type="password" class="input input-lg" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary btn-lg btn-block" type="submit">Enter Monitor</button>
      </form>
      <div id="gate-err" class="text-danger mt-2 small text-center"></div>
    </div>
  </div>
</div>

<div id="mon-section" style="display:none">
  <!-- content rendered by JS -->
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="/js/jord.js"></script>
<script>
(function () {
  var eid = JORD.path(1);
  if (!eid) { document.getElementById('gate-section').innerHTML = '<div class="empty" style="padding:80px 24px"><div class="empty-icon">⚠️</div><div class="empty-title">No event ID</div><p>URL should be /monitor/EVENT_ID</p></div>'; return; }

  var map = null;
  var mapboxToken = '';
  var markers = {};
  var snap = null;
  var mapViewMode = 'active'; /* 'active' = teams still on hole | 'all' = everyone */
  var mapTeamFilter = null;   /* null = all teams; string = team name to focus */

  /* Persistent team color palette — assigned on first appearance, kept for session */
  var TEAM_COLORS = ['#E91E63','#2196F3','#FF9800','#9C27B0','#00BCD4','#FF5722','#4CAF50','#CDDC39','#795548','#607D8B','#F44336','#3F51B5'];
  var teamColorMap = {};
  var teamColorIdx = 0;
  function getTeamColor(name) {
    if (!teamColorMap[name]) teamColorMap[name] = TEAM_COLORS[teamColorIdx++ % TEAM_COLORS.length];
    return teamColorMap[name];
  }

  function setTeamFilter(teamName) {
    mapTeamFilter = teamName;
    var info = document.getElementById('map-filter-info');
    var nameEl = document.getElementById('map-filter-name');
    if (info) info.style.display = teamName ? 'flex' : 'none';
    if (nameEl) nameEl.textContent = teamName ? ('Focusing: ' + teamName) : '';
    document.querySelectorAll('.map-focus-btn').forEach(function (btn) {
      var active = btn.dataset.team === mapTeamFilter;
      btn.style.background = active ? 'var(--primary)' : 'transparent';
      btn.style.color = active ? '#0C2010' : 'var(--ink-2)';
      btn.style.borderColor = active ? 'var(--primary)' : 'var(--border)';
    });
    if (snap) updateMapDots(snap);
  }

  /* ── Gate ── */
  document.getElementById('gate-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var pwd = document.getElementById('pwd').value;
    JORD.setToken(pwd);
    JORD.api('/api/events/' + eid)
      .then(function () { enterMonitor(); })
      .catch(function () {
        JORD.clearToken();
        document.getElementById('gate-err').textContent = 'Wrong password.';
      });
  });

  if (JORD.getToken()) {
    JORD.api('/api/events/' + eid).then(function () { enterMonitor(); }).catch(function () { JORD.clearToken(); });
  }

  function enterMonitor() {
    document.getElementById('gate-section').style.display = 'none';
    var mon = document.getElementById('mon-section');
    mon.style.display = 'block';
    buildUI(mon);
    loadConfig();

    JORD.subscribe(eid, function (d) {
      snap = d;
      updateStats(d);
      updateAlerts(d.alerts || []);
      updateMapDots(d);
      document.getElementById('last-upd').textContent = 'Updated ' + new Date().toLocaleTimeString();
    });
  }

  /* ── UI skeleton ── */
  function buildUI(container) {
    JORD.renderTopbar('Tournament Monitor',
      JORD.el('div', { class: 'row gap-2' },
        JORD.el('div', { class: 'live-pill' }, JORD.el('div', { class: 'live-dot2' }), 'Live'),
        JORD.el('span', { id: 'last-upd', style: { fontSize: '12px', color: 'var(--ink-2)' } }, ''),
        JORD.el('button', { class: 'btn btn-ghost', on: { click: function () { JORD.clearToken(); location.reload(); } } }, 'Sign out')
      )
    );

    var wrap = document.createElement('div');
    wrap.className = 'mon-wrap';

    /* Event title */
    var heading = document.createElement('div');
    heading.style.marginBottom = 'var(--s-4)';
    heading.innerHTML = '<div class="hero-eyebrow">Monitor</div><h2 id="mon-title" class="mt-1">Loading…</h2>';
    wrap.appendChild(heading);

    /* Stats bar */
    var stats = document.createElement('div');
    stats.className = 'stats-bar';
    stats.id = 'stats-bar';
    ['scanned', 'total', 'alerts', 'teams'].forEach(function (k) {
      var s = document.createElement('div');
      s.className = 'stat';
      s.id = 'stat-' + k;
      s.innerHTML = '<div class="stat-label">' + k.charAt(0).toUpperCase() + k.slice(1) + '</div><div class="stat-value">—</div>';
      stats.appendChild(s);
    });
    wrap.appendChild(stats);

    /* Two-col grid */
    var grid = document.createElement('div');
    grid.className = 'mon-grid';

    /* Left: map + leaderboard */
    var left = document.createElement('div');

    /* Map */
    var mapCard = document.createElement('div');
    mapCard.className = 'card mb-4';

    /* Card header row: title + toggle */
    var mapHeader = document.createElement('div');
    mapHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);margin-bottom:var(--s-3);flex-wrap:wrap';

    var mapTitle = document.createElement('h3');
    mapTitle.className = 'card-title';
    mapTitle.style.margin = '0';
    mapTitle.textContent = 'Course Map — Ball Positions';
    mapHeader.appendChild(mapTitle);

    /* Toggle pill */
    var toggleWrap = document.createElement('div');
    toggleWrap.style.cssText = 'display:flex;gap:3px;background:var(--surface-2);border-radius:var(--r-md);padding:3px;flex-shrink:0';

    function makeToggleBtn(label, mode) {
      var btn = document.createElement('button');
      btn.textContent = label;
      btn.dataset.mode = mode;
      btn.style.cssText = 'font-size:12px;font-weight:600;padding:4px 12px;border-radius:calc(var(--r-md) - 2px);border:none;cursor:pointer;transition:background 0.15s,color 0.15s';
      function refresh() {
        if (mapViewMode === mode) {
          btn.style.background = 'var(--primary)';
          btn.style.color = '#fff';
        } else {
          btn.style.background = 'transparent';
          btn.style.color = 'var(--ink-2)';
        }
      }
      refresh();
      btn.addEventListener('click', function () {
        mapViewMode = mode;
        toggleWrap.querySelectorAll('button').forEach(function (b) {
          if (b.dataset.mode === mapViewMode) {
            b.style.background = 'var(--primary)'; b.style.color = '#fff';
          } else {
            b.style.background = 'transparent'; b.style.color = 'var(--ink-2)';
          }
        });
        if (snap) updateMapDots(snap);
      });
      return btn;
    }

    toggleWrap.appendChild(makeToggleBtn('On Hole', 'active'));
    toggleWrap.appendChild(makeToggleBtn('All Players', 'all'));
    mapHeader.appendChild(toggleWrap);

    /* Team filter indicator */
    var filterInfo = document.createElement('div');
    filterInfo.id = 'map-filter-info';
    filterInfo.style.cssText = 'display:none;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);flex-shrink:0';
    var filterName = document.createElement('span');
    filterName.id = 'map-filter-name';
    filterName.style.cssText = 'font-weight:600;color:var(--ink)';
    var allBtn = document.createElement('button');
    allBtn.textContent = '× All Teams';
    allBtn.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--ink-2);cursor:pointer';
    allBtn.addEventListener('click', function () { setTeamFilter(null); });
    filterInfo.appendChild(filterName);
    filterInfo.appendChild(allBtn);
    mapHeader.appendChild(filterInfo);
    mapCard.appendChild(mapHeader);

    var mapBox = document.createElement('div');
    mapBox.id = 'mon-map';
    mapBox.className = 'map-box';
    mapCard.appendChild(mapBox);

    var legend = document.createElement('div');
    legend.className = 'legend';
    legend.innerHTML = '<div class="legend-item"><div class="dot" style="background:var(--primary)"></div>Each color = one team</div>'
      + '<div class="legend-item"><div class="dot" style="background:#9E9E9E"></div>Not yet scanned</div>'
      + '<div class="legend-item" style="color:var(--ink-3)">Tap 📍 by a team name to focus map</div>';
    mapCard.appendChild(legend);

    left.appendChild(mapCard);

    /* Mini leaderboard */
    var lbCard = document.createElement('div');
    lbCard.className = 'card';
    lbCard.innerHTML = '<h3 class="card-title">Current Standings</h3><div id="mon-lb"></div>';
    left.appendChild(lbCard);
    grid.appendChild(left);

    /* Right panel */
    var right = document.createElement('div');

    /* Alerts */
    var alertCard = document.createElement('div');
    alertCard.className = 'card mb-4';
    alertCard.innerHTML = '<h3 class="card-title">🚨 Rep Alerts</h3><div id="alert-list"></div>';
    right.appendChild(alertCard);

    /* Admin correction */
    var corrCard = buildCorrectionCard();
    right.appendChild(corrCard);

    grid.appendChild(right);
    wrap.appendChild(grid);
    container.appendChild(wrap);
  }

  /* ── Load config (Mapbox token) ── */
  function loadConfig() {
    fetch('/api/config')
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        mapboxToken = cfg.mapbox_token || '';
        initMap();
      });
  }

  var mapCentered = false;

  /* ── Map ── */
  function initMap() {
    if (!mapboxToken) {
      document.getElementById('mon-map').innerHTML = '<div class="empty"><div class="empty-icon">🗺</div><div class="empty-title">Mapbox token missing</div><p>Add MAPBOX_TOKEN to .env</p></div>';
      return;
    }
    if (typeof mapboxgl === 'undefined') {
      document.getElementById('mon-map').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Mapbox failed to load</div><p>Check internet connection and try Ctrl+Shift+R.</p></div>';
      return;
    }
    mapboxgl.accessToken = mapboxToken;
    map = new mapboxgl.Map({
      container: 'mon-map',
      style: JORD.satelliteStyle(),
      center: [-98.5, 39.5],
      zoom: 4
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');
    map.once('error', function (e) {
      var status = e.status || (e.error && e.error.status);
      if (status === 401 || status === 403) {
        map.remove(); map = null;
        document.getElementById('mon-map').innerHTML = '<div class="empty"><div class="empty-icon">🔑</div><div class="empty-title">Mapbox token rejected (401)</div><p>Check token URL restrictions at account.mapbox.com/access-tokens</p></div>';
      }
    });
    map.once('load', function () {
      if (snap && !mapCentered) {
        centerMapOnCourse(snap.event || {});
      }
    });
  }

  function addZone(id, geojsonStr, color, opacity) {
    if (!geojsonStr || !map) return;
    try {
      var geo = JSON.parse(geojsonStr);
      var data = (geo.type === 'FeatureCollection' || geo.type === 'Feature') ? geo : { type: 'Feature', geometry: geo };
      var src = map.getSource(id);
      if (src) { src.setData(data); return; }
      map.addSource(id, { type: 'geojson', data: data });
      map.addLayer({ id: id+'-fill', type: 'fill',   source: id, paint: { 'fill-color': color, 'fill-opacity': opacity } });
      map.addLayer({ id: id+'-line', type: 'line',   source: id, paint: { 'line-color': color, 'line-width': 1.5, 'line-opacity': 0.8 } });
    } catch(e) {}
  }

  function updateZoneLayers(ev) {
    if (!map) return;
    function doZones() {
      addZone('mon-fairway',   ev.fairway_polygon,   '#3B82F6', 0.35);
      addZone('mon-rough',     ev.rough_polygon,     '#EAB308', 0.30);
      addZone('mon-oob',       ev.oob_polygon,       '#DC2626', 0.25);
      addZone('mon-green',     ev.green_polygon,     '#22C55E', 0.35);
      addZone('mon-ctp-green', ev.ctp_green_polygon, '#22C55E', 0.35);
    }
    if (map.isStyleLoaded()) { doZones(); } else { map.once('load', doZones); }
  }

  function centerMapOnCourse(ev) {
    if (!map || mapCentered) return;

    /* Collect every known location point for this hole */
    var points = [];
    (ev.tee_boxes || []).forEach(function (t) {
      if (t.lat && t.lon) points.push([t.lon, t.lat]);
    });
    if (ev.pin_lat && ev.pin_lon)         points.push([ev.pin_lon,     ev.pin_lat]);
    if (ev.ctp_pin_lat && ev.ctp_pin_lon) points.push([ev.ctp_pin_lon, ev.ctp_pin_lat]);
    if (!points.length) {
      /* No tee/pin data — fall back to stored venue coords or live geocode */
      if (ev.venue_lat && ev.venue_lon) {
        mapCentered = true;
        function doCenterVenue() {
          map.flyTo({ center: [ev.venue_lon, ev.venue_lat], zoom: 15, duration: 1200 });
        }
        if (map.isStyleLoaded()) { doCenterVenue(); } else { map.once('load', doCenterVenue); }
      } else if (ev.venue && mapboxToken) {
        mapCentered = true;
        fetch('https://api.mapbox.com/geocoding/v5/mapbox.places/' + encodeURIComponent(ev.venue) +
          '.json?access_token=' + mapboxToken + '&types=poi,place,address&limit=1')
          .then(function (r) { return r.json(); })
          .then(function (geo) {
            if (geo.features && geo.features[0]) {
              map.flyTo({ center: geo.features[0].center, zoom: 15, duration: 1200 });
            }
          }).catch(function () {});
      }
      return;
    }

    mapCentered = true;

    function doCenter() {
      if (points.length === 1) {
        map.flyTo({ center: points[0], zoom: 17 });
      } else {
        var bounds = points.reduce(function (b, p) {
          return b.extend(p);
        }, new mapboxgl.LngLatBounds(points[0], points[0]));
        map.fitBounds(bounds, { padding: 80, maxZoom: 18, duration: 1200 });
      }
    }

    /* Wait for style if it hasn't finished loading yet */
    if (map.isStyleLoaded()) {
      doCenter();
    } else {
      map.once('load', doCenter);
    }
  }

  function updateMapDots(d) {
    if (!map) return;
    var allBalls = [];
    ((d.ld || []).concat(d.cp || [])).forEach(function (team) {
      var teamColor = getTeamColor(team.team_name);
      var teamBalls = team.balls || [];
      if (mapViewMode === 'active' && teamBalls.length > 0 && teamBalls.every(function (b) { return b.scanned; })) return;
      teamBalls.forEach(function (b) { allBalls.push({ team: team.team_name, color: teamColor, ball: b }); });
    });

    Object.values(markers).forEach(function (m) { m.remove(); });
    markers = {};

    allBalls.forEach(function (item) {
      var b = item.ball;
      var lat = b.lat || b.lon ? b.lat : null;
      var lon = b.lat || b.lon ? b.lon : null;
      if (!lat || !lon) return;

      var dimmed = mapTeamFilter && item.team !== mapTeamFilter;
      var color = b.scanned ? item.color : '#9E9E9E';
      var el = document.createElement('div');
      el.style.cssText = 'width:14px;height:14px;border-radius:50%;background:' + color + ';border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);cursor:pointer;transition:opacity 0.2s;opacity:' + (dimmed ? '0.18' : '1');
      el.title = (b.player_name || b.drop_code) + ' — ' + item.team;

      var popup = new mapboxgl.Popup({ offset: 12 }).setHTML(
        '<div style="color:#1a1a1a;font-size:13px;line-height:1.6">'
        + '<strong style="color:#0a0a0a;display:block;margin-bottom:2px">' + (b.player_name || b.drop_code) + '</strong>'
        + '<span style="font-family:monospace;font-size:13px;font-weight:700;background:#e8e8e8;padding:1px 6px;border-radius:4px;color:#1a1a1a">' + b.drop_code + '</span><br>'
        + '<span style="color:#444">' + item.team + '</span><br>'
        + '<span style="color:#555">' + (b.location_type ? b.location_type : 'not scanned') + '</span><br>'
        + (b.final_yards != null ? '<span style="font-weight:600;color:#1a1a1a">' + b.final_yards + ' yd</span>' : b.distance_ft != null ? '<span style="font-weight:600;color:#1a1a1a">' + b.distance_ft + ' ft</span>' : '')
        + '<br><button onclick="var c=document.getElementById(\'corr-code\');if(c){c.value=\'' + b.drop_code + '\';c.closest(\'.card\').scrollIntoView({behavior:\'smooth\'});}" style="margin-top:6px;font-size:11px;padding:3px 8px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;color:#333">Fill correction form</button>'
        + '</div>'
      );

      var marker = new mapboxgl.Marker(el).setLngLat([lon, lat]).setPopup(popup).addTo(map);
      markers[b.drop_code] = marker;
    });

    /* Fit bounds — zoom to filtered team if active, otherwise fit all */
    if (mapTeamFilter) {
      var focused = allBalls.filter(function (item) { return item.team === mapTeamFilter && item.ball.lat && item.ball.lon; });
      if (focused.length === 1) {
        map.flyTo({ center: [focused[0].ball.lon, focused[0].ball.lat], zoom: 17 });
      } else if (focused.length > 1) {
        var fc = focused.map(function (item) { return [item.ball.lon, item.ball.lat]; });
        var fb = fc.reduce(function (b, c) { return b.extend(c); }, new mapboxgl.LngLatBounds(fc[0], fc[0]));
        map.fitBounds(fb, { padding: 80, maxZoom: 18 });
      }
    } else {
      var coords = Object.keys(markers).map(function (k) { return markers[k].getLngLat(); });
      if (coords.length > 1) {
        var bounds = coords.reduce(function (b, c) { return b.extend(c); }, new mapboxgl.LngLatBounds(coords[0], coords[0]));
        map.fitBounds(bounds, { padding: 60, maxZoom: 17 });
      }
    }
  }

  /* ── Stats ── */
  function updateStats(d) {
    var ev = d.event || {};
    centerMapOnCourse(ev);
    updateZoneLayers(ev);
    var title = document.getElementById('mon-title');
    if (title) title.textContent = ev.name || 'Tournament';

    var allBalls = [];
    (d.ld || []).forEach(function (t) { (t.balls || []).forEach(function (b) { allBalls.push(b); }); });

    var scanned = allBalls.filter(function (b) { return b.scanned; }).length;
    var teams   = (d.ld || d.cp || []).length;

    setStat('scanned', scanned + ' / ' + allBalls.length);
    setStat('total',   allBalls.length);
    setStat('alerts',  (d.alerts || []).length);
    setStat('teams',   (d.ld || d.cp || []).length);

    /* Mini leaderboard — expandable teams */
    var lb = document.getElementById('mon-lb');
    if (!lb) return;

    /* Preserve which teams are currently open across SSE refreshes */
    var openIds = {};
    lb.querySelectorAll('.mon-team-row.is-open').forEach(function (el) { openIds[el.dataset.teamId] = true; });

    lb.innerHTML = '';
    var rows = d.ld || d.cp || [];
    if (!rows.length) { lb.innerHTML = '<p class="text-muted small">No teams yet.</p>'; return; }
    var isLD = !!d.ld;

    rows.forEach(function (t) {
      var score = isLD ? (t.total_yards != null ? t.total_yards + ' yd' : '—') : (t.best_ft != null ? t.best_ft + ' ft' : '—');
      var scannedCnt = isLD ? (t.scanned_count + '/' + t.total_balls) : (t.scanned + '/' + t.total);

      /* Team header row */
      var tColor = getTeamColor(t.team_name);
      var teamRow = document.createElement('div');
      teamRow.className = 'mon-team-row' + (openIds[t.id] ? ' is-open' : '');
      teamRow.dataset.teamId = t.id;
      teamRow.innerHTML =
        '<span class="mon-team-arrow">▶</span>'
        + '<span style="width:10px;height:10px;border-radius:50%;background:' + tColor + ';flex-shrink:0;display:inline-block;margin-right:4px"></span>'
        + '<span style="min-width:24px;font-weight:700;color:var(--ink-2)">' + t.rank + '</span>'
        + '<span style="flex:1;font-weight:600">' + t.team_name + '</span>'
        + '<span style="font-family:var(--font-mono);font-weight:700;margin-right:var(--s-2)">' + score + '</span>'
        + '<span style="font-size:12px;color:var(--ink-2);margin-right:var(--s-2)">' + scannedCnt + '</span>'
        + '<button class="map-focus-btn" data-team="' + t.team_name.replace(/"/g, '&quot;') + '" title="Focus map on this team"'
        + ' style="font-size:11px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:' + (mapTeamFilter === t.team_name ? 'var(--primary)' : 'transparent') + ';color:' + (mapTeamFilter === t.team_name ? '#0C2010' : 'var(--ink-2)') + ';cursor:pointer;flex-shrink:0">📍</button>';
      teamRow.addEventListener('click', function () { teamRow.classList.toggle('is-open'); bodyDiv.classList.toggle('is-open'); });
      teamRow.querySelector('.map-focus-btn').addEventListener('click', function (e) {
        e.stopPropagation();
        setTeamFilter(mapTeamFilter === t.team_name ? null : t.team_name);
      });

      /* Expandable player body */
      var bodyDiv = document.createElement('div');
      bodyDiv.className = 'mon-team-body' + (openIds[t.id] ? ' is-open' : '');

      (t.balls || []).forEach(function (b) {
        var playerScore = isLD
          ? (b.final_yards != null ? b.final_yards + ' yd' : (b.scanned ? '0 yd' : '—'))
          : (b.distance_ft != null ? b.distance_ft + ' ft' : '—');
        var locBadge = b.location_type
          ? '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:var(--surface-2);margin-left:4px">' + b.location_type + '</span>'
          : '';

        var pRow = document.createElement('div');
        pRow.className = 'mon-player-row';
        pRow.innerHTML =
          '<span style="font-size:12px;color:var(--ink-2);min-width:16px">' + (b.player_index || '') + '</span>'
          + '<span style="flex:1;font-size:13px">' + (b.player_name || '<em style="color:var(--ink-2)">unregistered</em>') + '</span>'
          + '<span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);margin-right:var(--s-2)">' + b.drop_code + '</span>'
          + '<span style="font-size:12px;font-weight:600">' + playerScore + locBadge + '</span>';

        /* Action buttons row */
        var actRow = document.createElement('div');
        actRow.className = 'mon-player-actions';

        /* Fill correction form */
        var fillBtn = document.createElement('button');
        fillBtn.className = 'btn btn-ghost';
        fillBtn.style.cssText = 'font-size:11px;padding:3px 8px';
        fillBtn.textContent = 'Correct';
        fillBtn.addEventListener('click', function () {
          var c = document.getElementById('corr-code');
          if (c) { c.value = b.drop_code; c.closest('.card').scrollIntoView({ behavior: 'smooth' }); }
        });
        actRow.appendChild(fillBtn);

        /* Reset scan */
        if (b.scanned) {
          var rstBtn = document.createElement('button');
          rstBtn.className = 'btn btn-ghost';
          rstBtn.style.cssText = 'font-size:11px;padding:3px 8px;color:var(--danger);border-color:var(--danger)';
          rstBtn.textContent = '↺ Reset';
          rstBtn.addEventListener('click', async function () {
            var name = b.player_name || b.drop_code;
            if (!await JORD.confirm('Reset scan for ' + name + '? Clears yardage so they can scan again.', { okText: 'Reset scan', danger: true })) return;
            JORD.api('/api/events/' + eid + '/balls/' + b.drop_code + '/reset-scan', { method: 'PATCH', body: {} })
              .then(function () { JORD.success('↺ ' + name + ' scan reset'); })
              .catch(function (e) { JORD.error(e.message); });
          });
          actRow.appendChild(rstBtn);
        }

        bodyDiv.appendChild(pRow);
        bodyDiv.appendChild(actRow);
      });

      lb.appendChild(teamRow);
      lb.appendChild(bodyDiv);
    });
  }

  function setStat(id, val) {
    var el = document.querySelector('#stat-' + id + ' .stat-value');
    if (el) el.textContent = val;
  }

  /* ── Alerts ── */
  function updateAlerts(alerts) {
    var list = document.getElementById('alert-list');
    if (!list) return;
    list.innerHTML = '';
    if (!alerts.length) {
      list.innerHTML = '<div class="empty" style="padding:24px"><div class="empty-icon" style="font-size:28px">✅</div><div class="empty-title" style="font-size:16px">No open alerts</div></div>';
      return;
    }
    alerts.forEach(function (a) {
      var item = document.createElement('div');
      item.className = 'alert-item';
      item.innerHTML = '<div class="alert-icon">🚨</div>'
        + '<div class="alert-info">'
        + '<strong>' + (a.message || 'Player needs help') + '</strong>'
        + '<div class="small">' + [a.team_name, a.player_name, a.drop_code].filter(Boolean).join(' · ') + '</div>'
        + '<div class="small">' + JORD.fmt.datetime(a.created_at) + '</div>'
        + '</div>';
      var resolveBtn = document.createElement('button');
      resolveBtn.className = 'btn btn-ghost';
      resolveBtn.style.cssText = 'font-size:12px;padding:6px 10px;flex-shrink:0';
      resolveBtn.textContent = 'Resolve';
      resolveBtn.addEventListener('click', function () {
        JORD.api('/api/alerts/' + a.id + '/resolve', { method: 'PATCH' })
          .then(function () { JORD.success('Alert resolved'); })
          .catch(function () { JORD.error('Failed to resolve'); });
      });
      item.appendChild(resolveBtn);
      list.appendChild(item);
    });
  }

  /* ── Correction card ── */
  function buildCorrectionCard() {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<h3 class="card-title">Admin Correction</h3>'
      + '<p class="card-sub">Override a ball result.</p>';

    var gameField = document.createElement('div');
    gameField.className = 'field';
    gameField.innerHTML = '<label>Contest</label>';
    var gameSelect = document.createElement('select');
    gameSelect.className = 'select';
    gameSelect.innerHTML = '<option value="ld">Longest Drive</option><option value="cp">Closest to Pin</option>';
    gameField.appendChild(gameSelect);

    var codeField = document.createElement('div');
    codeField.className = 'field';
    codeField.innerHTML = '<label>Drop Code</label>';
    var codeInput = document.createElement('input');
    codeInput.id = 'corr-code';
    codeInput.className = 'input input-code'; codeInput.placeholder = 'ABC123';
    codeInput.addEventListener('input', function () { codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); });
    codeField.appendChild(codeInput);

    var scoreField = document.createElement('div');
    scoreField.className = 'field';
    scoreField.innerHTML = '<label>Distance Drove <span style="font-weight:400;color:var(--ink-2)">(raw yards — penalty will be subtracted)</span></label>';
    var scoreInput = document.createElement('input');
    scoreInput.className = 'input'; scoreInput.type = 'number'; scoreInput.placeholder = '0';
    scoreField.appendChild(scoreInput);

    var penField = document.createElement('div');
    penField.className = 'field';
    penField.innerHTML = '<label>Penalty yards (LD only)</label>';
    var penInput = document.createElement('input');
    penInput.className = 'input'; penInput.type = 'number'; penInput.placeholder = '0'; penInput.value = '0';
    penField.appendChild(penInput);

    var locField = document.createElement('div');
    locField.className = 'field';
    locField.innerHTML = '<label>Location type</label>';
    var locSelect = document.createElement('select');
    locSelect.className = 'select';
    locSelect.innerHTML = '<option value="fairway">Fairway</option><option value="rough">Rough</option><option value="oob">OOB</option><option value="lost">Lost</option><option value="manual">Manual</option>';
    locField.appendChild(locSelect);

    var reasonField = document.createElement('div');
    reasonField.className = 'field';
    reasonField.innerHTML = '<label>Reason</label>';
    var reasonInput = document.createElement('input');
    reasonInput.className = 'input'; reasonInput.placeholder = 'e.g. GPS drift corrected by marshal';
    reasonField.appendChild(reasonInput);

    var submitBtn = document.createElement('button');
    submitBtn.className = 'btn btn-accent btn-block mt-3';
    submitBtn.textContent = 'Apply Correction';
    var errEl = document.createElement('div');
    errEl.className = 'text-danger mt-2 small';

    submitBtn.addEventListener('click', function () {
      var code = codeInput.value.trim().toUpperCase();
      if (!code || !scoreInput.value) { errEl.textContent = 'Enter code and score.'; return; }
      submitBtn.disabled = true; submitBtn.textContent = 'Applying…';

      JORD.api('/api/admin/correct', {
        method: 'POST',
        body: {
          drop_code: code, event_id: eid, game: gameSelect.value,
          final_yards: parseFloat(scoreInput.value) || 0,
          penalty_yards: parseFloat(penInput.value) || 0,
          location_type: locSelect.value,
          reason: reasonInput.value
        }
      })
      .then(function () {
        JORD.success('✅ Code ' + code + ' updated successfully');
        codeInput.value = ''; scoreInput.value = ''; penInput.value = '0'; reasonInput.value = '';
        errEl.textContent = '';
        submitBtn.disabled = false; submitBtn.textContent = 'Apply Correction';
      })
      .catch(function (e) {
        errEl.textContent = e.message || 'Error';
        submitBtn.disabled = false; submitBtn.textContent = 'Apply Correction';
      });
    });

    /* Reset scan button — clears yardage so player can scan again */
    var resetBtn = document.createElement('button');
    resetBtn.className = 'btn btn-ghost btn-block mt-2';
    resetBtn.style.cssText = 'color:var(--danger);border-color:var(--danger)';
    resetBtn.textContent = '↺ Reset Scan (let player scan again)';
    resetBtn.addEventListener('click', async function () {
      var code = codeInput.value.trim().toUpperCase();
      if (!code) { errEl.textContent = 'Enter a drop code first.'; return; }
      if (!await JORD.confirm('Reset scan for ' + code + '? This clears their yardage so they can scan again.', { okText: 'Reset scan', danger: true })) return;
      resetBtn.disabled = true; resetBtn.textContent = 'Resetting…';
      JORD.api('/api/events/' + eid + '/balls/' + code + '/reset-scan', {
        method: 'PATCH',
        body: { game: gameSelect.value }
      })
      .then(function () {
        JORD.success('✅ Scan reset — ' + code + ' can scan again');
        codeInput.value = ''; errEl.textContent = '';
        resetBtn.disabled = false; resetBtn.textContent = '↺ Reset Scan (let player scan again)';
      })
      .catch(function (e) {
        errEl.textContent = e.message || 'Error';
        resetBtn.disabled = false; resetBtn.textContent = '↺ Reset Scan (let player scan again)';
      });
    });

    card.appendChild(gameField);
    card.appendChild(codeField);
    card.appendChild(scoreField);
    card.appendChild(penField);
    card.appendChild(locField);
    card.appendChild(reasonField);
    card.appendChild(submitBtn);
    card.appendChild(resetBtn);
    card.appendChild(errEl);
    return card;
  }
})();
</script>
</body>
</html>
