<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Scorecard · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  .sc-wrap { max-width:560px; margin:0 auto; padding:0 var(--s-3) var(--s-8); }
  .sc-head { text-align:center; padding:var(--s-5) 0 var(--s-3); }
  .sc-head h1 { font-family:var(--font-display); font-size:1.5rem; letter-spacing:-0.02em; }
  .sc-head .mini { color:var(--ink-2); font-size:13px; }
  .hole-nav { display:flex; align-items:center; justify-content:space-between; gap:var(--s-2);
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--s-3) var(--s-4); margin-bottom:var(--s-4); }
  .hole-nav .hole-no { font-family:var(--font-display); font-size:2.2rem; line-height:1; }
  .hole-nav .hole-meta { font-size:12px; color:var(--ink-2); text-align:center; }
  .hole-nav button { width:46px; height:46px; border-radius:50%; border:1px solid var(--border-2);
    background:var(--surface); font-size:20px; cursor:pointer; }
  .hole-nav button:disabled { opacity:.35; }
  .p-row { display:flex; align-items:center; gap:var(--s-3); padding:12px 14px; border:1px solid var(--border);
    border-radius:var(--r-sm); background:var(--surface); margin-bottom:var(--s-2); }
  .p-row .p-name { flex:1; font-weight:600; }
  .p-row .p-name small { display:block; font-weight:400; color:var(--ink-3); font-size:11px; }
  .strokes { color:var(--accent); font-weight:700; letter-spacing:1px; }
  .stepper { display:flex; align-items:center; gap:8px; }
  .stepper button { width:40px; height:40px; border-radius:50%; border:1px solid var(--border-2);
    background:var(--surface); font-size:20px; font-weight:700; cursor:pointer; }
  .stepper .val { width:48px; height:48px; text-align:center;
    font-family:var(--font-display); font-size:1.6rem; line-height:48px;
    display:inline-block; position:relative; box-sizing:border-box; }
  .stepper .val.empty { color:var(--ink-3); }

  /* ── Golf scorecard shapes around the score number ──────────────────
   * Classic paper-scorecard conventions:
   *   eagle / albatross (≤ −2) → double circle, red
   *   birdie       (−1)        → single circle, red
   *   par          ( 0)        → no shape
   *   bogey        (+1)        → single square, blue
   *   double+      (+2 or more) → double square, blue
   */
  .stepper .val.s-birdie,
  .stepper .val.s-eagle  { color:#A12C2C; }
  .stepper .val.s-bogey,
  .stepper .val.s-double { color:#1F3F7A; }
  .stepper .val.s-birdie::before,
  .stepper .val.s-eagle::before {
    content:''; position:absolute; inset:5px; border:2px solid currentColor;
    border-radius:50%; pointer-events:none;
  }
  .stepper .val.s-eagle::after {
    content:''; position:absolute; inset:1px; border:2px solid currentColor;
    border-radius:50%; pointer-events:none;
  }
  .stepper .val.s-bogey::before,
  .stepper .val.s-double::before {
    content:''; position:absolute; inset:5px; border:2px solid currentColor;
    border-radius:3px; pointer-events:none;
  }
  .stepper .val.s-double::after {
    content:''; position:absolute; inset:1px; border:2px solid currentColor;
    border-radius:3px; pointer-events:none;
  }
  .vs-par { font-size:11px; font-weight:700; min-width:34px; text-align:center; }
  .vs-par.under { color:#4A7A53; } .vs-par.over { color:var(--danger); }
  .offline-banner { background:var(--danger); color:#fff; text-align:center; padding:8px; font-size:13px; font-weight:600; }
  .sync-note { text-align:center; font-size:12px; color:var(--ink-3); margin-top:var(--s-3); }
  .hole-dots { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-bottom:var(--s-4); }
  .hole-dots span { width:22px; height:22px; border-radius:6px; font-size:11px; display:flex; align-items:center;
    justify-content:center; border:1px solid var(--border); cursor:pointer; color:var(--ink-2); }
  .hole-dots span.done { background:var(--primary); color:var(--primary-ink); border-color:var(--primary); }
  .hole-dots span.current { outline:2px solid var(--accent); }
  .gate { text-align:center; padding:var(--s-8) var(--s-4); }

  /* Per-player stroke-allocation breakdown (v3.62.2) — shown for team-card
   * formats (scramble / foursomes / chapman) so the scorecard makes it
   * clear which individual on the team is getting strokes on THIS hole. */
  .members-list { margin-top:8px; padding-top:8px; border-top:1px dashed var(--border);
    display:flex; flex-direction:column; gap:6px; }
  .members-list .m-row { display:flex; align-items:center; justify-content:space-between;
    gap:var(--s-2); font-size:12.5px; color:var(--ink-2); }
  .members-list .m-row .m-name { font-weight:600; color:var(--ink); }
  .members-list .m-row .m-hcp  { color:var(--ink-3); font-size:11px; margin-left:4px; }
  .members-list .m-row .m-strokes { color:var(--accent); font-weight:700; letter-spacing:1px;
    font-size:13px; min-width:42px; text-align:right; }
  .members-list .m-row .m-strokes.zero { color:var(--ink-3); font-weight:400; }

  /* All-strokes-this-hole panel — sits between the hole nav and player rows,
   * shows hole metadata + stroke recipients for everyone. */
  .strokes-banner { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm);
    padding:10px 14px; margin-bottom:var(--s-3); font-size:13px; }
  .strokes-banner .sb-title { font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:700;
    color:var(--ink-3); margin-bottom:4px; }
  .strokes-banner .sb-line { color:var(--ink-2); }
  .strokes-banner .sb-line .strk { color:var(--accent); font-weight:700; }

  /* Per-hole side-event capture (v3.62) — used by Snake / BBB / Dots. */
  .events-panel { margin-top:var(--s-3); padding:14px 12px; background:#FFFCF2;
    border:1px solid var(--accent); border-radius:var(--r-lg); }
  .events-panel h3 { font-family:var(--font-display); font-size:0.95rem; margin:0 0 8px; letter-spacing:-.005em; }
  .events-panel .ev-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:6px; }
  .events-panel .ev-row .ev-lbl { font-size:13px; font-weight:600; min-width:70px; }
  .events-panel .ev-pick { display:flex; flex-wrap:wrap; gap:4px; }
  .events-panel .ev-btn { padding:6px 10px; border-radius:var(--r-pill); font-size:12.5px; font-weight:600;
    border:1px solid var(--border-2); background:var(--surface); cursor:pointer; }
  .events-panel .ev-btn:hover { border-color:var(--accent); }
  .events-panel .ev-btn.is-on { background:var(--ink); color:var(--surface); border-color:var(--ink); }
  .events-panel .ev-section + .ev-section { margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); }
</style>
</head>
<body>
<div id="offline" class="offline-banner" style="display:none">⚠ Offline — scores are saved on this phone and will sync automatically.</div>
<div class="sc-wrap" id="app"></div>
<script src="/js/jord.js"></script>
<script>
const $ = (s,r=document)=>r.querySelector(s);
const esc = JORD.escapeHtml;
const roundId = location.pathname.split('/').pop();
const LS_KEY = 'jord_sc_'+roundId;

const state = {
  round:null, tournament:null, course:null, entries:[],
  holes:[],            // par/SI per hole (from first entry's tee, fallback)
  hole:1,
  scores:{},           // { entryId: { hole: strokes } }
  dirty:new Set(),     // "entryId|hole"
  // v3.62 — per-hole side-game events. eventsByHole[hole][entryId] is an
  // array of { id, event_key } records. Used to render the toggle UI and
  // tally Snake / BBB / Dots locally without re-fetching.
  eventsByHole:{},
  // The active scoring engines that need event capture for THIS round —
  // populated after we load tournament metadata + side-bets.
  eventEngines:[],     // e.g. ['bbb'] or ['dots','snake']
  dotsEvents:null,     // setting list for Dots, if it's an active engine
};
let syncTimer=null;

/* ─── local persistence ───────────────────────────────────────────── */
function saveLocal() {
  localStorage.setItem(LS_KEY, JSON.stringify({ scores:state.scores, dirty:[...state.dirty] }));
}
function loadLocal() {
  try {
    const c = JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if (c.scores) state.scores = c.scores;
    if (c.dirty)  state.dirty  = new Set(c.dirty);
  } catch {}
}

/* ─── sync ─────────────────────────────────────────────────────────── */
async function sync() {
  if (!state.dirty.size) return;
  const batch = [...state.dirty].map(k => {
    const [entry_id,hole] = k.split('|');
    return { entry_id, hole_number:+hole, strokes: state.scores[entry_id]?.[hole] ?? null };
  });
  try {
    await JORD.api(`/api/rounds/${roundId}/scores`,{method:'POST',body:{scores:batch,entered_by:'scorecard'}});
    state.dirty.clear(); saveLocal();
    $('#offline').style.display='none';
    renderSyncNote();
  } catch(e) {
    $('#offline').style.display='block';   // keep dirty, retry later
  }
}
function queueSync(){ clearTimeout(syncTimer); syncTimer=setTimeout(sync,700); }
window.addEventListener('online', sync);
setInterval(sync, 20000);

/* ─── score helpers ────────────────────────────────────────────────── */
function getScore(entryId,hole){ return state.scores[entryId]?.[hole] ?? null; }
function setScore(entryId,hole,val) {
  if (!state.scores[entryId]) state.scores[entryId]={};
  if (val==null) delete state.scores[entryId][hole];
  else state.scores[entryId][hole]=val;
  state.dirty.add(entryId+'|'+hole);
  saveLocal(); queueSync();
}
function holePar(hole){ const h=state.holes.find(x=>x.hole_number===hole); return h?h.par:4; }
/** Class name for the paper-scorecard shape around a score:
 *  s-eagle (≤ −2): double red circle
 *  s-birdie (−1):   single red circle
 *  par (0):         no shape
 *  s-bogey (+1):    single blue square
 *  s-double (+2+):  double blue square
 */
function scoreShape(strokes, par) {
  if (strokes == null || par == null) return '';
  const d = strokes - par;
  if (d <= -2) return 's-eagle';
  if (d === -1) return 's-birdie';
  if (d === 1)  return 's-bogey';
  if (d >= 2)   return 's-double';
  return '';
}

/* Strokes a player receives on one hole — WHS stroke-index allocation.
   Matches lib/handicap.js. Positive courseHcp = strokes given to player on
   hardest holes first; negative (plus handicap) = strokes given back on
   easiest holes. */
function strokesOnHole(courseHcp, strokeIndex, totalHoles) {
  if (courseHcp == null || !totalHoles) return 0;
  const sign = courseHcp >= 0 ? 1 : -1;
  const abs  = Math.abs(courseHcp);
  const base = Math.floor(abs / totalHoles);
  const rem  = abs % totalHoles;
  const si   = Number(strokeIndex) || totalHoles;
  let extra = 0;
  if (sign >= 0) { if (si <= rem) extra = 1; }
  else            { if (si > totalHoles - rem) extra = 1; }
  return sign * (base + extra);
}

/* ─── render ───────────────────────────────────────────────────────── */
function renderGate(msg,icon){
  $('#app').innerHTML = `<div class="gate"><div style="font-size:48px">${icon}</div>
    <h1 style="font-family:var(--font-display);margin:var(--s-3) 0">${esc(msg)}</h1></div>`;
}

function render() {
  const r=state.round, hole=state.hole, par=holePar(hole);
  const h=state.holes.find(x=>x.hole_number===hole)||{};
  const first=state.holes[0]?.hole_number||1, last=state.holes[state.holes.length-1]?.hole_number||18;
  $('#app').innerHTML = `
    <div class="sc-head">
      <h1>${esc(state.tournament?.name||'Round')}</h1>
      <div class="mini">${state.course?esc(state.course.name):''} · Round ${r.round_number}</div>
    </div>
    <div class="hole-dots" id="dots"></div>
    <div class="hole-nav">
      <button id="prev" ${hole<=first?'disabled':''}>‹</button>
      <div><div class="hole-no" style="text-align:center">${hole}</div>
        <div class="hole-meta">PAR ${par}${h.stroke_index?` · SI ${h.stroke_index}`:''}${h.yardage?` · ${h.yardage} yds`:''}</div></div>
      <button id="next" ${hole>=last?'disabled':''}>›</button>
    </div>
    <div id="strokesBanner"></div>
    <div id="players"></div>
    <div id="events"></div>
    <div class="sync-note" id="syncNote"></div>`;

  $('#prev').onclick=()=>{ state.hole=Math.max(first,hole-1); render(); };
  $('#next').onclick=()=>{ state.hole=Math.min(last,hole+1); render(); };
  renderDots(); renderStrokesBanner(); renderPlayers(); renderEvents(); renderSyncNote();
}

// Lists every player getting at least one handicap stroke on THIS hole so
// the group can see at a glance who's getting help. For team-card formats
// it pulls from the team members (each individual on the pair / scramble
// gets their own stroke allocation even though they play one ball).
function renderStrokesBanner() {
  const el = $('#strokesBanner'); if (!el) return;
  const totalHoles = state.holes.length || 18;
  const h = state.holes.find(x => x.hole_number === state.hole) || {};
  const si = h.stroke_index;
  // Gather (name, strokes) tuples from every entry + team member.
  const recipients = [];
  for (const e of state.entries) {
    if (Array.isArray(e.members) && e.members.length) {
      // Team-card: the team plays one ball but each player has their own HCP.
      for (const m of e.members) {
        const stk = strokesOnHole(m.course_handicap, si, totalHoles);
        if (stk > 0) recipients.push({ name: m.player_name, stk });
      }
    } else {
      const stk = strokesOnHole(e.course_handicap, si, totalHoles);
      if (stk > 0) recipients.push({ name: e.player_name, stk });
    }
  }
  if (!recipients.length) {
    el.innerHTML = `<div class="strokes-banner">
      <div class="sb-title">Strokes given on this hole</div>
      <div class="sb-line">None — everyone plays scratch this hole.${si ? ` SI ${si}.` : ''}</div>
    </div>`;
    return;
  }
  // Sort highest-strokes first
  recipients.sort((a, b) => b.stk - a.stk);
  el.innerHTML = `<div class="strokes-banner">
    <div class="sb-title">Strokes given on this hole${si ? ` · SI ${si}` : ''}</div>
    <div class="sb-line">${recipients.map(r =>
      `<span class="strk">+${r.stk}</span> ${esc(r.name)}`).join(' · ')}</div>
  </div>`;
}

function renderDots() {
  $('#dots').innerHTML = state.holes.map(h=>{
    const done = state.entries.every(e=>getScore(e.id,h.hole_number)!=null);
    return `<span class="${done?'done':''} ${h.hole_number===state.hole?'current':''}" data-h="${h.hole_number}">${h.hole_number}</span>`;
  }).join('');
  $('#dots').querySelectorAll('[data-h]').forEach(s=>s.onclick=()=>{ state.hole=+s.dataset.h; render(); });
}

// ── Per-hole side events (Snake / BBB / Dots) ──────────────────────
// Quick-tap UI shown below the per-player score rows. Persists each event
// to /api/rounds/:id/hole-events. Multi-select where it makes sense
// (a player can have multiple Dots events on one hole).
function eventsForCurrentHole() {
  return state.eventsByHole[state.hole] || {};
}
function hasEventEngine(key) { return state.eventEngines.includes(key); }

async function addHoleEvent(entryId, eventKey) {
  try {
    const r = await JORD.api(`/api/rounds/${roundId}/hole-events`, {
      method: 'POST',
      body: { entry_id: entryId, hole_number: state.hole, event_key: eventKey },
    });
    const list = state.eventsByHole[state.hole] || (state.eventsByHole[state.hole] = {});
    const slot = list[entryId] || (list[entryId] = []);
    slot.push({ id: r.id, event_key: eventKey });
    renderEvents();
  } catch (e) { JORD.error && JORD.error(e.message || 'Could not save event'); }
}
async function removeHoleEvent(entryId, eventId) {
  try {
    await JORD.api(`/api/rounds/${roundId}/hole-events/${eventId}`, { method: 'DELETE' });
    const slot = state.eventsByHole[state.hole]?.[entryId] || [];
    const i = slot.findIndex(ev => ev.id === eventId);
    if (i >= 0) slot.splice(i, 1);
    renderEvents();
  } catch (e) { JORD.error && JORD.error(e.message || 'Could not remove event'); }
}
// Single-winner events (Bingo/Bango/Bongo): clear any existing winner on this
// hole for the event, then set the new one. The 'select-one-of-N' pattern.
async function setSingleWinner(eventKey, entryId) {
  const list = state.eventsByHole[state.hole] || {};
  for (const [eid, slot] of Object.entries(list)) {
    for (const ev of slot.slice()) {
      if (ev.event_key === eventKey) await removeHoleEvent(eid, ev.id);
    }
  }
  if (entryId) await addHoleEvent(entryId, eventKey);
}

function renderEvents() {
  const wrap = document.getElementById('events');
  if (!wrap) return;
  if (!state.eventEngines.length) { wrap.innerHTML = ''; return; }
  const evs = eventsForCurrentHole();
  // Helper — was this player tagged with `key` on the current hole?
  const has = (entryId, key) => (evs[entryId] || []).some(ev => ev.event_key === key);
  // Count of `key` events for this player on this hole (Dots can repeat).
  const countOf = (entryId, key) => (evs[entryId] || []).filter(ev => ev.event_key === key).length;
  const eventId = (entryId, key) => (evs[entryId] || []).find(ev => ev.event_key === key)?.id;

  const sections = [];

  if (hasEventEngine('bbb')) {
    const pick = (key, label) => `
      <div class="ev-row">
        <span class="ev-lbl">${label}</span>
        <div class="ev-pick">
          ${state.entries.map(e => `<button class="ev-btn ${has(e.id, key)?'is-on':''}" data-bbb="${key}" data-eid="${e.id}">${esc(e.player_name.split(' ')[0])}</button>`).join('')}
        </div>
      </div>`;
    sections.push(`<div class="ev-section"><h3>Bingo Bango Bongo</h3>
      ${pick('bingo', '🟢 Bingo')}
      ${pick('bango', '🎯 Bango')}
      ${pick('bongo', '🥁 Bongo')}
    </div>`);
  }

  if (hasEventEngine('snake')) {
    sections.push(`<div class="ev-section"><h3>🐍 Snake — three-putt</h3>
      <div class="ev-row"><span class="ev-lbl">3-putt:</span>
        <div class="ev-pick">
          ${state.entries.map(e => `<button class="ev-btn ${has(e.id, 'three_putt')?'is-on':''}" data-snake="${e.id}">${esc(e.player_name.split(' ')[0])}</button>`).join('')}
        </div>
      </div>
    </div>`);
  }

  if (hasEventEngine('dots') && state.dotsEvents && state.dotsEvents.length) {
    const rows = state.entries.map(e => `
      <div class="ev-row">
        <span class="ev-lbl">${esc(e.player_name.split(' ')[0])}</span>
        <div class="ev-pick">
          ${state.dotsEvents.map(ev => `
            <button class="ev-btn ${has(e.id, ev.key)?'is-on':''}" data-dot="${ev.key}" data-eid="${e.id}" title="${esc(ev.label)} (${ev.points} pts)">
              ${esc(ev.label.split(' ')[0])}${countOf(e.id, ev.key) > 1 ? ` ×${countOf(e.id, ev.key)}` : ''}
            </button>`).join('')}
        </div>
      </div>`).join('');
    sections.push(`<div class="ev-section"><h3>🎰 Dots</h3>${rows}</div>`);
  }

  wrap.innerHTML = `<div class="events-panel">${sections.join('')}</div>`;

  // Wire BBB single-winner picks
  wrap.querySelectorAll('[data-bbb]').forEach(b => b.onclick = () =>
    setSingleWinner(b.dataset.bbb, has(b.dataset.eid, b.dataset.bbb) ? null : b.dataset.eid));
  // Wire Snake toggles (per-player on/off)
  wrap.querySelectorAll('[data-snake]').forEach(b => b.onclick = () => {
    const id = b.dataset.snake;
    const existing = eventId(id, 'three_putt');
    if (existing) removeHoleEvent(id, existing);
    else addHoleEvent(id, 'three_putt');
  });
  // Wire Dots toggles (multi-add: each tap adds another; long-press to remove)
  wrap.querySelectorAll('[data-dot]').forEach(b => b.onclick = () => {
    const id = b.dataset.eid, key = b.dataset.dot;
    // Toggle: if already tagged, remove the most recent; else add one.
    const existing = eventId(id, key);
    if (existing) removeHoleEvent(id, existing);
    else addHoleEvent(id, key);
  });
}

function renderPlayers() {
  const hole=state.hole, par=holePar(hole);
  const h = state.holes.find(x=>x.hole_number===hole) || {};
  const totalHoles = state.holes.length || 18;
  $('#players').innerHTML = state.entries.map(e=>{
    const v=getScore(e.id,hole);
    const diff = v!=null ? v-par : null;
    const diffTxt = diff==null?'':(diff===0?'E':(diff>0?'+'+diff:diff));
    const stk = strokesOnHole(e.course_handicap, h.stroke_index, totalHoles);
    const dots = stk > 0 ? '●'.repeat(Math.min(stk,3)) : '';
    const teamHcpLabel = e.course_handicap != null
      ? ` <span class="m-hcp">CH ${e.course_handicap}</span>` : '';
    const strokeMeta = stk > 0
      ? `<span class="strokes" title="${Array.isArray(e.members) && e.members.length ? 'Team' : 'Player'} gets ${stk} handicap stroke${stk>1?'s':''} on this hole">${dots} +${stk}</span>` : '';
    const groupPart = e.group_name && e.group_name !== e.player_name ? esc(e.group_name) : '';
    // For team-card formats (scramble / foursomes / chapman), break out every
    // member of the team with their own handicap + per-hole stroke allocation.
    let membersHTML = '';
    if (Array.isArray(e.members) && e.members.length) {
      membersHTML = `<div class="members-list">${e.members.map(m => {
        const ms = strokesOnHole(m.course_handicap, h.stroke_index, totalHoles);
        const mDots = ms > 0 ? '●'.repeat(Math.min(ms, 3)) : '';
        return `<div class="m-row">
          <div><span class="m-name">${esc(m.player_name)}</span><span class="m-hcp">HCP ${m.handicap_index != null ? m.handicap_index : '—'} · CH ${m.course_handicap ?? '—'}</span></div>
          <div class="m-strokes ${ms === 0 ? 'zero' : ''}">${ms > 0 ? `${mDots} +${ms}` : '—'}</div>
        </div>`;
      }).join('')}</div>`;
    }
    return `<div class="p-row" style="${membersHTML ? 'flex-direction:column;align-items:stretch' : ''}">
      <div style="display:flex;align-items:center;gap:var(--s-3);width:100%">
        <div class="p-name" style="flex:1">${esc(e.player_name)}${teamHcpLabel}<small>${groupPart}${groupPart && strokeMeta ? ' · ' : ''}${strokeMeta}</small></div>
        <div class="vs-par ${diff<0?'under':diff>0?'over':''}">${diffTxt}</div>
        <div class="stepper">
          <button data-dec="${e.id}">−</button>
          <div class="val ${v==null?'empty':scoreShape(v,par)}">${v==null?'–':v}</div>
          <button data-inc="${e.id}">+</button>
        </div>
      </div>
      ${membersHTML}
    </div>`;
  }).join('');
  $('#players').querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>{
    const v=getScore(b.dataset.inc,hole);
    setScore(b.dataset.inc,hole, v==null?par:Math.min(20,v+1)); renderPlayers(); renderDots();
  });
  $('#players').querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>{
    const v=getScore(b.dataset.dec,hole);
    if (v==null) return;
    setScore(b.dataset.dec,hole, v<=1?null:v-1); renderPlayers(); renderDots();
  });
}

function renderSyncNote() {
  const n=$('#syncNote'); if(!n) return;
  n.textContent = state.dirty.size ? `Saving ${state.dirty.size} change(s)…` : 'All scores saved ✓';
}

/* ─── boot ─────────────────────────────────────────────────────────── */
async function init() {
  loadLocal();
  let data;
  try { data = await JORD.api('/api/rounds/'+roundId); }
  catch(e){ renderGate('Round not found','🔍'); return; }

  state.round=data.round; state.tournament=data.tournament;
  state.course=data.course; state.entries=data.entries;

  // v3.62 — determine which event-based engines are active for this round.
  // The primary format's engine + every side-bet's engine count. If any of
  // them is bbb / dots / snake, the side-events panel is shown on the
  // scorecard. Also pull the Dots event list so the buttons match the
  // organizer's configured points.
  try {
    const trn = await JORD.api('/api/tournaments/'+data.round.tournament_id);
    const engines = new Set();
    const primaryFmt = data.round.format;
    const primaryEng = ({
      stroke_gross:'stroke', stroke_net:'stroke', stableford:'stableford',
      skins:'skins', erado:'erado', duplicate:'duplicate',
      bingo_bango_bongo:'bbb', dots:'dots', snake:'snake',
    })[primaryFmt] || primaryFmt;
    if (['bbb','dots','snake'].includes(primaryEng)) engines.add(primaryEng);
    for (const sb of (trn.side_bets || [])) {
      const sbEng = ({ bingo_bango_bongo:'bbb', dots:'dots', snake:'snake', skins:'skins' })[sb.format_id];
      if (['bbb','dots','snake'].includes(sbEng)) engines.add(sbEng);
    }
    state.eventEngines = [...engines];
    // Dots event roster — primary or side-bet settings, whichever owns Dots.
    if (engines.has('dots')) {
      const settings = primaryFmt === 'dots' ? (trn.format_settings || {})
        : (trn.side_bets || []).find(sb => sb.format_id === 'dots')?.settings || {};
      state.dotsEvents = Array.isArray(settings.events) ? settings.events : [];
    }
    // Pull current hole events so the toggle buttons render in the right state.
    const evRes = await fetch(`/api/rounds/${roundId}/hole-events`).then(r => r.json()).catch(() => ({events:[]}));
    const byHole = {};
    for (const ev of (evRes.events || [])) {
      const h = byHole[ev.hole_number] = byHole[ev.hole_number] || {};
      const slot = h[ev.entry_id] = h[ev.entry_id] || [];
      slot.push({ id: ev.id, event_key: ev.event_key });
    }
    state.eventsByHole = byHole;
  } catch { /* non-fatal — scorecard still works without events */ }

  if (data.round.status==='setup'){ renderGate('This round hasn’t started yet','⛳'); return; }
  if (data.round.status==='ended'){ renderGate('This round has ended','🏁'); }

  // holes come from any entry's tee, else the course's first tee —
  // narrowed to the round's segment (Full 18 / Front 9 / Back 9).
  const tee = state.course?.tees?.[0];
  let allHoles = tee?.holes?.length ? tee.holes
    : Array.from({length:18},(_,i)=>({hole_number:i+1,par:4}));
  const seg = data.round.holes_segment;
  if (seg==='front9')      allHoles = allHoles.filter(h=>h.hole_number<=9);
  else if (seg==='back9')  allHoles = allHoles.filter(h=>h.hole_number>=10);
  state.holes = allHoles;
  state.hole = allHoles[0]?.hole_number || 1;

  // server scores are the baseline; locally-pending (dirty) edits win
  for (const e of state.entries) {
    for (const [hole,strokes] of Object.entries(e.scores||{})) {
      if (state.dirty.has(e.id+'|'+hole)) continue;
      if (!state.scores[e.id]) state.scores[e.id]={};
      state.scores[e.id][hole]=strokes;
    }
  }
  saveLocal();
  if (data.round.status==='ended') return;
  render();
  sync();
}
init();
</script>
</body>
</html>
