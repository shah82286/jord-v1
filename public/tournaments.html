function renderFormatPicker() {
  const w = S.wiz;
  const allFmts = [...S.formats.individual, ...S.formats.pair, ...S.formats.team];
  const sel = allFmts.find(f => f.id === w.format);
  const tier = (label, list) => `<div class="fmt-tier-head">${label}</div><div class="fmt-grid">` +
    list.map(f => {
      const ok = pickable(f);
      // Badge: "MANUAL" for manual-scoring formats, "SOON" for not-yet-pickable
      const badge = !ok ? `<span class="badge soon">SOON</span>`
        : (f.manualScoring && !f.scored ? `<span class="badge manual">MANUAL</span>` : '');
      // Inline description bubble (replaces the old single bottom desc block —
      // descriptions now live on the card you're hovering, so you can compare).
      const bubble = `<div class="fc-bubble"><strong>${esc(f.name)} · ${esc(f.sub)}</strong><br>${esc(f.desc)}${
        f.manualScoring && !f.scored ? '<br><br><em>Manual scoring for now — you enter points per hole. Auto-leaderboard coming in v3.60.</em>' : ''
      }</div>`;
      return `<div class="fmt-card ${ok?'':'disabled'} ${w.format===f.id?'is-sel':''}" data-f="${ok?f.id:''}" tabindex="${ok?0:-1}">
        ${badge}
        <div class="fc-emoji">${fmtEmoji(f)}</div>
        <div class="nm">${esc(f.name)}</div><div class="sub">${esc(f.sub)}</div>
        ${bubble}
      </div>`;
    }).join('') + `</div>`;
  $('#fmtPicker').innerHTML =
    tier('Individual', S.formats.individual) +
    tier('Pair', S.formats.pair) +
    tier('Team', S.formats.team) +
    (sel && sel.settings && sel.settings.length ? renderWagerPanel(sel, w) : '') +
    (sel ? renderSideBetsPanel(sel, w) : '');
  $('#fmtPicker').querySelectorAll('[data-f]').forEach(c => c.onclick = () => {
    if (!c.dataset.f) return;
    if (c.dataset.f === w.format) return;
    w.format = c.dataset.f;
    // Reset format settings + side-bets to the defaults for the newly picked format.
    w.format_settings = defaultsForFormat(c.dataset.f);
    w.side_bets = []; // drop any side-bets that may not compose with the new primary
    renderWizard();
  });
  if (sel && sel.settings && sel.settings.length) wireWagerPanel(sel, w);
  if (sel) wireSideBetsPanel(sel, w);
}

// Side-bets the frontend will offer for each primary engine. Mirrors
// lib/formats.js::compatibleSideBets — keep in sync. Conservative pass:
// Skins is the only side-bet for now and works on per-hole net engines.
const SKINS_COMPATIBLE_ENGINES = ['stroke','stableford','scramble','bestball','duplicate','rumble','lownet'];
function compatibleSideBets(primaryId) {
  const allFmts = [...S.formats.individual, ...S.formats.pair, ...S.formats.team];
  const primary = allFmts.find(f => f.id === primaryId);
  if (!primary) return [];
  const out = [];
  const skins = allFmts.find(f => f.id === 'skins');
  if (skins && SKINS_COMPATIBLE_ENGINES.includes(primary.engine) && primary.id !== 'skins') {
    out.push(skins);
  }
  return out;
}

// Renders the "Side bets" checkbox section below the wagering panel. Empty
// string when the primary has no compatible side-bets — picker stays clean.
function renderSideBetsPanel(fmt, w) {
  const opts = compatibleSideBets(fmt.id);
  if (!opts.length) return '';
  w.side_bets = w.side_bets || [];
  const activeBy = Object.fromEntries(w.side_bets.map(sb => [sb.format_id, sb]));
  const row = (sb) => {
    const active = !!activeBy[sb.id];
    const cfg = active ? activeBy[sb.id].settings || {} : null;
    return `
      <label class="sb-row">
        <input type="checkbox" data-sb="${sb.id}" ${active?'checked':''} />
        <span class="sb-emoji">${sb.emoji || '🎲'}</span>
        <span class="sb-meta"><span class="sb-name">${esc(sb.name)} <span class="sb-sub">· ${esc(sb.sub)}</span></span><span class="sb-desc">${esc(sb.desc)}</span></span>
      </label>
      ${active && sb.settings && sb.settings.length ? `
        <div class="sb-settings" data-sb-cfg="${sb.id}">
          ${sb.settings.map(s => {
            const v = cfg[s.key];
            if (s.type === 'money' || s.type === 'cents') {
              const symbol = s.type === 'cents' ? '¢' : '$';
              return `<div class="field">
                <label>${esc(s.label)}</label>
                <div class="wager-prefix"><span class="prefix">${symbol}</span>
                  <input class="input" type="number" step="${s.step||0.25}" min="${s.min??0}" data-sb-k="${sb.id}:${s.key}" data-t="${s.type}" value="${Number(v)||0}" /></div>
              </div>`;
            }
            if (s.type === 'number') {
              return `<div class="field">
                <label>${esc(s.label)}</label>
                <input class="input" type="number" step="${s.step||1}" min="${s.min??0}" data-sb-k="${sb.id}:${s.key}" data-t="number" value="${Number(v)||0}" />
              </div>`;
            }
            return '';
          }).join('')}
        </div>` : ''}
    `;
  };
  return `<div class="fmt-sidebets">
    <h4>🎯 Side bets — layer another game on top</h4>
    <div class="sub">Pick a second scoring game that runs on the same scorecard. The live leaderboard will show a tab for each game.</div>
    <div class="sb-list">${opts.map(row).join('')}</div>
  </div>`;
}

// Wires the side-bets checkboxes + their per-field inputs into w.side_bets.
function wireSideBetsPanel(fmt, w) {
  w.side_bets = w.side_bets || [];
  const panel = $('#fmtPicker .fmt-sidebets');
  if (!panel) return;
  panel.querySelectorAll('input[data-sb]').forEach(cb => {
    cb.onchange = () => {
      const id = cb.dataset.sb;
      const f  = [...S.formats.individual, ...S.formats.pair, ...S.formats.team].find(f => f.id === id);
      const idx = w.side_bets.findIndex(sb => sb.format_id === id);
      if (cb.checked && idx === -1) {
        w.side_bets.push({ format_id: id, settings: defaultsForFormat(id) });
      } else if (!cb.checked && idx !== -1) {
        w.side_bets.splice(idx, 1);
      }
      renderFormatPicker();
    };
  });
  panel.querySelectorAll('input[data-sb-k]').forEach(inp => {
    inp.oninput = () => {
      const [id, key] = inp.dataset.sbK.split(':');
      const sb = w.side_bets.find(sb => sb.format_id === id);
      if (!sb) return;
      sb.settings = sb.settings || {};
      sb.settings[key] = Number(inp.value);
    };
  });
}

// Build the default { key: default } object for a format from S.formats.
function defaultsForFormat(id) {
  const allFmts = [...S.formats.individual, ...S.formats.pair, ...S.formats.team];
  const f = allFmts.find(f => f.id === id);
  if (!f || !f.settings) return {};
  const out = {};
  for (const s of f.settings) {
    // dots_events is an array — deep-clone the default so edits don't mutate the catalog
    if (s.type === 'dots_events') out[s.key] = JSON.parse(JSON.stringify(s.default));
    else out[s.key] = s.default;
  }
  return out;
}

// Render the wagering / points panel for the selected format (inline below picker).
function renderWagerPanel(fmt, w) {
  const cfg = (w.format_settings = w.format_settings || defaultsForFormat(fmt.id));
  const row = (s) => {
    const val = cfg[s.key];
    if (s.type === 'money' || s.type === 'cents') {
      const symbol = s.type === 'cents' ? '¢' : '$';
      return `<div class="field">
        <label>${esc(s.label)} ${s.hint?help(s.hint):''}</label>
        <div class="wager-prefix">
          <span class="prefix">${symbol}</span>
          <input class="input" type="number" step="${s.step||0.25}" min="${s.min??0}" data-k="${s.key}" data-t="${s.type}" value="${Number(val)||0}" />
        </div>
      </div>`;
    }
    if (s.type === 'number') {
      return `<div class="field">
        <label>${esc(s.label)} ${s.hint?help(s.hint):''}</label>
        <input class="input" type="number" step="${s.step||1}" min="${s.min??0}" data-k="${s.key}" data-t="number" value="${Number(val)||0}" />
      </div>`;
    }
    if (s.type === 'toggle') {
      return `<div class="field" style="grid-column:1/-1">
        <div class="toggle-row">
          <input type="checkbox" id="tog_${s.key}" data-k="${s.key}" data-t="toggle" ${val?'checked':''} />
          <label for="tog_${s.key}" style="cursor:pointer">${esc(s.label)} ${s.hint?help(s.hint):''}</label>
        </div>
      </div>`;
    }
    if (s.type === 'dots_events') {
      const rows = (val || []).map((d, i) => `
        <div class="dot-row" data-i="${i}">
          <input class="input label-in" data-k="${s.key}" data-fld="label" value="${esc(d.label||d.key)}" />
          <input class="input pts-in"   data-k="${s.key}" data-fld="points" type="number" step="1" value="${Number(d.points)||0}" />
          <button type="button" class="rm-btn" data-rm="${i}" data-k="${s.key}" title="Remove">×</button>
        </div>`).join('');
      return `<div class="field" style="grid-column:1/-1">
        <label>${esc(s.label)} ${s.hint?help(s.hint):''}</label>
        <div class="dots-list" data-list="${s.key}">${rows}</div>
        <button type="button" class="btn btn-ghost" style="margin-top:8px;padding:6px 12px;font-size:13px" data-add="${s.key}">+ Add event</button>
      </div>`;
    }
    return '';
  };
  return `<div class="fmt-wager">
    <h4>${fmtEmoji(fmt)} ${esc(fmt.name)} — wagering & points</h4>
    <div class="sub">Defaults are the most common settings. Change anything that fits your group.</div>
    <div class="wager-grid">${fmt.settings.map(row).join('')}</div>
  </div>`;
}

// Wire input handlers for the wagering panel so edits flow into w.format_settings.
function wireWagerPanel(fmt, w) {
  const wager = $('#fmtPicker .fmt-wager');
  if (!wager) return;
  const cfg = w.format_settings = w.format_settings || defaultsForFormat(fmt.id);
  // Money / number / toggle scalar fields
  wager.querySelectorAll('input[data-k]:not(.label-in):not(.pts-in)').forEach(inp => {
    inp.oninput = () => {
      const k = inp.dataset.k, t = inp.dataset.t;
      if (t === 'toggle') cfg[k] = inp.checked;
      else cfg[k] = Number(inp.value);
    };
  });
  // Dots events: label + points editable, with add / remove
  wager.querySelectorAll('.dot-row input').forEach(inp => {
    inp.oninput = () => {
      const row = inp.closest('.dot-row');
      const i = +row.dataset.i;
      const k = inp.dataset.k;
      const list = cfg[k] || [];
      if (!list[i]) return;
      if (inp.dataset.fld === 'points') list[i].points = Number(inp.value) || 0;
      else list[i].label = inp.value;
    };
  });
  wager.querySelectorAll('[data-rm]').forEach(btn => {
    btn.onclick = () => {
      const k = btn.dataset.k;
      const i = +btn.dataset.rm;
      (cfg[k] || []).splice(i, 1);
      renderFormatPicker();
    };
  });
  wager.querySelectorAll('[data-add]').forEach(btn => {
    btn.onclick = () => {
      const k = btn.dataset.add;
      cfg[k] = cfg[k] || [];
      cfg[k].push({ key: 'custom_' + (cfg[k].length + 1), label: 'New event', points: 1 });
      renderFormatPicker();
    };
  });
}

/* step 4 — players */
function stepPlayers() {
  const w = S.wiz;
  // w._editIndex tracks which existing player (if any) the form is editing.
  // Null = "add new" mode; integer = "save changes to that index" mode.
  const editing = w._editIndex != null ? w.players[w._editIndex] : null;
  const course = S.courses.find(c=>c.id===w.course_id);
  $('#wizBody').innerHTML = `
    <p class="card-sub">Add players. Course handicaps are computed from the handicap index and tee. Tap a player below to edit.</p>
    <div class="inline-panel">
      <div class="field-grid" style="grid-template-columns:1fr 1fr">
        <div class="field"><label>Name</label><input class="input" id="pName" value="${editing?esc(editing.name):''}" /></div>
        <div class="field"><label>Phone (optional)</label><input class="input" id="pPhone" value="${editing?esc(editing.phone||''):''}" /></div>
        <div class="field"><label>Handicap index ${help('The official handicap. JORD turns it into a course handicap for the chosen tee automatically.')}</label><input class="input" type="number" step="0.1" id="pHcp" value="${editing&&editing.handicap_index!=null?editing.handicap_index:''}" /></div>
        <div class="field"><label>Tee ${help('Which set of tees the player uses — tees differ in yardage, course rating and slope.')}</label><select class="select" id="pTee"><option value="">default</option></select></div>
        <div class="field" style="grid-column:1/-1"><label>Team ${help('Optional — group players into teams for a 4-vs-4 side bet or scramble pairing. Free text: "A" / "B", "Reds" / "Blues", or "Smith Foursome" — players sharing the same label aggregate on the team leaderboard.')}</label><input class="input" id="pTeam" placeholder="A / B / Reds / Smith Foursome (leave blank for solo)" value="${editing?esc(editing.team_name||''):''}" /></div>
      </div>
      <div class="row gap-2" style="display:flex;gap:var(--s-2)">
        <button class="btn btn-primary" id="pAdd">${editing ? 'Save changes' : '+ Add player'}</button>
        ${editing ? `<button class="btn btn-ghost" id="pCancel">Cancel</button>` : ''}
      </div>
    </div>
    <div id="pList"></div>` + nav(null,'Create &amp; start ▶',null,w.players.length>0);
  // tees load lazily from the course
  loadCourseTees(course).then(tees => {
    const sel = $('#pTee');
    if (sel) {
      sel.innerHTML = tees.map(t=>`<option value="${t.id}">${esc(t.name)} (${esc(t.gender)})</option>`).join('')
        || '<option value="">no tees</option>';
      // Pre-select the editing player's tee
      if (editing && editing.tee_id) sel.value = editing.tee_id;
    }
  });
  renderWizPlayers();
  $('#pAdd').onclick = () => {
    const name = $('#pName').value.trim();
    if (!name) { JORD.warn('Player name required'); return; }
    const data = { name,
      phone: $('#pPhone').value.trim(),
      handicap_index: +$('#pHcp').value || null,
      tee_id: $('#pTee').value || null,
      team_name: $('#pTeam').value.trim() || null };
    if (w._editIndex != null) {
      w.players[w._editIndex] = data;
      w._editIndex = null;
    } else {
      w.players.push(data);
    }
    renderWizard();
  };
  if (editing) $('#pCancel').onclick = () => { w._editIndex = null; renderWizard(); };
  wireNav(()=>go('new/setup'), createGame);
}
let _teeCache = {};
async function loadCourseTees(course) {
  if (!course) return [];
  if (_teeCache[course.id]) return _teeCache[course.id];
  const full = await JORD.api('/api/courses/'+course.id);
  _teeCache[course.id] = full.tees || [];
  return _teeCache[course.id];
}
function renderWizPlayers() {
  const w = S.wiz, el = $('#pList');
  if (!w.players.length) { el.innerHTML = '<p class="mini">No players added yet.</p>'; return; }
  el.innerHTML = w.players.map((p,i)=>{
    const isEditing = w._editIndex === i;
    return `<div class="row-card" style="${isEditing?'border-color:var(--accent);background:#FFFCF2':''}">
      <div><strong>${esc(p.name)}</strong>
        <div class="meta">HCP index ${p.handicap_index??'—'}${p.team_name ? ' · Team ' + esc(p.team_name) : ''}${isEditing?' · editing…':''}</div></div>
      <div class="row gap-2" style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-icon" data-edit="${i}" title="Edit player">✎</button>
        <button class="btn btn-ghost btn-icon" data-rm="${i}" title="Remove player">✕</button>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
    w._editIndex = +b.dataset.edit; renderWizard();
  });
  el.querySelectorAll('[data-rm]').forEach(b => b.onclick = () => {
    const i = +b.dataset.rm;
    // If you remove the player you're currently editing, drop the edit state.
    if (w._editIndex === i) w._editIndex = null;
    else if (w._editIndex != null && i < w._editIndex) w._editIndex -= 1;
    w.players.splice(i, 1);
    renderWizard();
  });
}

/* step 4 (pair/team formats) — teams */
let _teesFor = [];
function stepTeams() {
  const w = S.wiz, fmt = findFmt(w.format);
  const [minP,maxP] = fmt.teamSize;
  const course = S.courses.find(c=>c.id===w.course_id);
  const ready = w.teams.length>0 && w.teams.every(t=>t.players.length>0);
  $('#wizBody').innerHTML = `
    <p class="card-sub">${esc(fmt.name)} · ${esc(fmt.sub)} — ${minP===maxP?minP:minP+'–'+maxP} players per team.</p>
    <div id="teamList"></div>
    <button class="btn btn-ghost" id="addTeam" style="margin-top:var(--s-2)">+ Add team</button>
    ` + nav(null,'Create &amp; start ▶',null,ready);
  loadCourseTees(course).then(tees=>{ _teesFor=tees; renderTeams(); });
  $('#addTeam').onclick = ()=>{ w.teams.push({name:'Team '+(w.teams.length+1),players:[]}); renderWizard(); };
  wireNav(()=>go('new/setup'), createGame);
}
function renderTeams() {
  const w = S.wiz, el = $('#teamList');
  if (!el) return;
  // w._teamEdit = { ti, pi } when a team-player row is being edited; null otherwise.
  const edit = w._teamEdit || null;
  const teeOpts = _teesFor.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')
    || '<option value="">default</option>';
  if (!w.teams.length) { el.innerHTML='<p class="mini">Add a team to begin.</p>'; return; }
  el.innerHTML = w.teams.map((t,ti)=>{
    const editingThisTeam = edit && edit.ti === ti ? w.teams[ti].players[edit.pi] : null;
    return `<div class="inline-panel">
      <div style="display:flex;gap:var(--s-2);align-items:center;margin-bottom:var(--s-2)">
        <input class="input" value="${esc(t.name)}" data-tname="${ti}" style="flex:1" />
        <button class="btn btn-ghost btn-icon" data-trm="${ti}" title="Remove team">✕</button>
      </div>
      ${t.players.map((p,pi)=>{
        const isEditing = edit && edit.ti === ti && edit.pi === pi;
        return `<div class="row-card" style="${isEditing?'border-color:var(--accent);background:#FFFCF2':''}">
          <div><strong>${esc(p.name)}</strong><div class="meta">HCP index ${p.handicap_index??'—'}${isEditing?' · editing…':''}</div></div>
          <div class="row gap-2" style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-icon" data-pedit="${ti}.${pi}" title="Edit player">✎</button>
            <button class="btn btn-ghost btn-icon" data-prm="${ti}.${pi}" title="Remove player">✕</button>
          </div>
        </div>`;
      }).join('')}
      <div class="field-grid" style="grid-template-columns:1fr 1fr;margin-top:var(--s-2)">
        <div class="field"><label>Player name</label><input class="input" data-pn="${ti}" value="${editingThisTeam?esc(editingThisTeam.name):''}" /></div>
        <div class="field"><label>Phone</label><input class="input" data-pp="${ti}" value="${editingThisTeam?esc(editingThisTeam.phone||''):''}" /></div>
        <div class="field"><label>HCP index ${help('The official handicap. JORD turns it into a course handicap for the chosen tee automatically.')}</label><input class="input" type="number" step="0.1" data-ph="${ti}" value="${editingThisTeam&&editingThisTeam.handicap_index!=null?editingThisTeam.handicap_index:''}" /></div>
        <div class="field"><label>Tee ${help('Which set of tees the player uses — tees differ in yardage, course rating and slope.')}</label><select class="select" data-pt="${ti}">${teeOpts}</select></div>
      </div>
      <div class="row gap-2" style="display:flex;gap:6px">
        <button class="btn ${editingThisTeam?'btn-primary':'btn-ghost'}" data-padd="${ti}">${editingThisTeam?'Save changes':'+ Add player'}</button>
        ${editingThisTeam?'<button class="btn btn-ghost" data-pcancel="1">Cancel</button>':''}
      </div>
    </div>`;
  }).join('');
  // Pre-select tee for the editing player
  if (edit) {
    const sel = el.querySelector(`[data-pt="${edit.ti}"]`);
    if (sel) sel.value = w.teams[edit.ti].players[edit.pi].tee_id || '';
  }
  el.querySelectorAll('[data-tname]').forEach(i=>i.onchange=e=>{ w.teams[+i.dataset.tname].name=e.target.value; });
  el.querySelectorAll('[data-trm]').forEach(b=>b.onclick=()=>{ w.teams.splice(+b.dataset.trm,1); w._teamEdit=null; renderWizard(); });
  el.querySelectorAll('[data-prm]').forEach(b=>b.onclick=()=>{
    const [ti,pi]=b.dataset.prm.split('.').map(Number);
    if (w._teamEdit && w._teamEdit.ti===ti && w._teamEdit.pi===pi) w._teamEdit=null;
    w.teams[ti].players.splice(pi,1); renderWizard();
  });
  el.querySelectorAll('[data-pedit]').forEach(b=>b.onclick=()=>{
    const [ti,pi]=b.dataset.pedit.split('.').map(Number);
    w._teamEdit = { ti, pi }; renderWizard();
  });
  el.querySelectorAll('[data-pcancel]').forEach(b=>b.onclick=()=>{ w._teamEdit=null; renderWizard(); });
  el.querySelectorAll('[data-padd]').forEach(b=>b.onclick=()=>{
    const ti=+b.dataset.padd;
    const name=el.querySelector(`[data-pn="${ti}"]`).value.trim();
    if(!name){ JORD.warn('Player name required'); return; }
    const data = { name,
      phone:el.querySelector(`[data-pp="${ti}"]`).value.trim(),
      handicap_index:+el.querySelector(`[data-ph="${ti}"]`).value||null,
      tee_id:el.querySelector(`[data-pt="${ti}"]`).value||null };
    if (w._teamEdit && w._teamEdit.ti === ti) {
      w.teams[ti].players[w._teamEdit.pi] = data;
      w._teamEdit = null;
    } else {
      w.teams[ti].players.push(data);
    }
    renderWizard();
  });
}

/* step 4 (Reds vs Blues) — build the two teams */
function stepRvb() {
  const w = S.wiz;
  const course = S.courses.find(c=>c.id===w.course_id);
  const ready = w.reds.length>0 && w.blues.length>0;
  $('#wizBody').innerHTML = `
    <p class="card-sub">Singles match play — Red #1 plays Blue #1, Red #2 plays Blue #2, and so on.</p>
    <div id="redPanel"></div>
    <div id="bluePanel"></div>
    ` + nav(null,'Create &amp; start ▶',null,ready);
  loadCourseTees(course).then(tees=>{ _teesFor=tees; renderRvb(); });
  wireNav(()=>go('new/setup'), createGame);
}
function renderRvb() {
  const w = S.wiz, body = $('#wizBody');
  if (!body || !$('#redPanel')) return;
  // w._rvbEdit = { side:'red'|'blue', idx:number } when an existing player is being edited.
  const edit = w._rvbEdit || null;
  const teeOpts = _teesFor.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')
    || '<option value="">default</option>';
  const panel = (side, arr) => {
    const editingThisSide = edit && edit.side === side ? arr[edit.idx] : null;
    return `<div class="inline-panel">
      <h3 style="font-family:var(--font-display);margin-bottom:var(--s-2)">${side==='red'?'🔴 Reds':'🔵 Blues'}</h3>
      ${arr.map((p,i)=>{
        const isEditing = edit && edit.side === side && edit.idx === i;
        return `<div class="row-card" style="${isEditing?'border-color:var(--accent);background:#FFFCF2':''}">
          <div><strong>${esc(p.name)}</strong>
            <div class="meta">Match ${i+1} · HCP index ${p.handicap_index??'—'}${isEditing?' · editing…':''}</div></div>
          <div class="row gap-2" style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-icon" data-edit="${side}.${i}" title="Edit player">✎</button>
            <button class="btn btn-ghost btn-icon" data-rm="${side}.${i}" title="Remove player">✕</button>
          </div>
        </div>`;
      }).join('')}
      <div class="field-grid" style="grid-template-columns:1fr 1fr;margin-top:var(--s-2)">
        <div class="field"><label>Player name</label><input class="input" data-n="${side}" value="${editingThisSide?esc(editingThisSide.name):''}" /></div>
        <div class="field"><label>HCP index ${help('The official handicap. JORD turns it into a course handicap for the chosen tee automatically.')}</label><input class="input" type="number" step="0.1" data-h="${side}" value="${editingThisSide&&editingThisSide.handicap_index!=null?editingThisSide.handicap_index:''}" /></div>
        <div class="field"><label>Phone</label><input class="input" data-p="${side}" value="${editingThisSide?esc(editingThisSide.phone||''):''}" /></div>
        <div class="field"><label>Tee ${help('Which set of tees the player uses — tees differ in yardage, course rating and slope.')}</label><select class="select" data-t="${side}">${teeOpts}</select></div>
      </div>
      <div class="row gap-2" style="display:flex;gap:6px">
        <button class="btn ${editingThisSide?'btn-primary':'btn-ghost'}" data-add="${side}">${editingThisSide?'Save changes':'+ Add player'}</button>
        ${editingThisSide?'<button class="btn btn-ghost" data-cancel="1">Cancel</button>':''}
      </div>
    </div>`;
  };
  $('#redPanel').innerHTML = panel('red', w.reds);
  $('#bluePanel').innerHTML = panel('blue', w.blues);
  // Pre-select tee for the editing player
  if (edit) {
    const sel = body.querySelector(`[data-t="${edit.side}"]`);
    const arr = edit.side === 'red' ? w.reds : w.blues;
    if (sel && arr[edit.idx]) sel.value = arr[edit.idx].tee_id || '';
  }
  body.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{
    const [s,i]=b.dataset.rm.split('.'); const arr = s==='red'?w.reds:w.blues;
    if (w._rvbEdit && w._rvbEdit.side===s && w._rvbEdit.idx===+i) w._rvbEdit=null;
    arr.splice(+i,1); renderWizard();
  });
  body.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const [s,i]=b.dataset.edit.split('.');
    w._rvbEdit = { side: s, idx: +i }; renderWizard();
  });
  body.querySelectorAll('[data-cancel]').forEach(b=>b.onclick=()=>{ w._rvbEdit=null; renderWizard(); });
  body.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    const s=b.dataset.add, arr=s==='red'?w.reds:w.blues;
    const name=body.querySelector(`[data-n="${s}"]`).value.trim();
    if(!name){ JORD.warn('Player name required'); return; }
    const data = { name, handicap_index:+body.querySelector(`[data-h="${s}"]`).value||null,
      phone:body.querySelector(`[data-p="${s}"]`).value.trim(),
      tee_id:body.querySelector(`[data-t="${s}"]`).value||null };
    if (w._rvbEdit && w._rvbEdit.side === s) {
      arr[w._rvbEdit.idx] = data;
      w._rvbEdit = null;
    } else {
      arr.push(data);
    }
    renderWizard();
  });
}

async function createGame() {
  const w = S.wiz;
  try {
    const trn = await JORD.api('/api/tournaments',{method:'POST',body:{
      name:w.name.trim(), type:w.type, course_id:w.course_id,
      round_date:w.date, format:w.format, holes_segment:w.holes_segment,
      flights_enabled:w.flights_enabled, num_flights:w.num_flights,
      format_settings: w.format_settings || {},
      side_bets: w.side_bets || [] }});
    const roundIds = [trn.round_id];
    const nRounds = (w.type==='tournament' && !isTeamFormat()) ? w.num_rounds : 1;
    for (let i=2; i<=nRounds; i++) {
      const r = await JORD.api(`/api/tournaments/${trn.id}/rounds`,{method:'POST',body:{course_id:w.course_id,format:w.format}});
      roundIds.push(r.id);
    }
    if (w.type==='reds_blues') {
      const pairs = Math.max(w.reds.length, w.blues.length);
      for (let i=0; i<pairs; i++) {
        if (w.reds[i])  await JORD.api(`/api/tournaments/${trn.id}/field`,{method:'POST',body:{...w.reds[i], side:'red',  match_no:i+1}});
        if (w.blues[i]) await JORD.api(`/api/tournaments/${trn.id}/field`,{method:'POST',body:{...w.blues[i],side:'blue', match_no:i+1}});
      }
    } else if (isTeamFormat()) {
      for (const t of w.teams)
        await JORD.api(`/api/rounds/${trn.round_id}/teams`,{method:'POST',body:{name:t.name,players:t.players}});
    } else {
      // fans the player out to every round of the tournament
      for (const p of w.players)
        await JORD.api(`/api/tournaments/${trn.id}/field`,{method:'POST',body:p});
    }
    for (const rid of roundIds)
      await JORD.api(`/api/rounds/${rid}/status`,{method:'POST',body:{status:'active'}});
    S.wiz = null;
    await loadAll();
    go('game/'+trn.id);
    JORD.success('Game created and started');
  } catch(e){ JORD.error(e.message); }
}

/* ─── tournament detail ────────────────────────────────────────────── */
async function openTournament(id) {
  const t = await JORD.api('/api/tournaments/'+id);
  const data = await JORD.api('/api/rounds/'+t.rounds[0].id);   // round 1 — competitor roster
  const fmt = findFmt(t.rounds[0].format);
  const origin = location.origin;
  const multi = t.rounds.length > 1;
  // Build the shareable invite link from the tournament's share_code.
  // Friends open this URL → /round/:shareCode → public join page.
  const shareUrl = t.share_code ? `${origin}/round/${t.share_code}` : null;

  $('#view').innerHTML = `
    <div class="page-head"><h1>${esc(t.name)}</h1>
      <button class="btn btn-ghost" id="back">← All games</button></div>

    <div class="card" style="margin-bottom:var(--s-4)">
      <div style="display:flex;gap:var(--s-3);flex-wrap:wrap;align-items:center;justify-content:space-between">
        <div class="mini">${fmt?esc(fmt.name+' · '+fmt.sub):esc(t.rounds[0].format)}${t.flights_enabled?' · '+t.num_flights+' flights':''}${t.rounds[0].round_date ? ' · ' + esc(t.rounds[0].round_date) : ''}</div>
        <div style="display:flex;gap:var(--s-2);flex-wrap:wrap">
          ${shareUrl ? `<button class="btn btn-primary" id="btn-share">🔗 Share link</button>` : ''}
          ${shareUrl ? `<a class="btn btn-ghost" href="/round/${esc(t.share_code)}" target="_blank">💬 Banter</a>` : ''}
          <button class="btn btn-ghost" id="btn-edit">✎ Edit game</button>
          ${multi?`<a class="btn btn-accent" href="/tournament/${t.id}" target="_blank">🏆 Tournament leaderboard ↗</a>`:''}
          <button class="btn btn-ghost" id="btn-del-game" style="color:var(--danger)">🗑 Delete</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:var(--s-4)">
      <h2 class="card-title">Round${multi?'s':''}</h2>
      <div id="roundList"></div>
    </div>
    <div class="card"><h2 class="card-title">Competitors</h2><div id="playerList"></div></div>`;
  $('#back').onclick = () => go('');
  if (shareUrl) $('#btn-share').onclick = () => openShareModal(t, shareUrl);
  $('#btn-edit').onclick = () => openEditModal(t);
  $('#btn-del-game').onclick = async () => {
    if (!confirm(`Delete "${t.name}"? This removes all rounds, players, and scores. Cannot be undone.`)) return;
    try {
      await JORD.api('/api/tournaments/'+t.id, { method:'DELETE' });
      JORD.success && JORD.success('Game deleted');
      await loadAll();
      go('');
    } catch (e) { JORD.error && JORD.error(e.message || 'Could not delete'); }
  };

  $('#roundList').innerHTML = t.rounds.map(r=>`
    <div class="row-card">
      <div><strong>Round ${r.round_number}</strong>
        <span class="badge ${r.status==='active'?'badge-success':r.status==='ended'?'badge-danger':''}">${esc(r.status)}</span></div>
      <div style="display:flex;gap:var(--s-2);flex-wrap:wrap">
        <a class="btn btn-ghost" href="/live/${r.id}" target="_blank">Live ↗</a>
        <a class="btn btn-ghost" href="/card/${r.id}" target="_blank">📋 Card ↗</a>
        <a class="btn btn-primary" href="/scorecard/${r.id}" target="_blank">📝 Enter scores ↗</a>
        ${r.status==='active'?`<button class="btn btn-ghost" data-end="${r.id}">End</button>`
          :`<button class="btn btn-ghost" data-start="${r.id}">Start</button>`}
        ${multi ? `<button class="btn btn-ghost" data-del-round="${r.id}" style="color:var(--danger)">🗑</button>` : ''}
      </div>
    </div>`).join('');
  $('#roundList').querySelectorAll('[data-end]').forEach(b=>b.onclick=()=>setStatus(b.dataset.end,'ended',id));
  $('#roundList').querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>setStatus(b.dataset.start,'active',id));
  $('#roundList').querySelectorAll('[data-del-round]').forEach(b => b.onclick = async () => {
    const r = t.rounds.find(r => r.id === b.dataset.delRound);
    if (!confirm(`Delete Round ${r ? r.round_number : '?'}? Removes that round's players and scores. Cannot be undone.`)) return;
    try {
      await JORD.api('/api/rounds/'+b.dataset.delRound, { method:'DELETE' });
      JORD.success && JORD.success('Round deleted');
      await loadAll();
      openTournament(id);
    } catch (e) { JORD.error && JORD.error(e.message || 'Could not delete round'); }
  });

  const pl = $('#playerList');
  if (!data.entries.length) { pl.innerHTML = '<p class="mini">No competitors yet.</p>'; return; }
  // Team-card formats: top row is the team (no direct edit — name lives on
  // the team row), each member underneath is editable.
  // Individual / best-ball formats: each entry is itself a player and is
  // edited directly.
  pl.innerHTML = data.entries.map(e => {
    const isTeamCard = Array.isArray(e.members) && e.members.length;
    const headLine = `<div class="row-card"><div><strong>${esc(e.player_name)}</strong>
      <div class="meta">${e.group_name && e.group_name !== e.player_name ? esc(e.group_name)+' · ' : ''}Course handicap: ${e.course_handicap??'—'}</div></div>
      <div class="row gap-2">
        ${!isTeamCard ? `<button class="btn btn-ghost btn-icon" data-edit-entry="${esc(e.id)}" title="Edit player">✎</button>` : ''}
        <button class="btn btn-ghost btn-icon" data-del-entry="${esc(e.id)}" title="Remove">✕</button>
      </div></div>`;
    if (!isTeamCard) return headLine;
    const memberLines = e.members.map(m => `
      <div class="row-card" style="background:var(--surface-2);margin-left:var(--s-4)">
        <div><strong>${esc(m.player_name)}</strong>
          <div class="meta">HCP ${m.handicap_index ?? '—'} · CH ${m.course_handicap ?? '—'}</div></div>
        <button class="btn btn-ghost btn-icon" data-edit-member="${esc(m.id)}" title="Edit ${esc(m.player_name)}">✎</button>
      </div>`).join('');
    return headLine + memberLines;
  }).join('');

  // Wire the action buttons. Each handler grabs the latest entry/member info
  // from `data` rather than rebuilding state from scratch.
  const roundId = data.round.id;
  // Hole layout for the round — used by the edit modal to render the
  // manual stroke-allocation grid. Pulled from the first tee on the course.
  const holesLayout = (data.course && data.course.tees && data.course.tees[0] && data.course.tees[0].holes) || [];
  pl.querySelectorAll('[data-edit-entry]').forEach(b => b.onclick = () => {
    const entry = data.entries.find(e => e.id === b.dataset.editEntry);
    if (entry) openEditPlayer({ kind: 'entry', roundId, entry, course: data.course, holes: holesLayout, trnId: t.id });
  });
  pl.querySelectorAll('[data-edit-member]').forEach(b => b.onclick = () => {
    let member = null, parent = null;
    for (const e of data.entries) {
      const m = (e.members || []).find(m => m.id === b.dataset.editMember);
      if (m) { member = m; parent = e; break; }
    }
    if (member) openEditPlayer({ kind: 'member', roundId, member, parent, course: data.course, holes: holesLayout, trnId: t.id });
  });
  pl.querySelectorAll('[data-del-entry]').forEach(b => b.onclick = async () => {
    const entry = data.entries.find(e => e.id === b.dataset.delEntry);
    if (!entry) return;
    if (!confirm(`Remove ${entry.player_name}? Their scores will be erased.`)) return;
    try {
      await JORD.api(`/api/rounds/${roundId}/entries/${b.dataset.delEntry}`, { method: 'DELETE' });
      JORD.success && JORD.success('Removed');
      openTournament(t.id);
    } catch (e) { JORD.error && JORD.error(e.message || 'Could not remove'); }
  });
}

// Edit-player modal — works for both individual entries and team members.
// opts = { kind:'entry'|'member', roundId, course, holes, trnId,
//          entry?:{id, player_name, handicap_index, ...} for kind=entry
//          member?:{id, player_name, handicap_index, ...} for kind=member }
function openEditPlayer(opts) {
  const current = opts.kind === 'entry' ? opts.entry : opts.member;
  const tees = (opts.course && opts.course.tees) || [];
  const holes = (opts.holes && opts.holes.length) ? opts.holes
    : Array.from({length: 18}, (_, i) => ({ hole_number: i+1, par: 4, stroke_index: i+1 }));
  // Manual override map keyed by hole_number. Pre-fill from the entry's
  // existing override (server returns it via stroke_overrides).
  const initialOverride = (current.stroke_overrides && typeof current.stroke_overrides === 'object') ? { ...current.stroke_overrides } : null;
  const manualOn = !!initialOverride;
  const localStrokes = {};
  for (const h of holes) {
    const v = initialOverride ? (initialOverride[h.hole_number] ?? initialOverride[String(h.hole_number)] ?? 0) : 0;
    localStrokes[h.hole_number] = Number(v) || 0;
  }

  // Build the manual-allocation grid as DOM nodes (easier than HTML strings
  // for re-renders + event wiring).
  const front = holes.slice(0, Math.min(9, holes.length));
  const back  = holes.slice(9, 18);
  const nineHTML = (slice) => `
    <table style="border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%">
      <thead>
        <tr style="background:var(--surface-2);color:var(--ink-3);font-size:10px;text-transform:uppercase;letter-spacing:.05em">
          <th style="padding:4px 6px;text-align:left">Hole</th>
          ${slice.map(h => `<th style="padding:4px 6px">${h.hole_number}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        <tr><td style="padding:4px 6px;color:var(--ink-3)">Par</td>${slice.map(h => `<td style="padding:4px 6px;text-align:center;color:var(--ink-3)">${h.par || '—'}</td>`).join('')}</tr>
        <tr><td style="padding:4px 6px;color:var(--ink-3)">SI</td>${slice.map(h => `<td style="padding:4px 6px;text-align:center;color:var(--ink-3)">${h.stroke_index || '—'}</td>`).join('')}</tr>
        <tr><td style="padding:4px 6px;color:var(--ink)">Strokes</td>${slice.map(h => `
          <td style="padding:2px 1px;text-align:center"><input
            data-strk="${h.hole_number}" type="number" min="0" max="5" step="1"
            style="width:34px;padding:4px 2px;text-align:center;border:1px solid var(--border-2);border-radius:var(--r-sm);font-family:inherit;font-size:13px"
            value="${localStrokes[h.hole_number]||0}" /></td>`).join('')}</tr>
      </tbody>
    </table>`;

  const body = JORD.el('div', {},
    JORD.el('div', { class: 'field' },
      JORD.el('label', { for: 'ep_name' }, 'Player name'),
      JORD.el('input', { class: 'input input-lg', id: 'ep_name', value: current.player_name || '' })),
    JORD.el('div', { class: 'field' },
      JORD.el('label', { for: 'ep_hcp' }, 'Handicap index'),
      JORD.el('input', { class: 'input input-lg', id: 'ep_hcp', type: 'number', step: '0.1',
        value: current.handicap_index ?? '' })),
    JORD.el('div', { class: 'field' },
      JORD.el('label', { for: 'ep_tee' }, 'Tee'),
      JORD.el('select', { class: 'input input-lg', id: 'ep_tee' },
        ...[JORD.el('option', { value: '' }, '— default —'),
            ...tees.map(t => JORD.el('option', { value: t.id, selected: t.id === current.tee_id }, `${t.name} (${t.gender || '—'})`))])),
    JORD.el('div', { class: 'field', style: { borderTop: '1px solid var(--border)', paddingTop: 'var(--s-3)', marginTop: 'var(--s-3)' } },
      JORD.el('label', { style: { display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' } },
        JORD.el('input', { type: 'checkbox', id: 'ep_manual', checked: manualOn, style: { width: '18px', height: '18px', accentColor: 'var(--accent)' } }),
        JORD.el('span', {}, 'Manual stroke allocation')),
      JORD.el('p', { class: 'hint', style: { marginTop: '4px', fontSize: '12.5px', color: 'var(--ink-2)' } },
        `By default JORD allocates strokes per WHS Rule 11 — your course handicap is spread by stroke index (hardest holes first), wrapping if it exceeds the number of holes. Turn this on to hand-pick which holes get which strokes.`)
    ),
    JORD.el('div', { id: 'ep_manual_panel', style: { display: manualOn ? '' : 'none', background: '#FFFCF2', border: '1px solid var(--accent)', borderRadius: 'var(--r-sm)', padding: '12px', marginTop: 'var(--s-2)', overflowX: 'auto' },
      html: `${nineHTML(front)}${back.length ? '<div style="height:8px"></div>' + nineHTML(back) : ''}
        <div style="margin-top:8px;font-size:12px;color:var(--ink-2)">Total: <strong id="ep_manual_total">0</strong> stroke(s) given. Use 0 (or blank) to skip a hole. Plus-handicaps: enter negative to take strokes back.</div>` }),
    JORD.el('div', { class: 'auth-err', id: 'ep_err', style: { display: 'none', background: '#fdecec', color: 'var(--danger)', border: '1px solid #f5c6c6', borderRadius: 'var(--r-sm)', padding: '10px 12px', fontSize: '13.5px', marginTop: 'var(--s-2)' } })
  );
  const submitBtn = JORD.el('button', { class: 'btn btn-primary' }, 'Save changes');
  const cancelBtn = JORD.el('button', { class: 'btn btn-ghost' }, 'Cancel');
  const footer = JORD.el('div', { class: 'row gap-2' }, cancelBtn, submitBtn);
  const m = JORD.modal({ title: `Edit ${current.player_name}`, body, footer, lg: true });
  cancelBtn.onclick = () => m.close();

  // Toggle the manual panel + recompute the running total.
  const recalcTotal = () => {
    const inputs = body.querySelectorAll('input[data-strk]');
    let tot = 0;
    inputs.forEach(i => { tot += Number(i.value) || 0; });
    const t = body.querySelector('#ep_manual_total');
    if (t) t.textContent = tot;
  };
  body.querySelector('#ep_manual').onchange = (e) => {
    body.querySelector('#ep_manual_panel').style.display = e.target.checked ? '' : 'none';
  };
  body.querySelectorAll('input[data-strk]').forEach(i => { i.oninput = recalcTotal; });
  recalcTotal();

  submitBtn.onclick = async () => {
    const err = body.querySelector('#ep_err');
    err.style.display = 'none';
    const name = body.querySelector('#ep_name').value.trim();
    const hcp  = body.querySelector('#ep_hcp').value;
    const teeId = body.querySelector('#ep_tee').value;
    if (!name) { err.textContent = 'Name is required.'; err.style.display = 'block'; return; }
    // Collect manual overrides (or set explicit null to clear them).
    let stroke_overrides = null;
    if (body.querySelector('#ep_manual').checked) {
      stroke_overrides = {};
      body.querySelectorAll('input[data-strk]').forEach(i => {
        const v = Number(i.value);
        if (Number.isFinite(v) && v !== 0) stroke_overrides[i.dataset.strk] = v;
      });
      if (!Object.keys(stroke_overrides).length) stroke_overrides = null; // empty = no override
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Saving…';
    try {
      const url = opts.kind === 'entry'
        ? `/api/rounds/${opts.roundId}/entries/${current.id}`
        : `/api/rounds/${opts.roundId}/team-members/${current.id}`;
      await JORD.api(url, { method: 'PATCH', body: {
        name, handicap_index: hcp === '' ? null : Number(hcp), tee_id: teeId || null,
        stroke_overrides,
      }});
      m.close();
      JORD.success && JORD.success('Saved');
      openTournament(opts.trnId);
    } catch (e) {
      err.textContent = e.message || 'Could not save.';
      err.style.display = 'block';
      submitBtn.disabled = false; submitBtn.textContent = 'Save changes';
    }
  };
}
async function setStatus(roundId,status,trnId) {
  if (status==='ended' && !await JORD.confirm('End the round? Scores will lock.',{danger:true})) return;
  await JORD.api(`/api/rounds/${roundId}/status`,{method:'POST',body:{status}});
  openTournament(trnId);
}

/* ─── share + edit modals (Clubhouse v3.48) ───────────────────────── */
function openShareModal(t, shareUrl) {
  // QR code via api.qrserver.com — same pattern the walk-up check-in uses
  // so we don't pull in another dependency.
  const qrSize = 220;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=${encodeURIComponent(shareUrl)}`;
  const body = JORD.el('div', { class: 'col gap-3', style: { textAlign: 'center' } },
    JORD.el('p', { class: 'small', style: { color: 'var(--ink-2)' } },
      'Anyone with this link can join the game. They\'ll see the players, the format, and a one-tap "I\'m in" button.'),
    JORD.el('img', { src: qrUrl, alt: 'Share QR', style: { width: qrSize + 'px', height: qrSize + 'px', alignSelf: 'center', border: '1px solid var(--border)', borderRadius: '8px', padding: '8px', background: '#fff' } }),
    JORD.el('input', { class: 'input', value: shareUrl, readonly: true, onclick: function() { this.select(); }, style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '13px' } }),
    JORD.el('div', { class: 'row gap-2', style: { justifyContent: 'center', flexWrap: 'wrap' } },
      JORD.el('button', { class: 'btn btn-primary', type: 'button', on: { click: () => {
        JORD.copyToClipboard(shareUrl).then(() => JORD.success('Link copied — text it to your group'));
      }}}, '📋 Copy link'),
      // iOS rejects `sms:?&body=…` with "The string did not match the expected
      // pattern." — the first param after `?` must not be preceded by `&`.
      JORD.el('a', { class: 'btn btn-ghost', href: `sms:&body=${encodeURIComponent('Join the game: ' + shareUrl)}` }, '💬 Text it'),
      JORD.el('a', { class: 'btn btn-ghost', href: `mailto:?subject=Join%20the%20game&body=${encodeURIComponent(shareUrl)}` }, '📧 Email')
    ),
    JORD.el('div', { class: 'mini', style: { color: 'var(--ink-3)', marginTop: '4px' } }, 'Share code: ' + (t.share_code || '—'))
  );
  JORD.modal({ title: 'Share with your group', body });
}

function openEditModal(t) {
  // Pulls the current round's metadata so the user can change date / format /
  // course without re-running the wizard. PATCH /api/tournaments/:id covers
  // both tournament and round-level fields.
  const round = t.rounds[0] || {};
  const fmtSelect = JORD.el('select', { class: 'input', id: 'eg-format' });
  // Build a flat list from the loaded formats catalog. Already-loaded in S.formats.
  const tiers = [
    { label: 'Individual', items: S.formats?.individual || [] },
    { label: 'Pair',       items: S.formats?.pair       || [] },
    { label: 'Team',       items: S.formats?.team       || [] },
  ];
  for (const tier of tiers) {
    if (!tier.items.length) continue;
    const grp = document.createElement('optgroup');
    grp.label = tier.label;
    for (const f of tier.items) {
      const opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = `${f.name} · ${f.sub || ''}`.trim();
      if (f.id === t.default_format) opt.selected = true;
      grp.appendChild(opt);
    }
    fmtSelect.appendChild(grp);
  }

  const nameInput = JORD.el('input', { class: 'input', value: t.name, id: 'eg-name' });
  const dateInput = JORD.el('input', { class: 'input', type: 'date', value: round.round_date || '', id: 'eg-date' });

  const body = JORD.el('div', { class: 'col gap-3' },
    JORD.el('div', { class: 'field' }, JORD.el('label', null, 'Game name'), nameInput),
    JORD.el('div', { class: 'field' }, JORD.el('label', null, 'Date'), dateInput),
    JORD.el('div', { class: 'field' }, JORD.el('label', null, 'Format'), fmtSelect),
    JORD.el('p', { class: 'mini', style: { color: 'var(--ink-3)' } }, 'Course can be changed before the round starts — re-pick from the wizard for now.')
  );

  const saveBtn = JORD.el('button', { class: 'btn btn-primary', type: 'button' }, 'Save changes');
  const m = JORD.modal({ title: 'Edit game', body, footer: saveBtn });

  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      await JORD.api(`/api/tournaments/${t.id}`, { method: 'PATCH', body: {
        name: nameInput.value.trim(),
        default_format: fmtSelect.value,
        round_date: dateInput.value || null,
      }});
      m.close();
      JORD.success('Game updated');
      await loadAll();
      openTournament(t.id);
    } catch (e) {
      JORD.error(e.message);
      saveBtn.disabled = false; saveBtn.textContent = 'Save changes';
    }
  });
}

/* ─── boot ─────────────────────────────────────────────────────────── */
async function init() {
  try {
    await loadAll();
    route();
    // Welcome toast for users who just signed up — flag set by /login.
    if (sessionStorage.getItem('jord_just_signed_up') === 'personal') {
      sessionStorage.removeItem('jord_just_signed_up');
      JORD.success('Account created — welcome to the Clubhouse! Start your first game with + Create a game.');
    }
  } catch(e){
    if (e.status === 401) {
      // Stale token — drop both and route to /login so the next sign-in
      // can be either user or admin.
      try { JORD.clearToken && JORD.clearToken(); } catch {}
      try { JORD.clearUserToken && JORD.clearUserToken(); } catch {}
      location.href = '/login';
    } else { JORD.error(e.message); }
  }
}
init();
</script>
