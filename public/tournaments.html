<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>The Clubhouse · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:var(--s-3); margin:var(--s-5) 0; flex-wrap:wrap; }
  .page-head h1 { font-family:var(--font-display); font-size:clamp(1.7rem,5vw,2.6rem); letter-spacing:-0.02em; }
  .page-head h1 em { font-style:italic; color:var(--accent); }
  .row-card { display:flex; align-items:center; justify-content:space-between; gap:var(--s-3); padding:14px 18px; border:1px solid var(--border); border-radius:var(--r-sm); background:var(--surface); margin-bottom:var(--s-2); flex-wrap:wrap; }
  .row-card .meta { font-size:13px; color:var(--ink-2); }
  .mini { font-size:12px; color:var(--ink-3); }

  /* Clubhouse home — photo hero + clickable tiles */
  .cl-hero { position:relative; border-radius:var(--r-lg); overflow:hidden; margin:var(--s-5) 0 var(--s-6);
    background-image:linear-gradient(155deg, rgba(20,19,18,.58), rgba(20,19,18,.80)), url(/img/lifestyle/hero-drive-followthrough-1600.jpg);
    background-size:cover; background-position:center 30%; }
  .cl-hero-inner { padding:var(--s-8) var(--s-6); max-width:580px; }
  .cl-hero .eyebrow { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.6); font-weight:700; }
  .cl-hero h1 { font-family:var(--font-display); color:#fff; font-size:clamp(2rem,6vw,3.2rem); letter-spacing:-0.02em; margin:8px 0 var(--s-3); }
  .cl-hero h1 em { font-style:italic; color:var(--accent); }
  .cl-hero p { color:rgba(255,255,255,.85); font-size:15px; max-width:460px; margin-bottom:var(--s-4); line-height:1.55; }
  .sec-head { font-family:var(--font-display); font-size:1.5rem; }
  .sec-head-row { display:flex; justify-content:space-between; align-items:center; margin:var(--s-6) 0 var(--s-3); }
  .sec-head-row .sec-head { margin:0; }
  .tile-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:var(--s-3); }
  .tile { display:flex; align-items:center; gap:var(--s-3); border:2px solid var(--border); border-radius:var(--r-lg);
    padding:var(--s-4); background:var(--surface); cursor:pointer; position:relative;
    transition:transform var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast); }
  .tile:hover { transform:translateY(-3px); border-color:var(--ink); box-shadow:0 8px 22px rgba(0,0,0,.09); }
  .tile-icon { width:52px; height:52px; border-radius:50%; background:var(--surface-2); display:flex;
    align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .tile-body { flex:1; min-width:0; }
  .tile-body h3 { font-family:var(--font-display); font-size:1.15rem; }
  .tile-body .meta { font-size:12.5px; color:var(--ink-2); margin:2px 0 5px; }
  .tile-new { border-style:dashed; justify-content:center; text-align:center; color:var(--ink-2);
    font-weight:600; font-family:var(--font-display); font-size:1.05rem; }
  .tile-course { cursor:default; }
  .tile-course:hover { transform:none; border-color:var(--border); box-shadow:none; }
  .tile-x { position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%;
    border:1px solid var(--border-2); background:var(--surface); cursor:pointer; font-size:13px; }
  /* Delete X on a game tile — hidden until the tile is hovered so it doesn't
     compete with the open-the-game tap target. */
  .tile-del { position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:50%;
    border:1px solid var(--border-2); background:var(--surface); color:var(--ink-3); cursor:pointer;
    font-size:16px; line-height:1; padding:0; display:none; align-items:center; justify-content:center; z-index:1; }
  .tile:hover .tile-del, .tile:focus-within .tile-del { display:flex; }
  .tile-del:hover { background:#FDECEC; color:var(--danger); border-color:#f5c6c6; }
  .inline-panel { border:1px solid var(--border); border-radius:var(--r-sm); padding:var(--s-4); background:var(--surface); margin-bottom:var(--s-4); }
  .sc-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:6px; margin:var(--s-3) 0; }
  .sc-grid .h-cell label { font-size:10px; color:var(--ink-3); font-weight:700; display:block; text-align:center; }
  .sc-grid input { width:100%; padding:6px 2px; text-align:center; font-size:13px; border:1px solid var(--border); border-radius:6px; background:var(--surface); }
  /* Per-tee yardage row inside the multi-tee course-add form. */
  .tee-box { border:1px solid var(--border); border-radius:var(--r-md, var(--r-sm)); padding:var(--s-3); margin-top:var(--s-3); background:var(--surface); }
  .tee-box-head { display:flex; align-items:center; gap:var(--s-2); margin-bottom:var(--s-2); }
  .tee-box-head .tee-color { width:14px; height:14px; border-radius:50%; border:1px solid var(--border-2); flex-shrink:0; }
  .tee-box-head input.tee-name { flex:1; font-weight:700; }
  .tee-box-head .rm-tee { background:transparent; border:none; color:var(--ink-3); cursor:pointer; font-size:18px; padding:4px 8px; }
  .tee-box-head .rm-tee:hover { color:var(--danger); }
  .tee-yards { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin-top:6px; }
  .tee-yards .y-cell label { font-size:10px; color:var(--ink-3); font-weight:700; display:block; text-align:center; }
  .tee-yards .y-cell input { width:100%; padding:4px 2px; text-align:center; font-size:12px; border:1px solid var(--border); border-radius:5px; background:var(--surface-2); }
  .search-result { display:flex; justify-content:space-between; align-items:center; gap:var(--s-3); padding:10px 12px; border-bottom:1px solid var(--border); }
  .seg { display:inline-flex; border:1px solid var(--border-2); border-radius:var(--r-sm); overflow:hidden; }
  .seg button { padding:8px 16px; background:var(--surface); border:none; cursor:pointer; font-weight:600; font-size:13px; color:var(--ink-2); }
  .seg button.is-active { background:var(--primary); color:var(--primary-ink); }

  /* wizard */
  .wiz-steps { display:flex; gap:6px; margin:var(--s-4) 0 var(--s-5); }
  .wiz-steps span { flex:1; height:6px; border-radius:3px; background:var(--surface-2); transition:background var(--t-fast); }
  .wiz-steps span.done { background:var(--accent); }
  .wiz-steps span.current { background:var(--primary); }

  .pick-card { border:2px solid var(--border); border-radius:var(--r-lg); padding:var(--s-4) var(--s-5);
    background:var(--surface); cursor:pointer; margin-bottom:var(--s-3);
    transition:transform var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast); }
  .pick-card:hover { transform:translateY(-2px); border-color:var(--ink); box-shadow:0 6px 18px rgba(0,0,0,.08); }
  .pick-card.is-sel { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent) inset; }
  .pick-card.disabled { opacity:.45; cursor:not-allowed; }
  .pick-card.disabled:hover { transform:none; box-shadow:none; border-color:var(--border); }
  .pick-card h3 { font-family:var(--font-display); font-size:1.3rem; }
  .pick-card .sub { font-size:14px; color:var(--ink-2); font-weight:400; }
  .pick-card .desc { font-size:13.5px; color:var(--ink-2); margin-top:4px; }
  .type-card { display:flex; align-items:center; gap:var(--s-4); }
  .pc-icon { width:58px; height:58px; border-radius:50%; background:var(--surface-2); display:flex;
    align-items:center; justify-content:center; font-size:28px; flex-shrink:0; transition:background var(--t-fast); }
  .pick-card.is-sel .pc-icon { background:var(--accent); }

  .fmt-tier-head { font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; color:var(--ink-3); margin:var(--s-5) 0 var(--s-2); }
  .fmt-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:var(--s-3); }
  .fmt-card { border:2px solid var(--border); border-radius:var(--r-lg); padding:18px 12px 14px; background:var(--surface);
    cursor:pointer; position:relative; text-align:center;
    transition: transform var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast); }
  .fmt-card:hover { transform:translateY(-3px); border-color:var(--accent); box-shadow:0 8px 24px rgba(26,26,26,.12); }
  .fmt-card.is-sel { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent) inset; background:#FFFCF2; }
  .fmt-card.disabled { opacity:.45; cursor:not-allowed; }
  .fmt-card.disabled:hover { transform:none; border-color:var(--border); box-shadow:none; }
  .fmt-card .fc-emoji { font-size:36px; line-height:1; transition: transform var(--t-fast); display:block; }
  .fmt-card:hover .fc-emoji { transform:scale(1.18) rotate(-4deg); }
  .fmt-card.is-sel .fc-emoji { transform:scale(1.18); }
  .fmt-card .nm { font-weight:700; font-size:15px; margin-top:8px; }
  .fmt-card .sub { font-size:12px; color:var(--ink-2); }
  .fmt-card .badge { position:absolute; top:6px; right:6px; font-size:9px; font-weight:700;
    background:var(--surface-2); color:var(--ink-3); padding:2px 6px; border-radius:8px; letter-spacing:.04em; }
  .fmt-card .badge.manual { background:#FFF1D6; color:#7A5400; }
  .fmt-card .badge.soon   { background:var(--surface-2); color:var(--ink-3); }
  /* Description bubble — appears only on hover OR keyboard-focus.
   * The previously-selected card no longer sticks the bubble open, since
   * a perma-bubble on the selected card was always-on and noisy. */
  .fmt-card .fc-bubble {
    position:absolute; bottom: calc(100% + 10px); left:50%; transform: translateX(-50%) translateY(4px);
    width:240px;
    background:var(--surface);
    color:var(--ink);
    border:1px solid var(--border-2);
    border-radius:var(--r-md, var(--r-sm));
    padding:11px 13px; font-size:12.5px; font-weight:400; line-height:1.5;
    z-index:60;
    box-shadow:0 14px 32px rgba(26,26,26,.16), 0 2px 6px rgba(26,26,26,.08);
    text-align:left; pointer-events:none;
    opacity:0; transition: opacity .18s ease, transform .18s ease;
  }
  .fmt-card .fc-bubble strong { color:var(--ink); font-weight:700; letter-spacing:-.005em; }
  .fmt-card .fc-bubble em { color:var(--accent); font-style:italic; font-weight:500; }
  /* Tiny tail — paints the cream tip on top of the matching border so the seam disappears. */
  .fmt-card .fc-bubble::before,
  .fmt-card .fc-bubble::after {
    content:''; position:absolute; left:50%; transform:translateX(-50%);
    border:7px solid transparent;
  }
  .fmt-card .fc-bubble::before { top:100%; border-top-color:var(--border-2); }
  .fmt-card .fc-bubble::after  { top: calc(100% - 1px); border-top-color:var(--surface); }
  .fmt-card:hover .fc-bubble, .fmt-card:focus-within .fc-bubble {
    opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;
  }
  .fmt-card.disabled:hover .fc-bubble { opacity:0; }
  @media (max-width: 640px) {
    /* on phones, anchor the bubble to the side so it doesn't clip off the screen */
    .fmt-grid { grid-template-columns: 1fr 1fr; }
    .fmt-card .fc-bubble { width: 200px; }
  }
  /* Wagering & points panel — appears when picked format has a settings schema */
  .fmt-wager { margin-top:var(--s-3); padding:var(--s-4); background:#FFFCF2;
    border:1px solid var(--accent); border-radius:var(--r-lg); }
  .fmt-wager h4 { font-family:var(--font-display); font-size:1.05rem; letter-spacing:-.01em; margin:0 0 4px; }
  .fmt-wager .sub { font-size:13px; color:var(--ink-2); margin-bottom:var(--s-3); }
  .fmt-wager .wager-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--s-3); }
  @media (max-width: 560px) { .fmt-wager .wager-grid { grid-template-columns:1fr; } }
  .fmt-wager .wager-prefix { position:relative; }
  .fmt-wager .wager-prefix > input { padding-left:24px; }
  .fmt-wager .wager-prefix > span.prefix { position:absolute; left:10px; top:50%; transform:translateY(-50%);
    color:var(--ink-3); font-weight:600; font-size:14px; pointer-events:none; }
  .fmt-wager .dots-list { display:flex; flex-direction:column; gap:6px; }
  .fmt-wager .dot-row { display:grid; grid-template-columns: 1fr 70px auto; gap:8px; align-items:center; }
  .fmt-wager .dot-row input.label-in { font-size:13px; }
  .fmt-wager .dot-row input.pts-in { text-align:right; }
  .fmt-wager .dot-row .rm-btn { background:transparent; border:none; color:var(--ink-3); cursor:pointer;
    width:28px; height:28px; border-radius:50%; font-size:18px; line-height:1; }
  .fmt-wager .dot-row .rm-btn:hover { background:var(--surface-2); color:var(--danger); }
  .fmt-wager .toggle-row { display:flex; align-items:center; gap:10px; padding:6px 0; }
  .fmt-wager .toggle-row input { width:18px; height:18px; accent-color:var(--accent); }

  /* Side bets panel (v3.60) — layers a second scoring game on top of the primary. */
  .fmt-sidebets { margin-top:var(--s-3); padding:var(--s-4);
    background:var(--surface); border:1px dashed var(--accent); border-radius:var(--r-lg); }
  .fmt-sidebets h4 { font-family:var(--font-display); font-size:1.05rem; letter-spacing:-.01em; margin:0 0 4px; }
  .fmt-sidebets .sub { font-size:13px; color:var(--ink-2); margin-bottom:var(--s-3); }
  .fmt-sidebets .sb-list { display:flex; flex-direction:column; gap:var(--s-3); }
  .fmt-sidebets .sb-row { display:flex; align-items:flex-start; gap:10px; cursor:pointer; padding:8px 10px;
    border:1px solid var(--border); border-radius:var(--r-sm); background:var(--surface); }
  .fmt-sidebets .sb-row:hover { border-color:var(--accent); }
  .fmt-sidebets .sb-row input[type=checkbox] { width:18px; height:18px; accent-color:var(--accent); margin-top:2px; }
  .fmt-sidebets .sb-emoji { font-size:22px; line-height:1; margin-top:-1px; }
  .fmt-sidebets .sb-meta { display:flex; flex-direction:column; gap:2px; }
  .fmt-sidebets .sb-meta .sb-name { font-weight:700; font-size:14px; }
  .fmt-sidebets .sb-meta .sb-sub  { font-weight:500; color:var(--ink-2); font-size:13px; }
  .fmt-sidebets .sb-meta .sb-desc { font-size:12.5px; color:var(--ink-2); line-height:1.5; }
  .fmt-sidebets .sb-settings { margin-top:6px; padding:10px 12px; background:#FFFCF2;
    border:1px solid var(--accent); border-radius:var(--r-sm); display:grid; grid-template-columns:1fr 1fr; gap:var(--s-3); }
  @media (max-width: 560px) { .fmt-sidebets .sb-settings { grid-template-columns:1fr; } }
  .wiz-nav { display:flex; justify-content:space-between; gap:var(--s-3); margin-top:var(--s-6); }
  .holes-opt { display:flex; gap:var(--s-2); flex-wrap:wrap; }
  .holes-opt button { flex:1; min-width:110px; padding:18px 10px; font-size:15px; font-weight:700; border-radius:var(--r-lg); }

  /* tooltips — info bubble on a setting label */
  .help-icon { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px;
    border-radius:50%; background:var(--surface-2); color:var(--ink-2); font-size:11px; font-weight:700;
    cursor:help; margin-left:5px; position:relative; vertical-align:middle; font-style:normal; }
  .help-icon:hover, .help-icon:focus { background:var(--accent); color:#FBF9F4; outline:none; }
  .help-icon .tooltip { display:none; position:absolute; bottom:calc(100% + 7px); left:50%; transform:translateX(-50%);
    width:220px; background:var(--ink); color:var(--surface); border-radius:var(--r-sm); padding:9px 11px;
    font-size:12px; font-weight:400; line-height:1.45; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.22); text-align:left; }
  .help-icon:hover .tooltip, .help-icon:focus .tooltip { display:block; }
  .ac-wrap { position:relative; }
  .ac-list { position:absolute; left:0; right:0; top:calc(100% + 2px); z-index:30; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--r-sm); max-height:260px; overflow:auto;
    box-shadow:0 8px 24px rgba(0,0,0,.14); }
  .ac-list:empty { display:none; }
  .ac-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--border); font-size:14px; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:hover { background:var(--surface-2); }
  .ac-item .meta { font-size:12px; color:var(--ink-3); margin-top:2px; }
</style>
</head>
<body>
<div id="topbar"></div>
<main class="container container-md">
  <div id="view"></div>
</main>
<script src="/js/jord.js"></script>
<script>
const $ = (s,r=document)=>r.querySelector(s);
const esc = JORD.escapeHtml;
// Clubhouse is open to BOTH organizer admins and signed-in personal users.
// Send anonymous visitors to /login (personal sign-in), which has an
// "Or sign in as an organizer" link if they're actually an admin.
const HAS_ADMIN_TOKEN = !!JORD.getToken();
const HAS_USER_TOKEN  = !!(JORD.getUserToken && JORD.getUserToken());
if (!HAS_ADMIN_TOKEN && !HAS_USER_TOKEN) {
  location.href = '/login?next=' + encodeURIComponent(location.pathname + location.hash);
}

/* info bubble for a setting label — hover or tap the ⓘ to read what it does */
const help = txt => `<span class="help-icon" tabindex="0">i<span class="tooltip">${esc(txt)}</span></span>`;
/* fallback emoji per scoring engine — only used if the format catalog hasn't
 * set its own emoji (v3.59 added per-format emojis; this is a safety net). */
const FMT_EMOJI = { stroke:'⛳', stableford:'🏅', scramble:'🤝', bestball:'🔥',
  matchplay:'⚔️', skins:'💰', erado:'✂️', duplicate:'🎲',
  vegas:'🎲', nassau:'🏆', bbb:'🔔', dots:'🎰', snake:'🐍',
  chapman:'🌲', sixes:'🔄', foursomes_stroke:'🔁', lownet:'📊', rumble:'☘️' };
const fmtEmoji = f => f && (f.emoji || FMT_EMOJI[f.engine] || '⛳');

// Topbar — admins see the Admin link; personal users see Settings + Log out.
async function _logout() {
  try { await JORD.api('/api/users/logout', { method:'POST' }); } catch {}
  try { JORD.clearUserToken && JORD.clearUserToken(); } catch {}
  try { JORD.clearToken && JORD.clearToken(); } catch {}
  location.href = '/';
}
const topbarRight = HAS_ADMIN_TOKEN
  ? JORD.el('a',{class:'btn btn-ghost',href:'/admin'},'← Admin')
  : JORD.el('div',{class:'inline-buttons',style:{display:'flex',gap:'8px'}},
      JORD.el('a',{class:'btn btn-ghost',href:'/account'},'⚙ Settings'),
      JORD.el('button',{class:'btn btn-ghost',type:'button',on:{click:_logout}},'Log out'));
document.getElementById('topbar').appendChild(JORD.renderTopbar('Clubhouse', topbarRight));

const S = { courses:[], tournaments:[], formats:null, wiz:null };

/* A format is pickable when it auto-scores OR uses manual scoring (the
 * round still saves and runs; the leaderboard just doesn't auto-tally
 * for the manual ones yet). Both states are valid game configurations. */
function pickable(f){ return !!(f.scored || f.manualScoring); }
function findFmt(id){ return S.formats ?
  [...S.formats.individual,...S.formats.pair,...S.formats.team].find(f=>f.id===id) : null; }
function isTeamFormat(){ const f=findFmt(S.wiz&&S.wiz.format); return !!(f && f.teamSize[1]>1); }

async function loadAll() {
  // Signed-in personal users see games they created OR joined (via
  // /api/tournaments/mine). Admins still see admin-scoped tournaments
  // from /api/tournaments. The two endpoints return the same shape, so
  // the home view doesn't care which one supplied the rows.
  const tournamentsPromise = HAS_USER_TOKEN && !HAS_ADMIN_TOKEN
    ? JORD.api('/api/tournaments/mine').then(r => r.tournaments || [])
    : JORD.api('/api/tournaments');
  [S.courses, S.tournaments, S.formats] = await Promise.all([
    JORD.api('/api/courses'), tournamentsPromise, JORD.api('/api/formats'),
  ]);
}

/* ─── home ─────────────────────────────────────────────────────────── */
function renderHome() {
  $('#view').innerHTML = `
    <div class="cl-hero"><div class="cl-hero-inner">
      <div class="eyebrow">JORD Golf</div>
      <h1>The <em>Clubhouse</em></h1>
      <p>Set up a casual round with friends, a charity scramble or a multi-day tournament —
        20 game formats and live scoring, all in one place.</p>
      <button class="btn btn-accent btn-xl" id="create">＋ Create a game</button>
    </div></div>

    <div id="upgradeCard"></div>

    <h2 class="sec-head">Your games</h2>
    <div id="trnList" class="tile-grid"></div>

    <div class="sec-head-row">
      <h2 class="sec-head">Courses</h2>
      <button class="btn btn-ghost" id="addCourse">+ Add course</button>
    </div>
    <div id="coursePanel"></div>
    <div id="courseList" class="tile-grid"></div>`;
  renderTrnList(); renderCourseList();
  // Only personal users (not admins) see the upgrade card. Admins already
  // have organizer powers.
  if (HAS_USER_TOKEN && !HAS_ADMIN_TOKEN) renderUpgradeCard();
  $('#create').onclick = () => go('new/type');
  $('#addCourse').onclick = toggleCoursePanel;
}

/* ─── Organizer-upgrade CTA + modal (v3.53) ─────────────────────────
   Shown only to signed-in personal users. The card changes state based
   on whether they have a pending / approved / declined request on file:
     • none      → "Request access" button
     • pending   → "Request pending — we're reviewing" + disabled action
     • accepted  → "Approved — open admin console" linking to /admin
     • rejected  → "Declined. Reach out if you have questions."           */
async function renderUpgradeCard() {
  let r = null;
  try {
    const data = await JORD.api('/api/users/organizer-request-status');
    r = data && data.request;
  } catch { /* not signed in or error — skip the card */ }
  const card = $('#upgradeCard');
  if (!card) return;
  let body, btn;
  if (!r) {
    body = `<strong>Running a charity tournament or corporate event?</strong>
      <p style="font-size:14px;color:var(--ink-2);margin:6px 0 var(--s-2)">Branded event site at /e/your-slug, online registration via Stripe, check-in + pairings + scoring on event day. Our team reviews each request to keep the platform clean.</p>`;
    btn = `<button class="btn btn-primary" id="btnUpgrade">Request organizer access →</button>`;
  } else if (r.status === 'pending') {
    body = `<strong>⏳ Request in review</strong>
      <p style="font-size:14px;color:var(--ink-2);margin:6px 0 var(--s-2)">Our team is vetting your organizer request. We'll email you when we've decided — usually within a couple of business days.</p>`;
    btn = '';
  } else if (r.status === 'accepted') {
    body = `<strong>✅ You're approved as an organizer</strong>
      <p style="font-size:14px;color:var(--ink-2);margin:6px 0 var(--s-2)">Sign in at the admin console with your existing email + password. Same login as here.</p>`;
    btn = `<a class="btn btn-primary" href="/admin">Open admin console →</a>`;
  } else if (r.status === 'rejected') {
    body = `<strong>Request declined</strong>
      <p style="font-size:14px;color:var(--ink-2);margin:6px 0 var(--s-2)">Our team didn't approve this request. Reply to the email you received, or reach out to support@jordgolf.com for more details.</p>`;
    btn = '';
  } else {
    return;
  }
  card.innerHTML = `<div class="card" style="margin:var(--s-4) 0;background:linear-gradient(135deg,rgba(184,136,77,.06),rgba(184,136,77,.02));border-color:rgba(184,136,77,.30)">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--s-3);flex-wrap:wrap">
      <div style="flex:1;min-width:240px">${body}</div>
      <div>${btn}</div>
    </div>
  </div>`;
  if (!r) {
    const b = $('#btnUpgrade');
    if (b) b.onclick = openUpgradeModal;
  }
}

async function doCourseSearch() {

// Multi-tee course state (kept on the closure so render/wire calls share it).
const _newCourse = { tees: [] };
const TEE_COLORS = { black:'#1a1a1a', blue:'#1f3f7a', white:'#FBF9F4',
  gold:'#c9a227', red:'#a12c2c', green:'#2d5d36', silver:'#cccccc' };
function _teeSwatch(name) {
  const k = String(name || '').toLowerCase().split(/\s+/)[0];
  return TEE_COLORS[k] || '#ddd';
}
function courseManualMode() {
  // Reset state on each open so reopening doesn't accumulate stale tees.
  _newCourse.tees = [
    { name: 'Blue',  gender: 'male',   course_rating: '', slope_rating: '', yards: Array(18).fill('') },
    { name: 'White', gender: 'male',   course_rating: '', slope_rating: '', yards: Array(18).fill('') },
  ];
  let parSiHoles = '';
  for (let h = 1; h <= 18; h++) parSiHoles += `<div class="h-cell"><label>${h}</label>
    <input type="number" min="3" max="6" value="4" data-par="${h}" />
    <input type="number" min="1" max="18" value="${h}" data-si="${h}" /></div>`;
  $('#courseMode').innerHTML = `
    <div class="field-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="field"><label>Course name</label><input class="input" id="mName" /></div>
      <div class="field"><label>City</label><input class="input" id="mCity" /></div>
      <div class="field"><label>State</label><input class="input" id="mState" /></div>
    </div>
    <p class="mini" style="margin-top:var(--s-3)">Per hole: <strong>par</strong> + <strong>stroke index</strong> (1 = hardest). These are
      the same across every tee box. Yardage + rating + slope are per-tee, below.</p>
    <div class="sc-grid">${parSiHoles}</div>
    <h3 style="font-family:var(--font-display);margin-top:var(--s-4)">Tee boxes</h3>
    <p class="mini">Add a row per tee — Black, Blue, White, Gold, Red, etc. USGA NCRDB has every official rating/slope:
      <a href="https://ncrdb.usga.org/" target="_blank" rel="noopener">ncrdb.usga.org</a>.</p>
    <div id="teesPanel"></div>
    <button class="btn btn-ghost" id="addTee" type="button">+ Add tee box</button>
    <div style="margin-top:var(--s-4)"><button class="btn btn-primary" id="mSave">Save course</button></div>`;
  $('#mSave').onclick = saveManualCourse;
  $('#addTee').onclick = () => {
    _newCourse.tees.push({ name: '', gender: 'male', course_rating: '', slope_rating: '', yards: Array(18).fill('') });
    renderTees();
  };
  renderTees();
}
function renderTees() {
  const el = $('#teesPanel');
  if (!el) return;
  el.innerHTML = _newCourse.tees.map((t, ti) => `
    <div class="tee-box" data-tee="${ti}">
      <div class="tee-box-head">
        <span class="tee-color" style="background:${_teeSwatch(t.name)}"></span>
        <input class="input tee-name" placeholder="Tee name (e.g. Black)" value="${esc(t.name)}" data-tname="${ti}" />
        <select class="input" style="width:120px" data-tgender="${ti}">
          <option value="male"   ${t.gender==='male'?'selected':''}>Male</option>
          <option value="female" ${t.gender==='female'?'selected':''}>Female</option>
          <option value="any"    ${t.gender==='any'?'selected':''}>Any</option>
        </select>
        <input class="input" style="width:80px" type="number" step="0.1" placeholder="CR" value="${esc(t.course_rating)}" data-tcr="${ti}" title="Course rating" />
        <input class="input" style="width:80px" type="number" placeholder="Slope" value="${esc(t.slope_rating)}" data-tslope="${ti}" title="Slope rating" />
        ${_newCourse.tees.length > 1 ? `<button class="rm-tee" type="button" data-rm-tee="${ti}" title="Remove tee">×</button>` : ''}
      </div>
      <div class="tee-yards">${Array.from({length:18}, (_, i) => `
        <div class="y-cell"><label>${i+1}</label>
          <input type="number" min="0" placeholder="yds" value="${esc(t.yards[i] || '')}" data-tyd="${ti}.${i}" /></div>`).join('')}</div>
    </div>`).join('');
  // Wire up all the inputs to keep _newCourse in sync.
  el.querySelectorAll('[data-tname]').forEach(i => i.oninput = e => {
    _newCourse.tees[+i.dataset.tname].name = e.target.value;
    // Re-render the swatch only — cheap full re-render.
    renderTees();
  });
  el.querySelectorAll('[data-tgender]').forEach(i => i.onchange = e => { _newCourse.tees[+i.dataset.tgender].gender = e.target.value; });
  el.querySelectorAll('[data-tcr]').forEach(i => i.oninput = e => { _newCourse.tees[+i.dataset.tcr].course_rating = e.target.value; });
  el.querySelectorAll('[data-tslope]').forEach(i => i.oninput = e => { _newCourse.tees[+i.dataset.tslope].slope_rating = e.target.value; });
  el.querySelectorAll('[data-tyd]').forEach(i => i.oninput = e => {
    const [ti, idx] = i.dataset.tyd.split('.').map(Number);
    _newCourse.tees[ti].yards[idx] = e.target.value;
  });
  el.querySelectorAll('[data-rm-tee]').forEach(b => b.onclick = () => {
    _newCourse.tees.splice(+b.dataset.rmTee, 1); renderTees();
  });
}
async function saveManualCourse() {
  const name = $('#mName').value.trim();
  if (!name) { JORD.warn('Course name required'); return; }
  if (!_newCourse.tees.length) { JORD.warn('Add at least one tee box'); return; }
  if (_newCourse.tees.some(t => !t.name.trim())) { JORD.warn('Every tee needs a name'); return; }
  // Per-hole par + SI is shared across tees; yardages are per-tee.
  const parSi = [];
  for (let h = 1; h <= 18; h++) parSi.push({
    par: +$(`[data-par="${h}"]`).value || 4,
    stroke_index: +$(`[data-si="${h}"]`).value || h,
  });
  const tees = _newCourse.tees.map(t => ({
    name: t.name.trim(),
    gender: t.gender || 'male',
    course_rating: t.course_rating === '' ? null : Number(t.course_rating),
    slope_rating:  t.slope_rating === ''  ? null : Number(t.slope_rating),
    holes: Array.from({length:18}, (_, i) => ({
      hole_number: i+1,
      par: parSi[i].par,
      stroke_index: parSi[i].stroke_index,
      yardage: t.yards[i] === '' ? null : Number(t.yards[i]) || null,
    })),
  }));
  try {
    await JORD.api('/api/courses', { method: 'POST', body: {
      name, city: $('#mCity').value.trim(), state: $('#mState').value.trim(), tees,
    }});
    await loadAll(); renderHome(); JORD.success(`Course saved with ${tees.length} tee box${tees.length===1?'':'es'}`);
  } catch(e) { JORD.error(e.message); }
}

/* ─── wizard ───────────────────────────────────────────────────────── */
function startWizard() {
  S.wiz = { step:'type', type:null, course_id:null, holes_segment:'all',
    name:'', date:new Date().toISOString().slice(0,10), format:'stroke_net',
    format_settings: defaultsForFormat('stroke_net'),
    side_bets: [],
    flights_enabled:false, num_flights:2, num_rounds:1, players:[], teams:[], reds:[], blues:[] };
}
const STEPS = ['type','course','setup','players'];

/* ─── hash routing — every view has its own URL so back/forward work ── */
function go(hash) { location.hash = hash; }
function route() {
  const parts = location.hash.replace(/^#\/?/,'').split('/');
  if (parts[0] === 'new') {
    if (!S.wiz) startWizard();                          // fresh wizard → step 'type'
    else S.wiz.step = STEPS.includes(parts[1]) ? parts[1] : 'type';
    renderWizard();
  } else if (parts[0] === 'game' && parts[1]) {
    openTournament(parts[1]);
  } else {
    S.wiz = null;
    renderHome();
  }
}
window.addEventListener('hashchange', route);

function renderWizard() {
  const w = S.wiz, i = STEPS.indexOf(w.step);
  $('#view').innerHTML = `
    <div class="page-head"><h1>New <em>game</em></h1>
      <button class="btn btn-ghost" id="cancel">Cancel</button></div>
    <div class="wiz-steps">${STEPS.map((s,idx)=>`<span class="${idx<i?'done':idx===i?'current':''}"></span>`).join('')}</div>
    <div id="wizBody"></div>`;
  $('#cancel').onclick = () => go('');
  const lastStep = w.type==='reds_blues' ? stepRvb : (isTeamFormat() ? stepTeams : stepPlayers);
  ({ type:stepType, course:stepCourse, setup:stepSetup, players:lastStep }[w.step])();
}
function nav(backFn, nextLabel, nextFn, nextOk=true) {
  return `<div class="wiz-nav">
    <button class="btn btn-ghost btn-lg" id="wBack">← Back</button>
    <button class="btn btn-primary btn-lg" id="wNext" ${nextOk?'':'disabled'}>${nextLabel}</button></div>`;
}
function wireNav(backFn, nextFn) {
  $('#wBack').onclick = backFn;
  if ($('#wNext')) $('#wNext').onclick = nextFn;
}

/* step 1 — game type */
function stepType() {
  const w = S.wiz;
  const types = [
    { id:'casual',     icon:'⛳', t:'Normal Game', d:'Quickly create a game for you and your friends. Perfect for a casual single round.', on:true },
    { id:'tournament', icon:'🏆', t:'Tournament',  d:'Advanced single or multi-round event. Best for charity scrambles and larger games.', on:true },
    { id:'reds_blues', icon:'⚔️', t:'Reds vs Blues', d:'Two teams in a Ryder Cup–style match play battle.', on:true },
  ];
  $('#wizBody').innerHTML = `<p class="card-sub">What kind of game are you setting up?</p>` +
    types.map(x => `<div class="pick-card type-card ${x.on?'':'disabled'} ${w.type===x.id?'is-sel':''}" data-t="${x.on?x.id:''}">
      <div class="pc-icon">${x.icon}</div>
      <div><h3>${x.t}${x.on?'':' <span class="mini">— coming soon</span>'}</h3>

      <div class="ac-wrap">
        <input class="input" id="wCourseInput" autocomplete="off"
          placeholder="Start typing a course name…" value="${esc(selName)}" />
        <div id="wCourseList" class="ac-list"></div>
      </div>
      <div class="hint">Type to search your saved courses.</div>
    </div>
    <div class="field"><label>How many holes? ${help('Play all 18 holes, just the front 9 (1–9), or just the back 9 (10–18).')}</label>
      <div class="holes-opt">
        <button class="btn btn-ghost" data-seg="all">⛳ Full 18</button>
        <button class="btn btn-ghost" data-seg="front9">Front 9</button>
        <button class="btn btn-ghost" data-seg="back9">Back 9</button>
      </div></div>` + nav(null,'Next →',null,!!w.course_id);
  // swap btn-ghost↔btn-primary (not just add) — .btn-ghost wins on CSS order
  const paint = () => $('#wizBody').querySelectorAll('[data-seg]').forEach(b => {

    const ql = input.value.trim().toLowerCase();

      .filter(c => c.name.toLowerCase().includes(ql)).slice(0,8)
      .map(c => `<div class="ac-item" data-c="${c.id}"><strong>${esc(c.name)}</strong>
        <div class="meta">${esc([c.city,c.state].filter(Boolean).join(', ')) || 'Course'}</div></div>`).join('');
    list.querySelectorAll('[data-c]').forEach(it => it.onmousedown = e => {
      e.preventDefault();                       // fire before the input's blur
      w.course_id = it.dataset.c;
      renderWizard();

  input.onfocus = showList;
  input.oninput = () => { w.course_id = null; if ($('#wNext')) $('#wNext').disabled = true; showList(); };
  input.onblur  = () => setTimeout(() => { if (list) list.innerHTML = ''; }, 150);
  $('#wizBody').querySelectorAll('[data-seg]').forEach(b => b.onclick = () => { w.holes_segment=b.dataset.seg; paint(); });
  wireNav(()=>go('new/type'), ()=>{ if(w.course_id) go('new/setup'); });
}
