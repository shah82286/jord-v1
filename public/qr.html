<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Scan to Open JORD</title>
<style>
  body { background:#0C2010; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; color:#F0F7E8; gap:20px; }
  img { border-radius:12px; border:6px solid #BEFF3A; }
  p { font-size:13px; color:#7FA882; word-break:break-all; max-width:320px; text-align:center; }
</style>
</head>
<body>
<script>
  var base = location.origin;
  var url = base + '/scan';
  document.write('<img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url) + '" />');
  document.write('<p>' + url + '</p>');
</script>
</body>
</html>
