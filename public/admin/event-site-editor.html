<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Event Site Editor · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  .ed-wrap { max-width:880px; margin:0 auto; padding:0 var(--s-4) var(--s-7); }
  .ed-head { display:flex; align-items:flex-end; justify-content:space-between; gap:var(--s-3); flex-wrap:wrap; margin:var(--s-5) 0 var(--s-3); }
  .ed-head h1 { font-family:var(--font-display); font-size:clamp(1.6rem,4vw,2.2rem); letter-spacing:-0.02em; }
  .ed-head .actions { display:flex; gap:var(--s-2); flex-wrap:wrap; }
  .card { margin-bottom:var(--s-4); }
  .row-list .row { display:grid; gap:8px; padding:10px 12px; border:1px solid var(--border); border-radius:var(--r-sm); background:var(--surface); margin-bottom:8px; }
  .sched-row { grid-template-columns:140px 1fr 36px; align-items:start; }
  .faq-row { grid-template-columns:1fr 36px; align-items:start; }
  .sched-row textarea, .faq-row textarea { min-height:38px; padding:8px 10px; border:1px solid var(--border); border-radius:6px; font:inherit; font-size:14px; background:var(--bg); resize:vertical; }
  .icon-btn { width:36px; height:36px; border-radius:50%; border:1px solid var(--border-2); background:var(--surface); cursor:pointer; }
  @media (max-width: 560px) {
    .sched-row { grid-template-columns:1fr 36px; }
    .sched-row .time-input { grid-column:1; }
  }
  .pkg { border:1px solid var(--border); border-radius:var(--r-sm); padding:14px; background:var(--surface); margin-bottom:var(--s-2); }
  .pkg-head { display:flex; justify-content:space-between; align-items:center; gap:var(--s-2); }
  .pkg-head strong { font-family:var(--font-display); font-size:1.1rem; }
  .pkg-meta { font-size:12px; color:var(--ink-3); margin-top:2px; }
  .pkg .grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--s-2); margin-top:var(--s-2); }
  @media (max-width: 480px) { .pkg .grid { grid-template-columns:1fr; } }
  .save-bar { position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--border); padding:var(--s-3) 0; margin-top:var(--s-4); }
  .save-bar .row { display:flex; justify-content:space-between; align-items:center; gap:var(--s-3); flex-wrap:wrap; }
</style>
</head>
<body>
<div id="topbar"></div>
<main class="ed-wrap" id="view"><p class="mini">Loading…</p></main>
<script src="/js/jord.js"></script>
<script>
const $ = (s,r=document)=>r.querySelector(s);
const esc = JORD.escapeHtml;
if (!JORD.getToken()) location.href = '/admin';

const parts = location.pathname.split('/').filter(Boolean);
const eventId = parts[2];  // /admin/events/:id/site/edit
const state = { site: null, packages: [], schedule: [], faq: [], eventName: '', timeZone: null,
                 brandLogo: null, brandAccent: null, brandEnabled: false, brandDirty: false,
                 fundraisingGoalCents: 0, fundraisingVisible: false, fundraisingDirty: false };

function tzAbbrev(iana, when) {
  if (!iana) return '';
  try {
    const p = new Intl.DateTimeFormat('en-US', { timeZone: iana, timeZoneName: 'short' })
      .formatToParts(when || new Date());
    return (p.find(x => x.type === 'timeZoneName') || {}).value || iana;
  } catch { return iana; }
}

document.getElementById('topbar').appendChild(
  JORD.renderTopbar('Event Site', JORD.el('a',{class:'btn btn-ghost',href:'/admin'},'← Admin')));

async function load() {
  try {
    const d = await JORD.api('/api/admin/events/'+eventId+'/site');
    const ev = await JORD.api('/api/events/'+eventId);
    state.eventName = ev?.name || 'Event';
    state.timeZone = ev?.time_zone || null;
    state.brandLogo = ev?.brand_logo || null;
    state.brandAccent = ev?.brand_accent || null;
    state.brandEnabled = !!ev?.brand_enabled;
    state.brandDirty = false;
    state.fundraisingGoalCents = ev?.fundraising_goal_cents || 0;
    state.fundraisingVisible = !!ev?.fundraising_visible;
    state.fundraisingDirty = false;
    state.site = d.site || {};
    state.packages = d.packages || [];
    try { state.stripe = await JORD.api('/api/admin/stripe/account'); }
    catch { state.stripe = { stripe_enabled: false, account: null }; }
    state.schedule = parseJ(d.site && d.site.schedule_json, [
      { time:'7:30 AM', title:'Registration & Bag Drop', note:'' },
      { time:'9:00 AM', title:'Shotgun Start',           note:'' },
    ]);
    state.faq = parseJ(d.site && d.site.faq_json, []);
    render();
  } catch (e) {
    if (e.status === 401) location.href = '/admin';
    else $('#view').innerHTML = `<div class="card"><p>${esc(e.message)}</p></div>`;
  }
}
function parseJ(s, fb){ try { return s ? JSON.parse(s) : fb; } catch { return fb; } }

// Renders the current donation suggested-amounts as a comma-separated USD
// string for the editor input. Falls back to a sane default catalog when
// the row hasn't been configured yet.
function suggestedDollarsCsv() {
  const stored = parseJ(state.site && state.site.donation_suggested_json, null);
  const cents = Array.isArray(stored) && stored.length ? stored : [2500, 5000, 10000, 25000];
  return cents.map(c => (Number(c) || 0) / 100).join(', ');
}

// Compact help-bubble factory — renders `Label ⓘ` with a hover/focus tooltip.
// Pulls the same `.help-icon` / `.tooltip` system that lives in jord.css.
function lbl(text, help) {
  if (!help) return text;
  return `${text} <span class="help-icon" tabindex="0" aria-label="${esc(help).replace(/"/g, '&quot;')}">ⓘ<span class="tooltip">${esc(help)}</span></span>`;
}

function render() {
  const s = state.site || {};
  const previewLink = s.slug ? `<a class="btn btn-ghost" href="/e/${esc(s.slug)}" target="_blank">Preview site ↗</a>` : '';

  // Stripe Connect banner — visible until the organizer's account is `active`.
  const stripeOn = state.stripe && state.stripe.stripe_enabled;
  const acct = state.stripe && state.stripe.account;
  const stripeActive = acct && acct.stripe_account_status === 'active' && acct.stripe_charges_enabled;
  let stripeBanner = '';
  if (stripeOn && !stripeActive) {
    const hasAccount = !!(acct && acct.stripe_account_id);
    stripeBanner = `<div class="card" style="background:rgba(184,136,77,0.06);border:1px solid rgba(184,136,77,0.30);margin-bottom:var(--s-3)">
      <h2 class="card-title" style="margin-bottom:6px">💳 ${hasAccount ? 'Finish Stripe onboarding' : 'Connect Stripe to accept payments'}</h2>
      <p style="color:var(--ink-2);font-size:14px;margin-bottom:12px">
        ${hasAccount
          ? `Stripe still needs more info from you before your account is active. Until then, the "Register" buttons on your event site will show a "coming soon" message.`
          : `You'll need to connect a Stripe account before buyers can register and pay. Funds go straight to your bank; JORD takes a small 3% platform fee.`}
      </p>
      <a class="btn btn-primary" href="/admin/stripe-connect">${hasAccount ? 'Finish onboarding →' : 'Connect Stripe →'}</a>
    </div>`;
  }

  $('#view').innerHTML = `
    <div class="ed-head">
      <div>
        <div class="mini" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:700">Event Site</div>
        <h1>${esc(state.eventName)}</h1>
      </div>
      <div class="actions">${previewLink}</div>
    </div>

    ${stripeBanner}

    <div class="card">
      <h2 class="card-title">Basics</h2>
      <div class="field-grid" style="grid-template-columns:1fr 1fr">
        <div class="field">
          <label class="label-with-help">${lbl('URL slug', "The URL on JORD where players visit your event page. Lowercase letters, numbers, and hyphens only. Example: 'fall-classic-2026' → tournament.jordgolf.com/e/fall-classic-2026.")}</label>
          <input class="input" id="f-slug" value="${esc(s.slug||'')}" placeholder="fall-classic-2026" />
          <div class="hint">Public URL: /e/<strong>your-slug</strong> — lowercase, hyphens.</div>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="f-published" ${s.published?'checked':''} />
            <span class="label-with-help">${lbl('Published', "Off = the public URL returns 'not found' for anyone visiting. Turn this on only when you're ready for people to register.")}</span>
          </label>
          <div class="hint">Unchecked = the page returns "not found" for visitors.</div>
        </div>
        <div class="field"><label class="label-with-help">${lbl('Headline', "The big title displayed in the hero. Often the same as your event name (e.g. 'Fall Charity Classic').")}</label>
          <input class="input" id="f-headline" value="${esc(s.headline||'')}" placeholder="Fall Charity Classic"/></div>
        <div class="field"><label class="label-with-help">${lbl('Date & time', "Shown in the hero meta line and on the registration confirmation. The time zone next to it is auto-detected from the venue's coordinates (set on the admin Course Map).")}</label>
          <input class="input" id="f-starts" type="datetime-local" value="${esc(toLocalDt(s.starts_at))}" />
          <div class="hint">${state.timeZone
            ? `Detected time zone: <strong>${esc(state.timeZone)}</strong> (${esc(tzAbbrev(state.timeZone, s.starts_at ? new Date(s.starts_at) : null))}) — auto-detected from the course's coordinates.`
            : `Set the course coordinates on the admin map page to auto-detect the time zone.`}</div>
        </div>
        <div class="field" style="grid-column:1/-1"><label class="label-with-help">${lbl('Subhead', "One-line teaser shown below the headline. Example: 'A day on the links to support youth golf.'")}</label>
          <input class="input" id="f-subhead" value="${esc(s.subhead||'')}" placeholder="A day on the links to support …" /></div>
        <div class="field" style="grid-column:1/-1"><label class="label-with-help">${lbl('Location', "Course name and city. Shown next to the date in the hero. Example: 'Pebble Beach Golf Links · Pebble Beach, CA'.")}</label>
          <input class="input" id="f-location" value="${esc(s.location_name||'')}" placeholder="Pebble Beach Golf Links · Pebble Beach, CA" /></div>
        <div class="field" style="grid-column:1/-1"><label class="label-with-help">${lbl('Hero image URL', "Background photo for the hero section. Paste a /path or a full https URL. Landscape orientation, ~1600 px wide works best. Leave blank to use our default lifestyle photo.")}</label>
          <input class="input" id="f-hero" value="${esc(s.hero_image||'')}" placeholder="/img/lifestyle/lifestyle-1-1600.jpg or https://…" />
          <div class="hint">Paste a path or full URL. Leave blank for the default lifestyle photo.</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">Logo &amp; branding</h2>
      <p class="hint" style="margin-bottom:var(--s-3)">Used on the public event site header, on the registration confirmation page, and on the printable <strong>pairings poster</strong> (24&nbsp;×&nbsp;36&nbsp;in). PNG or JPG, ideally with a transparent background. Max ~2.5&nbsp;MB.</p>
      <div style="display:flex;align-items:center;gap:var(--s-4);flex-wrap:wrap">
        <div id="logo-preview" style="width:160px;height:120px;background:#fff;border:1px solid var(--border);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;padding:10px;flex-shrink:0">
          ${state.brandLogo
            ? `<img src="${esc(state.brandLogo)}" alt="Event logo" style="max-width:100%;max-height:100%;object-fit:contain" />`
            : `<span class="mini" style="color:var(--ink-3);text-align:center">No logo yet</span>`}
        </div>
        <div style="flex:1;min-width:220px">
          <input type="file" id="f-logo-file" accept="image/png,image/jpeg,image/svg+xml,image/webp" style="display:none" />
          <button class="btn btn-ghost" id="btn-logo-upload" type="button">⬆ ${state.brandLogo ? 'Replace logo' : 'Upload logo'}</button>
          ${state.brandLogo ? '<button class="btn btn-ghost" id="btn-logo-remove" type="button" style="margin-left:6px;color:#a33">Remove</button>' : ''}
          <div class="hint" id="logo-msg" style="margin-top:8px">${state.brandLogo ? 'Logo saved with the event.' : 'No logo on this event yet.'}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('About', "The long-form description shown as the first big text block on the public event page. Use a couple of paragraphs about what the event is, who it benefits, and what's included.")}</h2>
      <textarea class="textarea" id="f-about" rows="5" placeholder="What is the event raising money for? Who runs it? What's the format?">${esc(s.about_html||'')}</textarea>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Schedule', "Day-of agenda displayed as a vertical timeline on the public page. Time is free-text (e.g. '8:00 AM') — the auto-detected time zone is shown once at the top of the section.")}</h2>
      <div class="row-list" id="schedList"></div>
      <button class="btn btn-ghost" id="addSched">+ Add schedule item</button>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Course info', "A short paragraph about the course itself — layout, tees, anything golfers should know. Shown in 'The Course' section below About.")}</h2>
      <textarea class="textarea" id="f-course" rows="4" placeholder="A short description of the course — tees, layout, anything golfers should know.">${esc(s.course_info||'')}</textarea>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('FAQ', "Common questions for registrants. Each item renders as a click-to-expand row on the public page. Use it for dress code, rain policy, dinner inclusion, etc.")}</h2>
      <div class="row-list" id="faqList"></div>
      <button class="btn btn-ghost" id="addFaq">+ Add FAQ item</button>
    </div>

    <div class="card">
      <h2 class="card-title">Contact</h2>
      <div class="field-grid" style="grid-template-columns:1fr 1fr 1fr">
        <div class="field"><label>Name</label><input class="input" id="f-cname" value="${esc(s.contact_name||'')}" /></div>
        <div class="field"><label>Email</label><input class="input" id="f-cemail" value="${esc(s.contact_email||'')}" type="email" /></div>
        <div class="field"><label class="label-with-help">${lbl('Phone', "Players can tap-to-call from the contact section on mobile. Include country code if you expect international registrants.")}</label><input class="input" id="f-cphone" value="${esc(s.contact_phone||'')}" /></div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Registration packages', "Player tickets — Foursome, Single, etc. The number-of-players field controls how big the buyer's roster section is at checkout.")}</h2>
      <div id="pkgList"></div>
      <button class="btn btn-primary" id="addPkg">+ Add package</button>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Fundraising goal', "Optional goal-bar shown on the public event page. The bar fills with the total of paid registrations + sponsorships minus refunds. Set a goal first; flip the toggle when you're ready for visitors to see it.")}</h2>
      <div class="field-grid" style="grid-template-columns:1fr 1fr">
        <div class="field">
          <label>Target amount (USD)</label>
          <input class="input" id="f-fund-goal" type="number" min="0" step="100" value="${(state.fundraisingGoalCents || 0) / 100}" placeholder="50000" />
          <div class="hint">Leave at 0 to disable the bar entirely.</div>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="f-fund-visible" ${state.fundraisingVisible ? 'checked' : ''} />
            <span>Show goal bar publicly</span>
          </label>
          <div class="hint">Off = the goal stays private (you can still see it on the registrations dashboard).</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Donations', "Let visitors give any amount on the public event page. Donors hit the same Stripe checkout as registrations; their gift counts toward the fundraising goal automatically.")}</h2>
      <div class="field-grid" style="grid-template-columns:1fr 1fr">
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="f-don-enabled" ${(state.site && state.site.donations_enabled) ? 'checked' : ''} />
            <span>Accept donations</span>
          </label>
          <div class="hint">Off = the Donate section is hidden from /e/your-slug.</div>
        </div>
        <div class="field">
          <label>Minimum donation (USD)</label>
          <input class="input" id="f-don-min" type="number" min="1" step="1" value="${((state.site && state.site.donation_min_cents) || 500) / 100}" />
          <div class="hint">Stops processing micro-donations that lose money to card fees.</div>
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Suggested amounts (USD, comma-separated)</label>
          <input class="input" id="f-don-suggested" value="${esc(suggestedDollarsCsv())}" placeholder="25, 50, 100, 250" />
          <div class="hint">Quick-pick buttons shown above the custom amount field. Up to 8 amounts.</div>
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Prompt (optional)</label>
          <textarea class="textarea" id="f-don-prompt" rows="2" placeholder="Every dollar supports …">${esc((state.site && state.site.donation_prompt) || '')}</textarea>
          <div class="hint">Short copy shown above the amount picker. Leave blank for the default.</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Event store', "Things attendees can buy alongside their ticket — mulligans, raffle tickets, contest entries, merch. Goes through the same Stripe Connect checkout the registrations use; perfect for adding revenue streams on top of player tickets.")}</h2>
      <p class="hint" style="margin-bottom:var(--s-3)">Tap a tile to quick-add a common store item at a starter price. Or click + Add custom for anything else.</p>
      <div id="storeCatalog" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:var(--s-2);margin-bottom:var(--s-3)"></div>
      <div id="storeList"></div>
      <button class="btn btn-ghost" id="addCustomStoreItem">+ Add custom store item</button>
    </div>

    <div class="card" id="auction-card">
      <h2 class="card-title">${lbl('Silent auction', "Run a public silent auction alongside the event. Items show on /e/your-slug/auction with bid forms; winners get a Stripe checkout link after the close time. Use the admin auction page to add items and approve donor submissions.")}</h2>
      <div class="field-grid" style="grid-template-columns:1fr 1fr">
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="f-auction-enabled" ${(state.site && state.site.auction_enabled) ? 'checked' : ''} />
            <span>Enable silent auction page</span>
          </label>
          <div class="hint">Adds a public auction at <code>/e/${esc(state.site?.slug || 'your-slug')}/auction</code>.</div>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="f-auction-intake" ${(state.site && state.site.auction_intake_enabled) ? 'checked' : ''} />
            <span>Accept donor item submissions</span>
          </label>
          <div class="hint">Adds <code>/donate-item</code> for visitors to submit items for your review.</div>
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Intro copy (optional)</label>
          <textarea class="textarea" id="f-auction-intro" rows="2" placeholder="Every dollar supports …">${esc((state.site && state.site.auction_intro) || '')}</textarea>
          <div class="hint">Shown above the items on the public auction page. Leave blank for the default.</div>
        </div>
        <div class="field" style="grid-column:1/-1">
          <a class="btn btn-ghost" href="/admin/events/${esc(eventId)}/auction">⚙ Manage auction items →</a>
          <span class="hint" style="margin-left:8px">Add items, review submissions, close bidding, send winner checkouts.</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">${lbl('Sponsorships', "Non-playing items your event can sell — hole signs, beverage carts, scorecard branding, etc. Sponsors check out through the same Stripe flow as players; the number-of-players field defaults to 0.")}</h2>
      <p class="hint" style="margin-bottom:var(--s-3)">Tap a tile below to quick-add a common sponsorship at a starter price you can edit. Or click "+ Add custom" for anything else.</p>
      <div id="sponsorCatalog" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:var(--s-2);margin-bottom:var(--s-3)"></div>
      <div id="sponsorList"></div>
      <button class="btn btn-ghost" id="addCustomSponsor">+ Add custom sponsorship</button>
    </div>

    <div class="save-bar"><div class="row">
      <div class="mini" id="saveStatus"></div>
      <button class="btn btn-primary btn-lg" id="saveBtn">Save changes</button>
    </div></div>`;

  renderSched(); renderFaq(); renderPackages(); renderSponsorCatalog(); renderSponsorships(); renderStoreCatalog(); renderStoreItems();
  $('#addSched').onclick = () => { state.schedule.push({time:'', title:'', note:''}); renderSched(); };
  $('#addFaq').onclick   = () => { state.faq.push({q:'', a:''}); renderFaq(); };
  $('#addPkg').onclick   = () => createPackage();
  $('#addCustomSponsor').onclick = () => createSponsorship({ sponsor_type: 'custom', name: 'Custom sponsorship' });
  $('#addCustomStoreItem').onclick = () => createStoreItem({ name: 'Custom item', price_cents: 0 });
  $('#saveBtn').onclick  = save;
  wireLogoHandlers();
}

// Standard event-store starter catalog. Same UX pattern as the sponsorship
// catalog — quick-add tiles seed a row with a starter price the organizer
// can edit before saving. `image` is the emoji shown on the tile.
const STORE_CATALOG = [
  { id: 'mulligan_1',   name: 'Single mulligan',          emoji: '🔁', desc: 'One extra stroke during the round.',                  suggested:  2000 },
  { id: 'mulligan_4',   name: 'Mulligan 4-pack',          emoji: '🔁', desc: 'Four mulligans, one per player or split as you like.', suggested:  5000 },
  { id: 'raffle_1',     name: 'Raffle ticket',            emoji: '🎟️', desc: 'One entry in the raffle drawing.',                    suggested:   500 },
  { id: 'raffle_5',     name: 'Raffle 5-pack',            emoji: '🎟️', desc: 'Five raffle tickets at a small discount.',            suggested:  2000 },
  { id: 'raffle_25',    name: 'Raffle 25-pack',           emoji: '🎟️', desc: '"Arm\'s length" of raffle tickets.',                  suggested:  7500 },
  { id: 'ctp_entry',    name: 'Closest-to-pin entry',     emoji: '🥏', desc: 'Buy in to the CTP contest hole.',                     suggested:  1000 },
  { id: 'ld_entry',     name: 'Longest-drive entry',      emoji: '🚀', desc: 'Buy in to the LD contest hole.',                      suggested:  1000 },
  { id: 'drink',        name: 'Drink ticket',             emoji: '🍻', desc: 'One drink at the cart or post-round bar.',            suggested:   500 },
  { id: 'tshirt',       name: 'Event T-shirt',            emoji: '👕', desc: 'Branded shirt — pick up at registration.',            suggested:  3000 },
  { id: 'hat',          name: 'Event hat',                emoji: '🧢', desc: 'Branded hat — pick up at registration.',              suggested:  2500 },
];

function renderStoreCatalog() {
  // Disable a tile if an item with the same name was already added (cheap
  // dedupe; user can still add multiple via Custom if they really want).
  const usedNames = new Set(state.packages
    .filter(p => p.package_kind === 'event_item').map(p => (p.name || '').toLowerCase()));
  $('#storeCatalog').innerHTML = STORE_CATALOG.map(c => {
    const inUse = usedNames.has(c.name.toLowerCase());
    return `<button class="sponsor-tile" data-add-store="${c.id}" type="button"
      ${inUse ? 'disabled' : ''}
      title="${esc(c.desc)}"
      style="
        text-align:left; padding:14px; background:var(--surface); color:var(--ink);
        border:1px solid var(--border); border-radius:var(--r-md); cursor:${inUse ? 'default' : 'pointer'};
        font-family:inherit; line-height:1.3; ${inUse ? 'opacity:0.45;' : ''}
        display:flex; flex-direction:column; gap:4px;
      ">
      <span style="font-size:22px;line-height:1">${c.emoji}</span>
      <strong style="font-size:14px;font-weight:700">${esc(c.name)}</strong>
      <span class="mini" style="color:var(--ink-3);font-size:11px">${inUse ? 'Added ✓' : 'From $' + (c.suggested/100).toFixed(0)}</span>
    </button>`;
  }).join('');
  $('#storeCatalog').querySelectorAll('[data-add-store]').forEach(b => {
    b.onclick = () => {
      const cat = STORE_CATALOG.find(c => c.id === b.dataset.addStore);
      if (cat) createStoreItem({ name: cat.name, description: cat.desc, price_cents: cat.suggested });
    };
  });
}

async function createStoreItem(seed) {
  try {
    const body = {
      name: seed.name,
      description: seed.description || '',
      price_cents: seed.price_cents ?? 0,
      includes_players: 0,
      sort_order: state.packages.filter(p => p.package_kind === 'event_item').length,
      package_kind: 'event_item',
    };
    const r = await JORD.api(`/api/admin/events/${eventId}/packages`, { method: 'POST', body });
    state.packages.push({ id: r.id, ...body, quantity_limit: null, active: 1, image_data: null });
    renderStoreCatalog();
    renderStoreItems();
    JORD.success('Store item added — edit name / price then Save changes.');
  } catch(e){ JORD.error(e.message); }
}

function renderStoreItems() {
  const fmtPrice = c => '$' + ((Number(c)||0)/100).toLocaleString();
  const items = state.packages.filter(p => p.package_kind === 'event_item');
  if (!items.length) {
    $('#storeList').innerHTML = '<p class="mini" style="color:var(--ink-3);margin-bottom:var(--s-3)">No store items yet. Tap a tile above to add one.</p>';
    return;
  }
  $('#storeList').innerHTML = items.map(p => `
    <div class="pkg" data-pkg="${p.id}">
      <div class="pkg-head">
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          ${p.image_data ? `<img src="${esc(p.image_data)}" alt="" style="width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);flex-shrink:0" />` : ''}
          <div style="min-width:0">
            <strong>${esc(p.name)}</strong>
            <div class="pkg-meta">${fmtPrice(p.price_cents)}${p.quantity_limit ? ` · limit ${p.quantity_limit}` : ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost" data-edit-store="${p.id}">Edit</button>
          <button class="icon-btn" data-del-store="${p.id}" title="Delete">✕</button>
        </div>
      </div>
      <div id="storeEdit-${p.id}" hidden>
        <div class="grid">
          <div class="field"><label>Name</label><input class="input" data-sf="name" data-id="${p.id}" value="${esc(p.name)}" /></div>
          <div class="field"><label>Price (USD)</label><input class="input" type="number" min="0" step="0.01" data-sf="price" data-id="${p.id}" value="${(Number(p.price_cents)||0)/100}" /></div>
          <div class="field"><label>Quantity limit</label><input class="input" type="number" min="0" data-sf="qty" data-id="${p.id}" value="${p.quantity_limit??''}" /></div>
          <div class="field"><label>Photo (optional, ≤2.5 MB)</label>
            <input type="file" accept="image/png,image/jpeg,image/webp" data-sf="file" data-id="${p.id}" />
            ${p.image_data ? `<button class="btn btn-ghost" type="button" data-clear-store="${p.id}" style="margin-top:6px;color:#a33;font-size:12px;padding:4px 10px">Remove photo</button>` : ''}
          </div>
          <div class="field" style="grid-column:1/-1"><label>Description</label>
            <textarea class="textarea" data-sf="desc" data-id="${p.id}" rows="2">${esc(p.description||'')}</textarea></div>
        </div>
        <button class="btn btn-primary" data-save-store="${p.id}">Save item</button>
      </div>
    </div>`).join('');

  // Stage uploaded photo per-item — keyed by id since multiple cards
  // can be open at once.
  const stagedImages = state._stagedStoreImages = state._stagedStoreImages || {};

  $('#storeList').querySelectorAll('[data-edit-store]').forEach(b => b.onclick = () => {
    const el = $(`#storeEdit-${b.dataset.editStore}`);
    el.hidden = !el.hidden;
  });
  $('#storeList').querySelectorAll('[data-del-store]').forEach(b => b.onclick = async () => {
    if (!await JORD.confirm('Delete this store item?', { danger:true })) return;
    try {
      await JORD.api(`/api/admin/events/${eventId}/packages/${b.dataset.delStore}`, { method:'DELETE' });
      state.packages = state.packages.filter(p => p.id !== b.dataset.delStore);
      renderStoreCatalog(); renderStoreItems();
      JORD.success('Store item deleted');
    } catch(e){ JORD.error(e.message); }
  });
  $('#storeList').querySelectorAll('[data-clear-store]').forEach(b => b.onclick = () => {
    stagedImages[b.dataset.clearStore] = '';   // explicit clear
    b.style.display = 'none';
  });
  $('#storeList').querySelectorAll('[data-sf="file"]').forEach(input => input.onchange = () => {
    const f = input.files[0];
    if (!f) return;
    if (f.size > 2_500_000) { alert(`Image too large (${(f.size/1024/1024).toFixed(1)} MB). Try one under 2.5 MB.`); input.value=''; return; }
    const r = new FileReader();
    r.onload = () => { stagedImages[input.dataset.id] = r.result; };
    r.readAsDataURL(f);
  });
  $('#storeList').querySelectorAll('[data-save-store]').forEach(b => b.onclick = async () => {
    const id = b.dataset.saveStore;
    const get = (k) => $(`#storeList [data-sf="${k}"][data-id="${id}"]`).value.trim();
    const body = {
      name: get('name'),
      description: $(`#storeList [data-sf="desc"][data-id="${id}"]`).value,
      price_cents: Math.round((Number(get('price'))||0) * 100),
      quantity_limit: get('qty') === '' ? null : Number(get('qty')),
      package_kind: 'event_item',
    };
    // Send image_data only when staged (new upload or explicit clear).
    if (stagedImages[id] !== undefined) body.image_data = stagedImages[id] || null;
    try {
      await JORD.api(`/api/admin/events/${eventId}/packages/${id}`, { method:'PATCH', body });
      const p = state.packages.find(x => x.id === id);
      if (p) Object.assign(p, body, body.image_data !== undefined ? { image_data: body.image_data } : {});
      delete stagedImages[id];
      renderStoreItems();
      JORD.success('Store item saved');
    } catch(e){ JORD.error(e.message); }
  });
}

// Max payload accepted by the events PATCH for brand_logo. The server tolerates
// up to ~2.8 MB; we leave a buffer so the JSON envelope doesn't push it over.
const LOGO_MAX_BYTES = 2_500_000;

// Refresh just the logo card's preview tile + button labels. We don't
// re-run render() here because it rebuilds the whole form and would
// trash any unsaved edits in the other fields.
function refreshLogoCard() {
  const tile = $('#logo-preview');
  if (tile) {
    tile.innerHTML = state.brandLogo
      ? `<img src="${state.brandLogo}" alt="Event logo" style="max-width:100%;max-height:100%;object-fit:contain" />`
      : `<span class="mini" style="color:var(--ink-3);text-align:center">No logo yet</span>`;
  }
  const uploadBtn = $('#btn-logo-upload');
  if (uploadBtn) uploadBtn.textContent = `⬆ ${state.brandLogo ? 'Replace logo' : 'Upload logo'}`;

  // Add/remove the "Remove" button to match logo presence.
  let removeBtn = $('#btn-logo-remove');
  if (state.brandLogo && !removeBtn) {
    removeBtn = document.createElement('button');
    removeBtn.id = 'btn-logo-remove';
    removeBtn.type = 'button';
    removeBtn.className = 'btn btn-ghost';
    removeBtn.style.cssText = 'margin-left:6px;color:#a33';
    removeBtn.textContent = 'Remove';
    uploadBtn.insertAdjacentElement('afterend', removeBtn);
    removeBtn.onclick = onRemoveLogo;
  } else if (!state.brandLogo && removeBtn) {
    removeBtn.remove();
  }
}

function onRemoveLogo() {
  state.brandLogo = null;
  state.brandDirty = true;
  refreshLogoCard();
  const msg = $('#logo-msg');
  if (msg) { msg.textContent = 'Logo cleared — press "Save changes" to apply.'; msg.style.color = 'var(--ink-2)'; }
}

function wireLogoHandlers() {
  const fileInput = $('#f-logo-file');
  const uploadBtn = $('#btn-logo-upload');
  const removeBtn = $('#btn-logo-remove');
  const msg = $('#logo-msg');

  if (uploadBtn) uploadBtn.onclick = () => fileInput.click();
  if (removeBtn) removeBtn.onclick = onRemoveLogo;

  if (fileInput) fileInput.onchange = () => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    if (file.size > LOGO_MAX_BYTES) {
      msg.textContent = `Image is too large (${(file.size/1024/1024).toFixed(1)} MB). Try one under 2.5 MB.`;
      msg.style.color = '#a33';
      fileInput.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      state.brandLogo = reader.result;       // data:image/...;base64,...
      state.brandEnabled = true;             // any uploaded logo implies "use my branding"
      state.brandDirty = true;
      refreshLogoCard();
      msg.textContent = 'Logo selected — press "Save changes" to apply.';
      msg.style.color = 'var(--ink-2)';
      fileInput.value = '';                  // allow re-selecting the same file later
    };
    reader.readAsDataURL(file);
  };
}

function toLocalDt(s) {
  if (!s) return '';
  // SQLite stores "YYYY-MM-DD HH:MM:SS" — convert to "YYYY-MM-DDTHH:MM" for datetime-local
  return String(s).replace(' ', 'T').slice(0,16);
}
function fromLocalDt(v) {
  return v ? v.replace('T',' ') + (v.length === 16 ? ':00' : '') : null;
}

    try {
      await JORD.api(`/api/admin/events/${eventId}/packages/${b.dataset.del}`, { method:'DELETE' });
      state.packages = state.packages.filter(p => p.id !== b.dataset.del);
      renderPackages();
      JORD.success('Package deleted');
    } catch(e){ JORD.error(e.message); }
  });
  $('#pkgList').querySelectorAll('[data-save]').forEach(b => b.onclick = async () => {
    const i = +b.dataset.save;
    const get = (k) => $(`#pkgList [data-pf="${k}"][data-i="${i}"]`).value.trim();
    const body = {
      name: get('name'),
      description: $(`#pkgList [data-pf="desc"][data-i="${i}"]`).value,
      price_cents: Math.round((Number(get('price'))||0) * 100),
      includes_players: Number(get('players')) || 1,
      quantity_limit: get('qty') === '' ? null : Number(get('qty')),
    };
    try {
      // `items` here is captured by closure (filtered list of registration
      // packages). state.packages is the full list, so we look up by id.
      const p = items[i];
      await JORD.api(`/api/admin/events/${eventId}/packages/${p.id}`, { method:'PATCH', body });
      const inMain = state.packages.find(x => x.id === p.id);
      if (inMain) Object.assign(inMain, body);
      renderPackages();
      JORD.success('Package saved');
    } catch(e){ JORD.error(e.message); }
  });
}

async function createPackage() {
  const name = await JORD.prompt('Name for the new package?', { placeholder:'Individual Player' });
  if (!name) return;
  try {
    const r = await JORD.api(`/api/admin/events/${eventId}/packages`, {
      method:'POST',
      body: { name, price_cents: 0, includes_players: 1, sort_order: state.packages.length },
    });
    state.packages.push({ id: r.id, name, description:'', price_cents:0, includes_players:1, quantity_limit:null, sort_order: state.packages.length, active:1 });
    renderPackages();
    JORD.success('Package added');
  } catch(e){ JORD.error(e.message); }
}

async function save() {
  const suggestedRaw = $('#f-don-suggested') ? $('#f-don-suggested').value : '';
  const suggested = suggestedRaw
    .split(',')
    .map(s => Math.round(Number(s.trim()) * 100))
    .filter(c => Number.isFinite(c) && c > 0);
  const body = {
    slug:          $('#f-slug').value.trim(),
    published:     $('#f-published').checked,
    headline:      $('#f-headline').value.trim(),
    subhead:       $('#f-subhead').value.trim(),
    hero_image:    $('#f-hero').value.trim(),
    starts_at:     fromLocalDt($('#f-starts').value),
    location_name: $('#f-location').value.trim(),
    about_html:    $('#f-about').value,
    schedule:      state.schedule.filter(x => x.time || x.title || x.note),
    course_info:   $('#f-course').value,
    faq:           state.faq.filter(x => x.q || x.a),
    contact_name:  $('#f-cname').value.trim(),
    contact_email: $('#f-cemail').value.trim(),
    contact_phone: $('#f-cphone').value.trim(),
    donations_enabled: $('#f-don-enabled')?.checked ? 1 : 0,
    donation_suggested: suggested,
    donation_min_cents: Math.max(100, Math.round((Number($('#f-don-min')?.value) || 5) * 100)),
    donation_prompt: ($('#f-don-prompt')?.value || '').trim() || null,
    auction_enabled: $('#f-auction-enabled')?.checked ? 1 : 0,
    auction_intake_enabled: $('#f-auction-intake')?.checked ? 1 : 0,
    auction_intro: ($('#f-auction-intro')?.value || '').trim() || null,
  };
  const btn = $('#saveBtn'); btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await JORD.api(`/api/admin/events/${eventId}/site`, { method:'PUT', body });
    // If the logo was added/replaced/removed, persist that to the events
    // table separately. We patch alongside the site save so a single Save
    // click handles both sides.
    if (state.brandDirty) {
      await JORD.api(`/api/events/${eventId}`, { method:'PATCH', body: {
        brand_logo: state.brandLogo,
        brand_enabled: state.brandLogo ? 1 : 0,
      }});
      state.brandDirty = false;
    }
    // Fundraising goal is also on the events row — patch it alongside.
    // Always send (cheap, idempotent) so the toggle takes effect even
    // when the dollar amount didn't change.
    const goalDollars = Number($('#f-fund-goal').value) || 0;
    await JORD.api(`/api/events/${eventId}`, { method:'PATCH', body: {
      fundraising_goal_cents: Math.max(0, Math.round(goalDollars * 100)),
      fundraising_visible: $('#f-fund-visible').checked ? 1 : 0,
    }});
    state.fundraisingGoalCents = Math.max(0, Math.round(goalDollars * 100));
    state.fundraisingVisible = $('#f-fund-visible').checked;
    state.site = { ...state.site, ...body, schedule_json: JSON.stringify(body.schedule), faq_json: JSON.stringify(body.faq) };
    $('#saveStatus').textContent = 'Saved ✓';
    JORD.success('Event site saved');
    // Refresh the preview link in the header
    render();
  } catch(e) {
    JORD.error(e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save changes';
  }
}

load();
</script>
</body>
