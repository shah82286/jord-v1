<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Live Leaderboard · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  .lb-wrap { max-width:720px; margin:0 auto; padding:0 var(--s-3) var(--s-8); }
  .lb-head { text-align:center; padding:var(--s-5) 0 var(--s-3); }
  .lb-head .eyebrow { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-3); font-weight:700; }
  .lb-head h1 { font-family:var(--font-display); font-size:clamp(1.6rem,5vw,2.4rem); letter-spacing:-0.02em; margin-top:6px; }
  .lb-head .mini { color:var(--ink-2); font-size:13px; margin-top:4px; }
  .lb-controls { display:flex; justify-content:center; margin-bottom:var(--s-4); }
  /* Multi-leaderboard tab strip — only appears when side-bets are active. */
  .lb-tabs { display:flex; gap:6px; justify-content:center; flex-wrap:wrap;
    margin-bottom:var(--s-3); padding:6px;
    background:var(--surface-2); border-radius:var(--r-pill); }
  .lb-tab { border:none; background:transparent; cursor:pointer; padding:8px 14px;
    border-radius:var(--r-pill); font-weight:600; font-size:13px; color:var(--ink-2);
    transition:background var(--t-fast), color var(--t-fast); }
  .lb-tab:hover { background:var(--surface); color:var(--ink); }
  .lb-tab.is-active { background:var(--ink); color:var(--surface); }
  body.theme-dark .lb-tabs { background:rgba(255,255,255,.06); }
  body.theme-dark .lb-tab { color:rgba(255,255,255,.7); }
  body.theme-dark .lb-tab.is-active { background:var(--surface); color:var(--ink); }
  .lb-row { display:grid; grid-template-columns:54px 1fr 64px 78px; gap:var(--s-2); align-items:center;
    padding:14px 16px; border-bottom:1px solid var(--border); }
  .lb-row.head { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-3);
    font-weight:700; border-bottom:2px solid var(--border); padding:8px 16px; }
  .lb-row .pos { font-family:var(--font-display); font-size:1.3rem; }
  .lb-row .nm { font-weight:600; }
  .lb-row .nm small { display:block; font-weight:400; color:var(--ink-3); font-size:11px; }
  .lb-row .thru { text-align:center; font-size:13px; color:var(--ink-2); }
  .lb-row .tot { text-align:right; font-family:var(--font-display); font-size:1.3rem; }
  .lb-row .tot.under { color:#4A7A53; } .lb-row .tot.over { color:var(--danger); }
  .lb-row.is-leader { background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#FBF9F4; }
  .lb-row.is-leader .pos,.lb-row.is-leader .tot,.lb-row.is-leader .nm small { color:#FBF9F4; }
  .gate { text-align:center; padding:var(--s-8) var(--s-4); }
  .flight-head { font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;
    color:var(--ink-3); padding:var(--s-4) 16px 6px; border-bottom:1px solid var(--border); }
  .match-card { display:grid; grid-template-columns:1fr auto 1fr; gap:var(--s-3); align-items:center;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--s-6) var(--s-4); }
  .match-side { font-family:var(--font-display); font-size:1.15rem; text-align:center; }
  .match-side.win { color:var(--accent); }
  .match-status { text-align:center; }
  .match-status .big { font-family:var(--font-display); font-size:1.9rem; line-height:1; }
  .match-status .sub { font-size:12px; color:var(--ink-2); margin-top:6px; }
  body.theme-dark .lb-row { border-color:rgba(255,255,255,.1); }
  .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4A7A53; margin-right:5px;
    animation:pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Expand affordance + hole-by-hole drawer (v3.49). */
  .lb-row.expandable { cursor:pointer; }
  .lb-row.expandable:hover { background:var(--surface-2); }
  .lb-row.expandable .pos::after { content:' ›'; color:var(--ink-3); font-size:14px; transition:transform var(--t-fast); display:inline-block; }
  .lb-row.expandable.is-open .pos::after { transform:rotate(90deg); }
  .lb-drawer { display:none; padding:14px 12px 18px; border-bottom:1px solid var(--border);
    background:var(--surface-2); }
  .lb-drawer.is-open { display:block; }
  .lb-drawer .hole-grid { display:grid; grid-template-columns: 28px repeat(9, 1fr); gap:4px;
    font-family:'JetBrains Mono', monospace; font-size:12px; line-height:1.15; }
  .lb-drawer .hole-grid .lbl { color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; font-weight:700; font-size:10px; padding:4px 2px; text-align:right; }
  .lb-drawer .hole-grid .cell { padding:6px 0; text-align:center; border-radius:4px; background:var(--surface); }
  .lb-drawer .hole-grid .cell.hole { background:none; color:var(--ink-3); font-weight:700; }
  .lb-drawer .hole-grid .cell.par  { background:none; color:var(--ink-3); }
  /* Score-to-par color coding — same colors as the leaderboard totals. */
  .lb-drawer .hole-grid .cell.score.eagle  { background:#d4af37; color:#fff; font-weight:700; border-radius:50%; }
  .lb-drawer .hole-grid .cell.score.birdie { background:rgba(74,122,83,.18); color:#2d5d36; font-weight:700; border-radius:50%; }
  .lb-drawer .hole-grid .cell.score.par    { color:var(--ink); }
  .lb-drawer .hole-grid .cell.score.bogey  { background:rgba(192,57,43,.10); color:#a33; }
  .lb-drawer .hole-grid .cell.score.double { background:rgba(192,57,43,.22); color:#811; }
  .lb-drawer .hole-grid .cell.score.empty  { color:var(--ink-3); }
  /* "This score counts" outline (v3.66.1) — the member whose net score is
     the team's best on this hole gets a saffron ring inside the cell. */
  .lb-drawer .hole-grid .cell.score.used   { box-shadow:inset 0 0 0 2px var(--accent); font-weight:700; }
  /* Member sub-section in the drawer for best-ball / better-ball teams. */
  .lb-drawer .member-section { margin-top:14px; padding-top:10px; border-top:1px dashed var(--border); }
  .lb-drawer .member-section .member-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .lb-drawer .member-section .member-head .nm { font-weight:600; font-size:13px; }
  .lb-drawer .member-section .member-head .hcp { font-size:11px; color:var(--ink-3); }
  .lb-drawer .totals { display:flex; justify-content:space-between; gap:12px; margin-top:10px;
    padding-top:10px; border-top:1px dashed var(--border); font-size:12px; color:var(--ink-2); }
  .lb-drawer .totals strong { color:var(--ink); font-family:'JetBrains Mono', monospace; }
  .lb-drawer .legend { font-size:10px; color:var(--ink-3); margin-top:10px; display:flex; gap:14px; flex-wrap:wrap; }
  .lb-drawer .legend span { display:inline-flex; align-items:center; gap:4px; }
  .lb-drawer .legend .swatch { display:inline-block; width:12px; height:12px; border-radius:50%; }
  body.theme-dark .lb-drawer { background:rgba(255,255,255,.04); }
  body.theme-dark .lb-drawer .hole-grid .cell { background:rgba(255,255,255,.06); }

  /* Team standings (v3.50) — shown above the individual leaderboard
     when the host grouped players into teams. */
  .team-section { margin: var(--s-3) 0 var(--s-4); }
  .team-section h2 { font-family:var(--font-display); font-size:1.1rem; letter-spacing:-.01em;
    padding: 0 16px var(--s-2); color:var(--ink-2); }
  .team-row { display:grid; grid-template-columns:54px 1fr 64px 78px; gap:var(--s-2); align-items:center;
    padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface); }
  .team-row:first-child { border-radius: var(--r-md) var(--r-md) 0 0; }
  .team-row:last-child  { border-radius: 0 0 var(--r-md) var(--r-md); border-bottom:none; }
  .team-row .pos { font-family:var(--font-display); font-size:1.2rem; color:var(--accent); }
  .team-row .nm  { font-weight:600; }
  .team-row .nm small { display:block; font-weight:400; color:var(--ink-3); font-size:11px; margin-top:2px; }
  .team-row .thru { text-align:center; font-size:13px; color:var(--ink-2); }
  .team-row .tot  { text-align:right; font-family:var(--font-display); font-size:1.2rem; }
  .team-row .tot.under { color:#4A7A53; } .team-row .tot.over { color:var(--danger); }
  .team-row.is-leader { background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#FBF9F4; }
  .team-row.is-leader .pos, .team-row.is-leader .tot, .team-row.is-leader .nm small { color:#FBF9F4; }
  body.theme-dark .team-row { border-color:rgba(255,255,255,.1); background:rgba(255,255,255,.04); }
</style>
</head>
<body>
<div class="lb-wrap" id="app"></div>
<script src="/js/jord.js"></script>
<script>
const $ = (s,r=document)=>r.querySelector(s);
const esc = JORD.escapeHtml;
const roundId = location.pathname.split('/').pop();
// `expanded` is the set of entryIds currently showing their hole-by-hole
// drawer. Tracked here (not by DOM class) so SSE re-renders preserve the
// open/closed state without flicker.
const state = { round:null, leaderboard:null, tv:false, holes:[], expanded:new Set(), teams:[],
                 sideBets:[], activeTab:'primary' };
// Which leaderboard is currently visible — the primary or one of the side-bets
// keyed by 'sb:0', 'sb:1', etc. Defaults to primary.
function currentBoard() {
  if (state.activeTab === 'primary' || !state.activeTab) return state.leaderboard;
  if (state.activeTab.startsWith('sb:')) {
    const i = +state.activeTab.slice(3);
    return state.sideBets[i]?.leaderboard || state.leaderboard;
  }
  return state.leaderboard;
}
function currentSettings() {
  if (state.activeTab === 'primary' || !state.activeTab) return state.format_settings || {};
  const i = +state.activeTab.slice(3);
  return state.sideBets[i]?.settings || {};
}

function toParText(n){ return n==null?'—':(n===0?'E':(n>0?'+'+n:''+n)); }

// Score-to-par classification → CSS class for the hole-by-hole grid.
function scoreClass(strokes, par) {
  if (strokes == null) return 'empty';
  const d = strokes - par;
  if (d <= -2) return 'eagle';
  if (d === -1) return 'birdie';
  if (d === 0)  return 'par';
  if (d === 1)  return 'bogey';
  return 'double';
}

// Render the 18-hole grid for a single entry — shown when the user taps
// a leaderboard row. Splits into Out (1-9) and In (10-18) on phones so
// each half fits the viewport.
// Allocate one entry's course-handicap strokes across the holes using the
// WHS stroke-index method (same logic as scorecard.html's strokesOnHole).
// Returns a {holeNumber → strokes} map.
function strokesByHole(courseHcp, holes) {
  if (courseHcp == null || !holes.length) return {};
  const sign = courseHcp >= 0 ? 1 : -1;
  const abs = Math.abs(courseHcp);
  const total = holes.length || 18;
  const base = Math.floor(abs / total);
  const rem  = abs % total;
  const out = {};
  for (const h of holes) {
    const si = Number(h.stroke_index) || total;
    let extra = 0;
    if (sign >= 0) { if (si <= rem) extra = 1; }
    else            { if (si > total - rem) extra = 1; }
    out[h.hole_number] = sign * (base + extra);
  }
  return out;
}

function renderHoleDrawer(row) {
  if (!state.holes.length) return '<p style="text-align:center;color:var(--ink-3);font-size:12px;padding:8px">No scorecard layout for this round.</p>';
  const scores = row.scores || {};
  // Honor a manual stroke override when one is set on the entry (v3.64).
  const ov = row.strokeOverrides || row.stroke_overrides;
  const strokesGiven = (ov && Object.keys(ov).length)
    ? Object.fromEntries(state.holes.map(h => [h.hole_number, Number(ov[h.hole_number] ?? ov[String(h.hole_number)]) || 0]))
    : strokesByHole(row.courseHandicap, state.holes);
  const half = (start, end, label) => {
    const cells = [];
    cells.push(`<div class="lbl">${label}</div>`);
    for (let i = start; i <= end; i++) cells.push(`<div class="cell hole">${i}</div>`);
    cells.push('<div class="lbl">Par</div>');
    let parSum = 0;
    for (let i = start; i <= end; i++) {
      const h = state.holes.find(x => x.hole_number === i);
      const par = h ? h.par : 0;
      parSum += par;
      cells.push(`<div class="cell par">${par || '—'}</div>`);
    }
    // Strokes-given row — shows the player's per-hole handicap allocation.
    cells.push('<div class="lbl">Strk</div>');
    for (let i = start; i <= end; i++) {
      const s = strokesGiven[i] || 0;
      cells.push(`<div class="cell par" style="${s>0?'color:var(--accent);font-weight:700':''}">${s > 0 ? '+' + s : '—'}</div>`);
    }
    cells.push('<div class="lbl">Score</div>');
    let scoreSum = 0, anyScore = false;
    for (let i = start; i <= end; i++) {
      const h = state.holes.find(x => x.hole_number === i);
      const par = h ? h.par : 0;
      const s = scores[i] ?? scores[String(i)];
      if (s != null) { scoreSum += s; anyScore = true; }
      cells.push(`<div class="cell score ${scoreClass(s, par)}">${s != null ? s : '—'}</div>`);
    }
    return { html: `<div class="hole-grid">${cells.join('')}</div>`, parSum, scoreSum, anyScore };
  };
  const out = half(1, 9,  'Hole');
  const inn = half(10, 18, 'Hole');
  const totalScore = (out.anyScore ? out.scoreSum : 0) + (inn.anyScore ? inn.scoreSum : 0);
  const totalPar   = (out.anyScore ? out.parSum   : 0) + (inn.anyScore ? inn.parSum   : 0);
  const anyScore = out.anyScore || inn.anyScore;
  return `
    ${out.html}
    <div style="height:8px"></div>
    ${inn.html}
    <div class="totals">
      <span>Out <strong>${out.anyScore ? out.scoreSum : '—'}</strong></span>
      <span>In <strong>${inn.anyScore ? inn.scoreSum : '—'}</strong></span>
      <span>Total <strong>${anyScore ? totalScore : '—'}</strong>${anyScore ? ' (' + toParText(totalScore - totalPar) + ')' : ''}</span>
      ${row.courseHandicap != null ? `<span>HCP <strong>${row.courseHandicap}</strong></span>` : ''}
    </div>
    <div class="legend">
      <span><i class="swatch" style="background:#d4af37"></i> Eagle+</span>
      <span><i class="swatch" style="background:rgba(74,122,83,.55)"></i> Birdie</span>
      <span><i class="swatch" style="background:#fff;border:1px solid var(--border)"></i> Par</span>
      <span><i class="swatch" style="background:rgba(192,57,43,.45)"></i> Bogey</span>
      <span><i class="swatch" style="background:rgba(192,57,43,.85)"></i> Double+</span>
    </div>
    ${renderMembersInDrawer(row)}
  `;
}

// Render each team-member's hole-by-hole scores under the team aggregate row.
// Used by best-ball / better-ball — the row.members[] array carries each
// player's scores + course handicap + stroke map; row.winnerByHole tells us
// which member's net score is the team's best on each hole (saffron outline).
function renderMembersInDrawer(row) {
  if (!Array.isArray(row.members) || row.members.length < 2) return '';
  const winners = row.winnerByHole || {};
  const memberHTML = row.members.map(m => {
    const scores = m.scores || {};
    const ov = m.strokeOverrides;
    const strokesGiven = (ov && Object.keys(ov).length)
      ? Object.fromEntries(state.holes.map(h => [h.hole_number, Number(ov[h.hole_number] ?? ov[String(h.hole_number)]) || 0]))
      : strokesByHole(m.courseHandicap, state.holes);
    const half = (start, end, label) => {
      const cells = [];
      cells.push(`<div class="lbl">${label}</div>`);
      for (let i = start; i <= end; i++) cells.push(`<div class="cell hole">${i}</div>`);
      cells.push('<div class="lbl">Strk</div>');
      for (let i = start; i <= end; i++) {
        const s = strokesGiven[i] || 0;
        cells.push(`<div class="cell par" style="${s>0?'color:var(--accent);font-weight:700':''}">${s > 0 ? '+' + s : '—'}</div>`);
      }
      cells.push('<div class="lbl">Score</div>');
      let scoreSum = 0, anyScore = false;
      for (let i = start; i <= end; i++) {
        const h = state.holes.find(x => x.hole_number === i);
        const par = h ? h.par : 0;
        const s = scores[i] ?? scores[String(i)];
        if (s != null) { scoreSum += s; anyScore = true; }
        const isUsed = winners[i] === m.entryId || winners[String(i)] === m.entryId;
        cells.push(`<div class="cell score ${scoreClass(s, par)} ${isUsed?'used':''}" title="${isUsed?'This score counts for the team':''}">${s != null ? s : '—'}</div>`);
      }
      return { html: `<div class="hole-grid">${cells.join('')}</div>`, scoreSum, anyScore };
    };
    const out = half(1, 9, 'Hole');
    const inn = half(10, 18, 'Hole');
    const total = (out.anyScore ? out.scoreSum : 0) + (inn.anyScore ? inn.scoreSum : 0);
    return `<div class="member-section">
      <div class="member-head">
        <span class="nm">${esc(m.playerName)}</span>
        <span class="hcp">CH ${m.courseHandicap != null ? m.courseHandicap : '—'} · Gross ${out.anyScore || inn.anyScore ? total : '—'}</span>
      </div>
      ${out.html}
      <div style="height:6px"></div>
      ${inn.html}
    </div>`;
  }).join('');
  return memberHTML;
}

// Render the team-aggregate strip (shown above the individual rows when
// teams exist). Sort + position done server-side in buildTeamStandings.
function renderTeamSection(scoreType, unit) {
  if (!state.teams || !state.teams.length) return '';
  const lowWins = scoreType === 'topar';
  const useNet  = state.leaderboard && /net/i.test(state.leaderboard.format || '');
  return `<div class="team-section">
    <h2>Team standings</h2>
    ${state.teams.map(t => {
      let total, totText, cls = '';
      if (scoreType === 'points') {
        total = t.points || 0;
        totText = total + ' pts';
      } else {
        total = useNet ? t.toParNet : t.toParGross;
        totText = total == null ? '—' : (total === 0 ? 'E' : total > 0 ? '+' + total : ('' + total));
        cls = total != null ? (total < 0 ? 'under' : total > 0 ? 'over' : '') : '';
      }
      const members = t.members.map(m => esc(m.playerName)).join(' · ');
      const lowestThru = t.thru || 0;
      return `<div class="team-row ${t.position === 1 && total != null ? 'is-leader' : ''}">
        <div class="pos">${t.position}</div>
        <div class="nm">${esc(t.teamName)}<small>${members}</small></div>
        <div class="thru">${lowestThru ? (lowestThru >= 18 ? 'F' : lowestThru) : '–'}</div>
        <div class="tot ${cls}">${totText}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function render() {
  const r = state.round;
  const lb = currentBoard();
  if (!r) { $('#app').innerHTML = `<div class="gate"><div style="font-size:48px">🔍</div>
    <h1 style="font-family:var(--font-display)">Round not found</h1></div>`; return; }

  if (lb && lb.scoreType === 'match') return renderMatch(r, lb);
  const st = lb ? lb.scoreType : 'topar';
  const lowWins = st === 'topar';
  // Vegas signed-margin: positive total = team ahead, negative = behind
  const unit = st==='skins' ? 'skins' : st==='points' || st==='vegas' ? 'pts' : '';
  const headLabel = st==='skins' ? 'Skins' : st==='vegas' ? 'Vegas' : st==='points' ? 'Points' : 'Total';
  const subLabel = st==='skins' ? 'Skins won' : st==='vegas' ? 'Vegas — pair margin' : st==='points' ? 'Stableford — points' : 'Strokes to par';
  // Money-style hint shown beneath the leaderboard when wagering is on.
  const fs = currentSettings();
  const moneyNote = (() => {
    if (st === 'skins' && fs.value_per_skin) return `$${Number(fs.value_per_skin).toFixed(2)} per skin`;
    if (st === 'vegas' && fs.value_per_point) return `$${Number(fs.value_per_point).toFixed(2)} per point`;
    return '';
  })();
  const rows = lb ? lb.rows : [];
  // Multi-leaderboard tab strip (v3.60). Renders only when side-bets are present.
  const hasTabs = Array.isArray(state.sideBets) && state.sideBets.length > 0;
  const tabsHTML = hasTabs ? `
    <div class="lb-tabs">
      <button class="lb-tab ${state.activeTab==='primary'?'is-active':''}" data-tab="primary">${esc(state.primaryName || 'Primary')}</button>
      ${state.sideBets.map((sb, i) => `
        <button class="lb-tab ${state.activeTab==='sb:'+i?'is-active':''}" data-tab="sb:${i}">${esc(sb.emoji||'🎯')} ${esc(sb.formatName||'Side bet')}</button>
      `).join('')}
    </div>` : '';
  $('#app').innerHTML = `
    <div class="lb-head">
      <div class="eyebrow"><span class="live-dot"></span>${r.status==='active'?'Live':esc(r.status)}</div>
      <h1>Leaderboard</h1>
      <div class="mini">Round ${r.round_number} · ${subLabel}</div>
    </div>
    <div class="lb-controls"><button class="btn btn-ghost" id="tvBtn">${state.tv?'Exit TV':'📺 TV mode'}</button></div>
    ${tabsHTML}
    ${moneyNote ? `<div class="mini" style="text-align:center;color:var(--ink-3);margin:8px 0">${esc(moneyNote)}</div>` : ''}
    ${renderTeamSection(st, unit)}
    <div class="lb-row head"><div>Pos</div><div>Player</div><div class="thru">Thru</div>
      <div class="tot">${headLabel}</div></div>
    <div id="rows"></div>`;
  $('#tvBtn').onclick = () => { state.tv=!state.tv; document.body.classList.toggle('theme-dark',state.tv); render(); };
  // Wire tab clicks
  if (hasTabs) {
    document.querySelectorAll('.lb-tab').forEach(btn => {
      btn.onclick = () => { state.activeTab = btn.dataset.tab; render(); };
    });
  }

  if (!rows.length) { $('#rows').innerHTML =
    '<p style="text-align:center;color:var(--ink-3);padding:var(--s-6)">No players yet.</p>'; return; }
  // Each row carries its own per-hole scores (v3.49 enrichment), so the
  // tap-to-expand drawer can render without an extra fetch.
  const expandable = state.holes.length > 0;
  const rowHtml = row => {
    const t = row.total;
    const totText = lowWins ? toParText(t) : (t==null?'—':t+(unit?' '+unit:''));
    const cls = lowWins ? (t<0?'under':t>0?'over':'') : '';
    // Sub-line: gross-strokes for net leaderboards, plus the player's course
    // handicap (CH) so spectators can sanity-check the net-to-gross delta.
    const hcpBit = row.courseHandicap != null ? `CH ${row.courseHandicap}` : '';
    const scoreBit = row.score!=null
      ? (lowWins ? row.score+' strokes' : row.score+(unit?' '+unit:''))
      : 'not started';
    const sub = [hcpBit, scoreBit].filter(Boolean).join(' · ');
    const pos = lb.flighted ? row.flightPosition : row.position;
    const isOpen = expandable && row.entryId && state.expanded.has(row.entryId);
    return `<div class="lb-row ${pos===1&&t!=null?'is-leader':''} ${expandable && row.entryId ? 'expandable' : ''} ${isOpen?'is-open':''}"
      ${expandable && row.entryId ? `data-toggle="${esc(row.entryId)}"` : ''}>
      <div class="pos">${row.thru?((row.tied&&!lb.flighted?'T':'')+pos):'–'}</div>
      <div class="nm">${esc(row.playerName)}<small>${sub}</small></div>
      <div class="thru">${row.thru?(row.thru>=18?'F':row.thru):'–'}</div>
      <div class="tot ${cls}">${totText}</div>
    </div>
    ${isOpen ? `<div class="lb-drawer is-open">${renderHoleDrawer(row)}</div>` : ''}`;
  };
  if (lb.flighted) {
    let html = '';
    for (let f=1; f<=lb.flighted; f++) {
      const fr = rows.filter(r=>r.flight===f);
      if (fr.length) html += `<div class="flight-head">Flight ${f}</div>` + fr.map(rowHtml).join('');
    }
    $('#rows').innerHTML = html;
  } else {
    $('#rows').innerHTML = rows.map(rowHtml).join('');
  }
  // Wire the toggle. We re-render rather than mutate so the open drawer
  // shows updated scores on the next SSE tick.
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.toggle;
      if (state.expanded.has(id)) state.expanded.delete(id);
      else state.expanded.add(id);
      render();
    };
  });
}

function renderMatch(r, lb) {
  const m = lb.match, rows = lb.rows || [];
  const a = rows[0] || { playerName:'—' }, b = rows[1] || { playerName:'—' };
  let big, sub;
  if (!m) { big = '—'; sub = 'Add two competitors'; }
  else if (m.status === 'closed') {
    big = m.result;
    sub = m.standing === 0 ? 'Match halved' : esc(a.playerName) + ' won';
  } else if (m.status === 'dormie') {
    big = 'DORMIE'; sub = esc(a.playerName) + ' · thru ' + m.played;
  } else {
    big = m.standing === 0 ? 'ALL SQUARE' : Math.abs(m.standing) + ' UP';
    sub = (m.standing === 0 ? '' : esc(a.playerName) + ' · ') + 'thru ' + m.played;
  }
  $('#app').innerHTML = `
    <div class="lb-head">
      <div class="eyebrow"><span class="live-dot"></span>${r.status==='active'?'Live':esc(r.status)}</div>
      <h1>Match Play</h1>
      <div class="mini">Round ${r.round_number}</div>
    </div>
    <div class="lb-controls"><button class="btn btn-ghost" id="tvBtn">${state.tv?'Exit TV':'📺 TV mode'}</button></div>
    <div class="match-card">
      <div class="match-side ${m&&m.standing>0?'win':''}">${esc(a.playerName)}</div>
      <div class="match-status"><div class="big">${esc(String(big))}</div><div class="sub">${sub}</div></div>
      <div class="match-side ${m&&m.standing<0?'win':''}">${esc(b.playerName)}</div>
    </div>`;
  $('#tvBtn').onclick = () => { state.tv=!state.tv; document.body.classList.toggle('theme-dark',state.tv); render(); };
}

function apply(payload){
  state.round = payload.round;
  state.leaderboard = payload.leaderboard;
  if (Array.isArray(payload.holes)) state.holes = payload.holes;
  state.teams = Array.isArray(payload.teams) ? payload.teams : [];
  state.format_settings = payload.format_settings || null;
  // v3.60 multi-leaderboard: extra games layered on top of the primary.
  // Each side-bet has its own leaderboard / settings; the tab strip lets
  // spectators flip between them.
  state.sideBets = Array.isArray(payload.sideBets) ? payload.sideBets : [];
  // Pick a friendly name for the primary tab from the round's format id.
  state.primaryName = primaryNameForFormat(state.round?.format);
  render();
}

// Map a format id → a short label for the primary tab. We keep this client-
// side so live.html doesn't need a /api/formats round-trip — it's cosmetic.
const PRIMARY_NAME_BY_ENGINE = {
  stroke: 'Stroke Play', stableford: 'Stableford', scramble: 'Scramble',
  bestball: 'Best Ball', skins: 'Skins', erado: 'Erado', duplicate: 'Duplicate',
  matchplay: 'Match Play', vegas: 'Vegas', nassau: 'Nassau',
  lownet: 'Low Scratch/Net', rumble: 'Irish Rumble',
};
function primaryNameForFormat(id) {
  if (!id) return 'Primary';
  // Engine is mid-segment of the id (e.g. 'stroke_net' → 'stroke').
  // For ids that don't map cleanly we just title-case the id.
  const eng = id.split('_')[0];
  return PRIMARY_NAME_BY_ENGINE[eng] || id.replace(/_/g, ' ');
}

function connect(){
  const es = new EventSource('/api/rounds/'+roundId+'/stream');
  es.onmessage = e => { try { apply(JSON.parse(e.data)); } catch {} };
  es.onerror = () => {};   // EventSource auto-reconnects
}

(async function init(){
  try {
    const data = await JORD.api('/api/rounds/'+roundId);
    state.round = data.round;
  } catch { render(); return; }
  render();
  connect();
})();
</script>
</body>
</html>
