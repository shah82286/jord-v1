<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Map Diagnostic · JORD</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<style>
  body { font-family: monospace; padding: 24px; background: #111; color: #eee; font-size: 14px; }
  h2   { color: #BEFF3A; margin-bottom: 16px; }
  .row { padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; display:flex; gap: 12px; align-items: flex-start; }
  .ok  { background: rgba(34,197,94,0.15); border-left: 3px solid #22c55e; }
  .err { background: rgba(220,38,38,0.15);  border-left: 3px solid #dc2626; }
  .wrn { background: rgba(234,179,8,0.15);  border-left: 3px solid #eab308; }
  .inf { background: rgba(99,102,241,0.15); border-left: 3px solid #6366f1; }
  .icon { font-size: 18px; flex-shrink:0; }
  .label { font-weight: bold; }
  .detail { color: #aaa; font-size: 12px; margin-top: 3px; word-break: break-all; }
  #map { width: 100%; height: 300px; margin-top: 24px; border-radius: 8px; border: 1px solid #333; background:#222; }
  #errors { margin-top: 16px; }
  .err-item { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); border-radius:4px; padding:8px 12px; margin-bottom:6px; font-size:12px; color:#f87171; }
</style>
</head>
<body>
<h2>🔍 JORD Map Diagnostic</h2>
<div id="results"></div>
<div id="map"></div>
<div id="errors"></div>

<script>
var results  = document.getElementById('results');
var errorsEl = document.getElementById('errors');
var allErrors = [];

// Capture ALL errors globally
window.addEventListener('error', function(e) {
  allErrors.push('JS ERROR: ' + e.message + (e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : ''));
  showErrors();
});
window.addEventListener('unhandledrejection', function(e) {
  allErrors.push('PROMISE ERROR: ' + (e.reason?.message || e.reason));
  showErrors();
});

function showErrors() {
  errorsEl.innerHTML = allErrors.map(function(e) {
    return '<div class="err-item">' + e + '</div>';
  }).join('');
}

function row(kind, icon, label, detail) {
  var d = document.createElement('div');
  d.className = 'row ' + kind;
  d.innerHTML = '<span class="icon">' + icon + '</span><div><div class="label">' + label + '</div>' + (detail ? '<div class="detail">' + detail + '</div>' : '') + '</div>';
  results.appendChild(d);
}

// ── Step 1: WebGL ───────────────────────────────────────────────────────────
(function() {
  try {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (gl) {
      row('ok', '✅', 'WebGL supported', gl.getParameter(gl.RENDERER));
    } else {
      row('err', '❌', 'WebGL NOT available', 'Maps cannot render without WebGL. Enable hardware acceleration in your browser settings.');
    }
  } catch(e) {
    row('err', '❌', 'WebGL check failed', e.message);
  }
})();

// ── Step 2: Mapbox GL script ────────────────────────────────────────────────
window.addEventListener('load', function() {
  if (typeof mapboxgl !== 'undefined') {
    row('ok', '✅', 'Mapbox GL JS loaded', 'Version: ' + (mapboxgl.version || 'unknown'));
    if (!mapboxgl.supported()) {
      row('err', '❌', 'Mapbox says browser is NOT supported', 'mapboxgl.supported() returned false');
    } else {
      row('ok', '✅', 'Mapbox browser check passed', 'mapboxgl.supported() = true');
    }
  } else {
    row('err', '❌', 'Mapbox GL JS FAILED TO LOAD', 'The script from api.mapbox.com did not load. Check for ad blockers, or network issues. Try Ctrl+Shift+R.');
    return;
  }

  // ── Step 3: Fetch token ─────────────────────────────────────────────────
  fetch('/api/config').then(function(r) { return r.json(); }).then(function(cfg) {
    var token = cfg.mapbox_token || '';
    if (!token) {
      row('err', '❌', 'No Mapbox token from server', '/api/config returned empty mapbox_token');
      return;
    }
    if (!token.startsWith('pk.')) {
      row('err', '❌', 'Token format wrong', 'Token must start with pk. — got: ' + token.slice(0,20));
      return;
    }
    row('ok', '✅', 'Token received from server', token.slice(0,30) + '...');

    // ── Step 4: Init map ──────────────────────────────────────────────────
    mapboxgl.accessToken = token;
    var map;
    try {
      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [-84.3953, 33.5031],
        zoom: 14
      });
      row('inf', '⏳', 'Map object created — waiting for tiles...', 'If the map below stays gray, the token is being rejected by Mapbox');
    } catch(e) {
      row('err', '❌', 'Map creation threw an error', e.message);
      return;
    }

    // ── Step 5: Map events ────────────────────────────────────────────────
    map.on('load', function() {
      row('ok', '✅', 'Map LOADED successfully — tiles are rendering!', 'All systems go. If admin map is still gray, it is a code/timing issue (not the token).');
    });

    map.on('error', function(e) {
      var status = e.status || (e.error && e.error.status);
      var msg    = e.error?.message || JSON.stringify(e).slice(0,200);
      if (status === 401 || status === 403) {
        row('err', '❌', 'Token REJECTED by Mapbox (HTTP ' + status + ')', 'Your token has URL restrictions. Go to account.mapbox.com → Access tokens → find this token → remove URL restrictions or add http://localhost:3000');
      } else {
        row('err', '❌', 'Mapbox error: ' + msg, 'Status: ' + (status || 'none'));
      }
    });

    map.on('style.error', function(e) {
      row('err', '❌', 'Style load error', JSON.stringify(e).slice(0,200));
    });

    // Timeout — if no load/error after 8s, something is silently blocked
    setTimeout(function() {
      if (!map.loaded()) {
        row('wrn', '⚠️', 'Map did not load after 8 seconds', 'Tiles may be blocked. Check the Network tab in DevTools (F12) for failed requests to api.mapbox.com');
      }
    }, 8000);

  }).catch(function(e) {
    row('err', '❌', 'Could not reach /api/config', e.message);
  });
});
</script>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
</body>
</html>
