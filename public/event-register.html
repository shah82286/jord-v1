<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Register · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  body { background: var(--bg); }

  .er-topbar { display:flex; align-items:center; justify-content:space-between;
    padding:14px var(--s-4); border-bottom:1px solid var(--border); background:var(--surface); }
  .er-topbar .brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:14px; }
  .er-topbar a { color:var(--ink-2); font-size:14px; text-decoration:none; }
  .er-topbar a:hover { color:var(--ink); }

  .er-wrap { max-width:820px; margin:0 auto; padding:var(--s-6) var(--s-4) var(--s-8); }
  .er-eyebrow { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-3); font-weight:700; }
  .er-wrap h1 { font-family:var(--font-display); font-size:clamp(2rem,5vw,2.8rem);
    letter-spacing:-0.02em; line-height:1.1; margin:8px 0 var(--s-2); }
  .er-wrap h1 em { font-style:italic; color:var(--accent); }
  .er-wrap .lead { color:var(--ink-2); font-size:16px; line-height:1.5; margin-bottom:var(--s-5); }

  .er-grid { display:grid; gap:var(--s-4); grid-template-columns: 1fr; }
  @media (min-width: 760px) { .er-grid { grid-template-columns: 1fr 320px; } }

  .er-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
    padding:var(--s-4); }
  .er-card h2 { font-family:var(--font-display); font-size:1.4rem; margin-bottom:var(--s-3); }
  .er-card h3 { font-size:14px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-3);
    margin: var(--s-3) 0 var(--s-2); font-weight:700; }

  .form-row { margin-bottom:var(--s-3); }
  .form-row label { display:block; font-size:13px; font-weight:600; color:var(--ink-2); margin-bottom:6px; }
  .form-row .input-lg { width:100%; }
  .form-row small { display:block; color:var(--ink-3); font-size:12px; margin-top:4px; }

  .player-row { display:flex; gap:var(--s-2); align-items:center; margin-bottom:var(--s-2); }
  .player-row .num { width:28px; height:28px; border-radius:50%; background:var(--surface-2);
    color:var(--ink-2); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; flex-shrink:0; }
  .player-row .input-lg { flex:1; }

  /* ── Summary sidebar ─────────────────────────────────────────── */
  .er-summary { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
    padding:var(--s-4); position:sticky; top:var(--s-3); }
  .er-summary .label { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); font-weight:700; }
  .er-summary .pkg-name { font-family:var(--font-display); font-size:1.3rem; margin-top:6px; }
  .er-summary .event-name { color:var(--ink-2); font-size:13px; margin-top:2px; }
  .er-summary .desc { font-size:13.5px; color:var(--ink-2); margin:var(--s-3) 0; line-height:1.5; }
  .er-summary .lines { border-top:1px solid var(--border); padding-top:var(--s-3); margin-top:var(--s-3); }
  .er-summary .line { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; color:var(--ink-2); }
  .er-summary .total { display:flex; justify-content:space-between; padding-top:var(--s-2); margin-top:var(--s-2);
    border-top:1px solid var(--border); font-family:var(--font-display); font-size:1.6rem; }
  .er-summary .fee-note { font-size:11px; color:var(--ink-3); margin-top:6px; line-height:1.4; }

  .er-cta { padding:18px; font-size:17px; font-weight:700; width:100%; margin-top:var(--s-3); }
  .er-cta:disabled { opacity:.5; cursor:not-allowed; }
  .er-error { background:rgba(220,53,69,0.08); color:#c0392b; border:1px solid rgba(220,53,69,0.25);
    border-radius:var(--r-md); padding:12px; font-size:14px; margin-top:var(--s-3); display:none; }
  .er-mock-badge { display:inline-block; background:rgba(184,136,77,0.12); color:var(--accent);
    border:1px solid rgba(184,136,77,0.35); padding:4px 10px; border-radius:999px;
    font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:var(--s-3); }

  .gate { text-align:center; padding:var(--s-8) var(--s-4); }
</style>
</head>
<body>

<div class="er-topbar">
  <div class="brand"><img src="/img/logos/script-black.png" alt="JORD" style="height:22px"/></div>
  <a id="back-link" href="#">← Back to event</a>
</div>

<div id="app"><div class="gate"><p>Loading…</p></div></div>

<script src="/js/jord.js"></script>
<script>
const esc = JORD.escapeHtml;
const parts = location.pathname.split('/').filter(Boolean);
const slug = parts[1]; // /e/SLUG/register
const pkgId = new URLSearchParams(location.search).get('pkg') || '';

function fmtPrice(cents) {
  const n = (Number(cents) || 0) / 100;
  return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function playerInputs(n) {
  return Array.from({ length: n }, (_, i) =>
    `<div class="player-row">
      <div class="num">${i+1}</div>
      <input class="input-lg" type="text" name="player_${i}" placeholder="${i===0?'Captain / lead golfer':'Player ' + (i+1)} (full name)" ${i===0?'required':''} />
    </div>`).join('');
}

function render(d) {
  const { site, event, packages, registration_open, payment_mode } = d;
  // The pkg id can point at a player ticket, a sponsorship, OR a store
  // item — all flow through the same checkout. The page just shifts
  // copy + skips the player roster for the non-registration kinds.
  const allItems = [...(packages || []), ...((d.sponsorships) || []), ...((d.store_items) || [])];
  const pkg = allItems.find(p => p.id === pkgId) || packages[0];
  if (!pkg) {
    document.getElementById('app').innerHTML =
      `<div class="gate"><h1 style="font-family:var(--font-display)">No packages available</h1>
       <p style="color:var(--ink-2)">This event has no registration packages set up yet.</p></div>`;
    return;
  }

  document.title = `Register · ${esc(site.headline || event.name || 'Event')} · JORD Golf`;
  document.getElementById('back-link').href = `/e/${encodeURIComponent(slug)}#register`;
  if (event.brand_accent) document.documentElement.style.setProperty('--accent', event.brand_accent);

  if (!registration_open) {
    document.getElementById('app').innerHTML = `
      <div class="gate">
        <div style="font-size:48px">⏳</div>
        <h1 style="font-family:var(--font-display)">Registration isn't open yet</h1>
        <p style="color:var(--ink-2);max-width:480px;margin:0 auto">
          The organizer is still finishing their payment setup. Check back soon —
          or contact ${site.contact_email ? `<a href="mailto:${esc(site.contact_email)}" style="color:var(--ink)">${esc(site.contact_email)}</a>` : 'the organizer'} for help.
        </p>
        <a href="/e/${encodeURIComponent(slug)}" class="btn btn-primary" style="margin-top:var(--s-4)">Back to event</a>
      </div>`;
    return;
  }

  const fee = Math.round((pkg.price_cents || 0) * 0.03);
  const total = (pkg.price_cents || 0) + fee;
  const kind = pkg.package_kind || 'registration';
  const isSponsor   = kind === 'sponsorship';
  const isStoreItem = kind === 'event_item';
  const isNonPlayer = isSponsor || isStoreItem;
  // Non-registration kinds (sponsorships, store items) skip the player
  // roster; registrations need at least 1 slot.
  const playerCount = isNonPlayer
    ? Math.max(0, Number(pkg.includes_players) || 0)
    : Math.max(1, Number(pkg.includes_players) || 1);
  const isFree = pkg.price_cents === 0;
  const isTestMode = payment_mode !== 'stripe' || /sk_test|pk_test/i.test(''); // server only exposes mode, never the key
  const canceled = new URLSearchParams(location.search).get('canceled') === '1';

  document.getElementById('app').innerHTML = `
    <div class="er-wrap">
      <div class="er-eyebrow">${esc(site.headline || event.name || 'Event')}</div>
      <h1>${isStoreItem ? `Check out: <em>${esc(pkg.name)}</em>`
                         : isSponsor ? `Confirm your <em>sponsorship</em>`
                         : `Complete your <em>registration</em>`}</h1>
      <p class="lead">${isStoreItem
          ? `Thanks for supporting the event. ${isFree ? 'This item is free.' : `You'll be redirected to a secure checkout to pay.`}`
          : isSponsor
          ? `Thanks for sponsoring. ${isFree ? 'This sponsorship is free.' : `You'll be redirected to a secure checkout to pay.`}`
          : `A few details and you're in. ${isFree ? 'This package is free.' : `You'll be redirected to a secure checkout to pay.`}`}</p>

      ${canceled ? `<div class="er-error" style="display:block;background:rgba(184,136,77,0.10);color:var(--accent);border-color:rgba(184,136,77,0.35);margin-bottom:var(--s-4)">
        Checkout was canceled — your details are still here, just hit pay when you're ready.
      </div>` : ''}

      <div class="er-grid">
        <form id="reg-form" class="er-card" novalidate>
          ${payment_mode !== 'stripe' ? '<span class="er-mock-badge">Test mode</span>' : ''}

          <h2>Your information</h2>
          <div class="form-row">
            <label for="buyer_name">Full name *</label>
            <input class="input-lg" id="buyer_name" name="buyer_name" type="text" required autocomplete="name" />
          </div>
          <div class="form-row">
            <label for="buyer_email">Email *</label>
            <input class="input-lg" id="buyer_email" name="buyer_email" type="email" required autocomplete="email" />
            <small>Confirmation and event updates will be sent here.</small>
          </div>
          <div class="form-row">
            <label for="buyer_phone">Phone <span style="color:var(--ink-3);font-weight:400">(optional)</span></label>
            <input class="input-lg" id="buyer_phone" name="buyer_phone" type="tel" autocomplete="tel" />
          </div>

          ${playerCount > 0 ? `
            <h3>Player roster (${playerCount})</h3>
            ${playerInputs(playerCount)}
          ` : (isNonPlayer ? `<p class="hint" style="margin-top:8px">No player roster needed — this purchase doesn't add a playing slot.</p>` : '')}

          <button class="btn btn-primary er-cta" id="submit-btn" type="submit">
            ${isFree
              ? (isStoreItem ? 'Confirm purchase →' : isSponsor ? 'Confirm sponsorship →' : 'Confirm registration →')
              : `Pay ${fmtPrice(total)} →`}
          </button>
          <div class="er-error" id="er-error"></div>
          <p style="font-size:12px;color:var(--ink-3);margin-top:var(--s-3);line-height:1.5;text-align:center">
            ${payment_mode === 'stripe'
              ? 'Payments are processed securely by Stripe. Your card details never touch JORD\'s servers.'
              : 'Payment is in <strong>test mode</strong> — no card is charged.'}
          </p>
        </form>

        <aside class="er-summary">
          <div class="label">${isStoreItem ? `You're buying` : isSponsor ? `You're sponsoring` : `You're registering for`}</div>
          <div class="pkg-name">${esc(pkg.name)}</div>
          <div class="event-name">${esc(event.name || '')}</div>
          ${pkg.description ? `<div class="desc">${esc(pkg.description)}</div>` : ''}
          <div class="lines">
            <div class="line"><span>${esc(pkg.name)}</span><span>${fmtPrice(pkg.price_cents)}</span></div>
            ${!isFree ? `<div class="line"><span>Service fee (3%)</span><span>${fmtPrice(fee)}</span></div>` : ''}
          </div>
          <div class="total"><span>Total</span><span>${isFree ? 'Free' : fmtPrice(total)}</span></div>
          ${!isFree ? `<p class="fee-note">Service fee helps cover payment processing and platform costs. The organizer receives the package price in full.</p>` : ''}
        </aside>
      </div>
    </div>
  `;

  document.getElementById('reg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.currentTarget;
    const errBox = document.getElementById('er-error');
    errBox.style.display = 'none';
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    const oldLabel = btn.textContent;
    btn.textContent = 'Processing…';

    const players = [];
    for (let i = 0; i < playerCount; i++) {
      const name = (f[`player_${i}`]?.value || '').trim();
      if (name) players.push({ name });
    }

    try {
      const res = await JORD.api('/api/registrations', {
        method: 'POST',
        body: {
          event_id: event.id,
          package_id: pkg.id,
          buyer_name: f.buyer_name.value.trim(),
          buyer_email: f.buyer_email.value.trim(),
          buyer_phone: f.buyer_phone.value.trim(),
          players,
        },
      });
      // Stripe path returns a hosted-checkout URL; mock path returns a
      // confirmation URL.
      location.href = res.checkout_url || res.confirmation_url;
    } catch (err) {
      errBox.textContent = (err && err.message) || 'Something went wrong. Please try again.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = oldLabel;
    }
  });
}

(async () => {
  try {
    const d = await JORD.api('/api/event-sites/' + encodeURIComponent(slug));
    render(d);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="gate"><div style="font-size:48px">🔍</div>
       <h1 style="font-family:var(--font-display)">Event not found</h1>
       <p style="color:var(--ink-2)">The link may be wrong or the event isn't published yet.</p></div>`;
  }
})();
</script>
</body>
</html>
