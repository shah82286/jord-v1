<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Join the game · JORD Golf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/jord.css" />
  <style>
    .rj-wrap { max-width:680px; margin:0 auto; padding:var(--s-5) var(--s-4) var(--s-7); }
    .rj-hero { text-align:center; padding:var(--s-4) 0 var(--s-3); }
    .rj-eyebrow { font-size:12px; letter-spacing:.26em; text-transform:uppercase;
      color:var(--accent); font-weight:700; }
    .rj-title { font-family:var(--font-display); font-size:clamp(1.8rem,4vw,2.4rem);
      letter-spacing:-.02em; margin:6px 0; }
    .rj-meta { color:var(--ink-2); font-size:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }

    .rj-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
      padding:var(--s-4); margin-bottom:var(--s-3); }
    .rj-card h3 { font-family:var(--font-display); font-size:1.2rem; margin-bottom:var(--s-2); }

    .player-list { display:flex; flex-direction:column; gap:6px; }
    .player-row { display:flex; align-items:center; gap:10px; padding:10px 12px;
      background:var(--bg); border:1px solid var(--border); border-radius:var(--r-md); font-size:14px; }
    .player-row .num { width:24px; height:24px; border-radius:50%; background:var(--surface-2);
      display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:var(--ink-2); }
    .player-row.is-you { background:rgba(184,136,77,0.08); border-color:var(--accent); }
    .player-row .meta { font-size:11px; color:var(--ink-3); }

    .join-form .field { margin-bottom:var(--s-3); }
    .join-form label { display:block; font-size:12px; font-weight:600; color:var(--ink-2);
      letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
    .join-form input, .join-form select {
      width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:var(--r-md);
      background:var(--bg); color:var(--ink); font-size:15px; font-family:inherit; }
    .join-form .row { display:grid; grid-template-columns:1fr 1fr; gap:var(--s-2); }
    @media (max-width: 560px) { .join-form .row { grid-template-columns:1fr; } }
    .err { color:#c0392b; font-size:14px; margin-top:var(--s-3); display:none; }
    .err.is-shown { display:block; }

    .actions { display:flex; gap:var(--s-2); flex-wrap:wrap; }

    .joined-banner { background:rgba(31,126,42,.08); border:1px solid rgba(31,126,42,.30);
      color:#1f7e2a; padding:14px 18px; border-radius:var(--r-md); font-size:14px;
      margin-bottom:var(--s-3); }
    .joined-banner strong { color:#155a1f; }

    /* Banter chat drawer (v3.51) — fixed bottom-right pill that expands
       into a chat panel. Always reachable while the user reads the page. */
    .chat-fab { position:fixed; bottom:18px; right:18px; z-index:30;
      display:flex; align-items:center; gap:6px; padding:10px 16px;
      background:var(--ink); color:var(--bg); border:none; border-radius:999px;
      font-family:inherit; font-weight:600; font-size:14px; cursor:pointer;
      box-shadow:0 6px 20px rgba(0,0,0,.20); }
    .chat-fab .badge { background:var(--accent); color:#fff; min-width:18px; height:18px;
      border-radius:9px; padding:0 5px; font-size:11px; display:inline-flex;
      align-items:center; justify-content:center; font-weight:700; }
    .chat-panel { position:fixed; bottom:18px; right:18px; z-index:31;
      width:min(380px, calc(100vw - 36px)); height:min(540px, calc(100vh - 100px));
      background:var(--bg); border:1px solid var(--border); border-radius:var(--r-lg);
      box-shadow:0 16px 50px rgba(0,0,0,.30); display:none; flex-direction:column; overflow:hidden; }
    .chat-panel.is-open { display:flex; }
    .chat-head { padding:12px 14px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; }
    .chat-head h3 { font-family:var(--font-display); font-size:1.05rem; }
    .chat-head .x { background:none; border:none; color:var(--ink-2); font-size:20px;
      cursor:pointer; padding:0 4px; line-height:1; }
    .chat-msgs { flex:1; overflow-y:auto; padding:10px 12px; display:flex;
      flex-direction:column; gap:8px; font-size:14px; line-height:1.4; }
    .chat-msg { padding:8px 10px; background:var(--surface); border-radius:var(--r-md);
      border:1px solid var(--border); }
    .chat-msg.is-me  { background:rgba(184,136,77,.08); border-color:rgba(184,136,77,.30); }
    .chat-msg .from { font-size:11px; font-weight:700; color:var(--ink-2);
      letter-spacing:.04em; }
    .chat-msg .from .time { color:var(--ink-3); font-weight:400; margin-left:6px; }
    .chat-msg .body { color:var(--ink); white-space:pre-wrap; word-break:break-word; }
    .chat-empty { text-align:center; color:var(--ink-3); padding:24px 12px; font-size:13px; }
    .chat-input { display:flex; gap:6px; padding:10px; border-top:1px solid var(--border); }
    .chat-input input { flex:1; padding:9px 12px; border:1px solid var(--border);
      border-radius:var(--r-md); background:var(--surface); font-size:14px; font-family:inherit; }
    .chat-input button { padding:0 14px; background:var(--accent); color:#fff;
      border:none; border-radius:var(--r-md); font-weight:600; cursor:pointer; font-size:14px; }
    .chat-name-row { padding:8px 10px; border-top:1px solid var(--border);
      font-size:11px; color:var(--ink-3); display:flex; align-items:center; gap:6px; }
    .chat-name-row input { flex:1; padding:6px 10px; border:1px solid var(--border);
      border-radius:var(--r-md); background:var(--surface); font-size:12px; }
  </style>
</head>
<body>
<main class="rj-wrap" id="view"><p class="mini">Loading…</p></main>

<!-- Banter chat — group chat for everyone with the share link. -->
<button class="chat-fab" id="chat-fab" type="button" hidden>
  💬 Banter <span class="badge" id="chat-unread" hidden>0</span>
</button>
<aside class="chat-panel" id="chat-panel">
  <div class="chat-head">
    <h3>💬 Group banter</h3>
    <button class="x" id="chat-close" type="button" aria-label="Close">×</button>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="chat-empty">Loading messages…</div>
  </div>
  <form class="chat-input" id="chat-form">
    <input type="text" id="chat-body" maxlength="1000" placeholder="Say something…" required autocomplete="off" />
    <button type="submit">Send</button>
  </form>
  <div class="chat-name-row" id="chat-name-row">
    <span>Posting as</span>
    <input type="text" id="chat-name" maxlength="80" placeholder="Your name" />
  </div>
</aside>

<script src="/js/jord.js"></script>
<script>
const esc = JORD.escapeHtml;
const shareCode = location.pathname.split('/').filter(Boolean)[1];
const state = { tournament: null, round: null, course: null, entries: [], me: null, justJoined: null, claimedEntryId: null };

// Per-round "claim": a guest with the share link picks their name from the
// dropdown and we remember which entry is theirs for this device. Keyed by
// round id so a phone shared across multiple games doesn't get crossed up.
function claimKey(roundId) { return 'jord_claim_' + roundId; }
function readClaim(roundId) {
  try { return localStorage.getItem(claimKey(roundId)) || null; } catch { return null; }
}
function writeClaim(roundId, entryId) {
  try { localStorage.setItem(claimKey(roundId), entryId); } catch {}
}
function clearClaim(roundId) {
  try { localStorage.removeItem(claimKey(roundId)); } catch {}
}

function fmtDate(s) {
  if (!s) return 'TBD';
  try { return new Date(s).toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric', year:'numeric' }); }
  catch { return s; }
}
function formatLabel(fmt) {
  // Quick map for the most common formats — the public page doesn't need
  // to load the full formats.js catalog just for this one badge.
  const map = {
    stroke_gross: 'Stroke · Gross',
    stroke_net: 'Stroke · Net',
    stableford: 'Stableford',
    skins: 'Skins',
    match_individual: 'Match Play',
    scramble_4p: '4-person Scramble',
    scramble_2p: '2-person Scramble',
    best_ball_4p: '4-person Best Ball',
    best_ball_2p: '2-person Best Ball',
    foursomes: 'Foursomes',
    greensome: 'Greensome',
  };
  return map[fmt] || fmt.replace(/_/g, ' ');
}

async function load() {
  // Bare-link sanity check before hitting the API. The link generator
  // produces 6-char codes; anything else is almost certainly user error.
  if (!shareCode || shareCode.length < 4) {
    showError("That link doesn't include a share code.", 'Share codes are 6 characters — ask the host to send a fresh link.');
    return;
  }
  try {
    const r = await fetch('/api/round-public/' + encodeURIComponent(shareCode));
    // The server returns JSON in both success and error cases. iOS Safari
    // throws "The string did not match the expected pattern" if the body
    // is HTML (e.g. during deploy when the route isn't live yet) — fall
    // back to a friendly status-based message instead of the raw error.
    let data = null;
    try { data = await r.json(); } catch {}
    if (!r.ok || !data) {
      const status = r.status;
      if (status === 404) return showError('Game not found', 'The host may have deleted the round, or the link is mistyped. Ask them to resend.');
      if (status === 502 || status === 503) return showError('Just a sec…', "Server's coming back online — refresh in 10 seconds.");
      return showError('Could not load the game', `Status ${status}. Try again in a moment.`);
    }
    state.tournament = data.tournament;
    state.round = data.round;
    state.course = data.course;
    state.entries = data.entries || [];
    // Try to load the signed-in user (for the "join as you" prefill).
    try { state.me = await JORD.api('/api/users/me'); } catch {}
    // Rehydrate any prior claim — but only if the entry still exists
    // (creator may have removed/renamed players between visits).
    const prior = readClaim(state.round.id);
    if (prior && state.entries.some(e => e.id === prior)) state.claimedEntryId = prior;
    else if (prior) clearClaim(state.round.id);
    render();
  } catch (e) {
    showError("Couldn't reach the server", 'Check your connection and try again.');
  }
}
function showError(title, sub) {
  document.getElementById('view').innerHTML = `<div style="padding:60px 20px;text-align:center">
    <h1 style="font-family:Playfair Display,serif">${esc(title)}</h1>
    <p style="color:var(--ink-2);margin-top:10px">${esc(sub)}</p>
    <a class="btn btn-ghost" style="margin-top:var(--s-4)" href="/clubhouse">Back to JORD Clubhouse</a>
  </div>`;
}

function render() {
  const t = state.tournament, round = state.round, course = state.course;
  // "Who am I in this game" — preferred order:
  //   1. signed-in user matched to an entry (creator stamped user_id)
  //   2. localStorage claim from a prior visit on this device
  const meEntry =
    (state.me && state.entries.find(e => e.user_id === state.me.id)) ||
    (state.claimedEntryId && state.entries.find(e => e.id === state.claimedEntryId)) ||
    null;
  const youJustJoined = state.justJoined;
  const fieldHasPlayers = state.entries.length > 0;

  document.title = `Join · ${t.name} · JORD Golf`;
  document.getElementById('view').innerHTML = `
    <div class="rj-hero">
      <div class="rj-eyebrow">You're invited to</div>
      <h1 class="rj-title">${esc(t.name)}</h1>
      <div class="rj-meta">
        <span>📅 ${esc(fmtDate(round.round_date))}</span>
        ${course ? `<span>📍 ${esc(course.name)}</span>` : ''}
        <span>🏌 ${esc(formatLabel(t.default_format))}</span>
      </div>
    </div>

    ${youJustJoined ? `<div class="joined-banner">
      <strong>You're in.</strong> Your scorecard is ready below — bookmark this page to find it again on game day.
    </div>` : ''}

    ${meEntry ? renderImInTheGame(meEntry, round) : renderPickOrJoin(round, fieldHasPlayers)}

    <div class="rj-card">
      <h3>Players in this game (${state.entries.length})</h3>
      ${state.entries.length === 0
        ? '<p style="color:var(--ink-3);font-size:14px">Nobody has joined yet — be the first.</p>'
        : `<div class="player-list">${state.entries.map((e, i) => `
            <div class="player-row ${meEntry && e.id === meEntry.id ? 'is-you' : ''}">
              <div class="num">${i + 1}</div>
              <div style="flex:1">
                <div>${esc(e.player_name)}${e.team_name ? ` <span style="font-size:11px;color:var(--ink-3)">· ${esc(e.team_name)}</span>` : ''}</div>
                ${e.course_handicap != null ? `<div class="meta">Course handicap ${e.course_handicap}</div>` : ''}
              </div>
              ${meEntry && e.id === meEntry.id ? '<span style="font-size:11px;color:var(--accent);font-weight:700">YOU</span>' : ''}
            </div>`).join('')}
          </div>`}
    </div>

    <div style="text-align:center;margin-top:var(--s-4)">
      <a class="pill-link" href="/clubhouse" style="font-size:13px;color:var(--ink-3)">← Back to JORD Clubhouse</a>
    </div>
  `;
  wireClaim();
  wireForm();
}

// Once a player has been matched to an entry (either by signed-in user or
// by claim), show the "Open my scorecard" CTA + the option to switch identity
// if they picked the wrong name.
function renderImInTheGame(meEntry, round) {
  const teammates = meEntry.team_id
    ? state.entries.filter(e => e.team_id === meEntry.team_id && e.id !== meEntry.id)
    : [];
  const teamLine = meEntry.team_name
    ? `<div style="margin-top:6px;font-size:13px;color:var(--ink-2)">
         <strong>${esc(meEntry.team_name)}</strong>${teammates.length
           ? ` · with ${teammates.map(t => esc(t.player_name)).join(', ')}` : ''}
       </div>`
    : '';
  return `<div class="rj-card">
    <h3>You're playing as <span style="color:var(--accent)">${esc(meEntry.player_name)}</span></h3>
    ${teamLine}
    <p style="color:var(--ink-2);font-size:14px;margin:var(--s-3) 0">Tap <strong>Open my scorecard</strong> on game day to enter scores hole-by-hole — yours, your team's, and the whole group's. Bookmark this page on your phone for quick access.</p>
    <div class="actions">
      <a class="btn btn-accent btn-lg" href="/scorecard/${esc(round.id)}">Open my scorecard →</a>
      <a class="btn btn-ghost" href="/live/${esc(round.id)}">Live leaderboard</a>
    </div>
    ${state.claimedEntryId ? `<p style="font-size:12px;color:var(--ink-3);text-align:center;margin-top:var(--s-3)">
      Not you? <a href="#" id="clear-claim" style="color:var(--accent);font-weight:600">Pick a different name</a>
    </p>` : ''}
  </div>`;
}

// Two paths for a guest:
//   (a) the host already added them → pick name from dropdown (primary)
//   (b) they're new to the field → type their name (secondary, hidden under a toggle)
function renderPickOrJoin(round, fieldHasPlayers) {
  const claimOptions = state.entries.map(e =>
    `<option value="${esc(e.id)}">${esc(e.player_name)}${e.team_name ? ' — ' + esc(e.team_name) : ''}</option>`
  ).join('');
  const pickHTML = fieldHasPlayers ? `
    <div class="rj-card">
      <h3>Find your name</h3>
      <p style="color:var(--ink-2);font-size:14px;margin-bottom:var(--s-3)">The host already added the field. Pick yourself from the list — we'll remember on this phone.</p>
      <form class="join-form" id="claim-form">
        <div class="field">
          <label>I'm…</label>
          <select id="claim-select" required>
            <option value="">— Pick your name —</option>
            ${claimOptions}
          </select>
        </div>
        <button class="btn btn-accent btn-lg btn-block" type="submit">That's me →</button>
      </form>
    </div>` : '';

  // If the host already populated the field, hide the "new player" form by
  // default — keeping it as a small disclosure stops people from accidentally
  // creating a second copy of themselves.
  const joinHTML = `
    <div class="rj-card">
      <h3>${fieldHasPlayers ? "Not on the list? Add yourself" : 'Join the game'}</h3>
      ${fieldHasPlayers
        ? `<p style="color:var(--ink-2);font-size:14px;margin-bottom:var(--s-3)">Only do this if the host didn't already add you — otherwise pick your name above.</p>`
        : `<p style="color:var(--ink-2);font-size:14px;margin-bottom:var(--s-3)">Add your name to the roster. No account needed — just type your name and you're in.</p>`}
      <form class="join-form" id="join-form">
        <div class="row">
          <div class="field">
            <label>Your name *</label>
            <input type="text" id="f-name" required maxlength="120" autocomplete="name" placeholder="Pat O'Connor" value="${esc(state.me?.name || '')}" />
          </div>
          <div class="field">
            <label>Handicap index (optional)</label>
            <input type="number" id="f-hcp" step="0.1" min="-10" max="54" placeholder="14.2" value="${state.me?.handicap_index || ''}" />
          </div>
        </div>
        <div class="err" id="err"></div>
        <button class="btn btn-accent btn-lg btn-block" type="submit" id="submit">I'm in — join the game →</button>
        ${!state.me ? `<p style="font-size:12px;color:var(--ink-3);text-align:center;margin-top:var(--s-3)">
          Want to track this on your profile? <a href="/login" style="color:var(--accent);font-weight:600">Sign in or create an account</a>.
        </p>` : ''}
      </form>
    </div>`;

  return pickHTML + joinHTML;
}

function wireClaim() {
  const form = document.getElementById('claim-form');
  if (form) {
    form.onsubmit = (ev) => {
      ev.preventDefault();
      const sel = document.getElementById('claim-select');
      const id = sel.value;
      if (!id) return;
      writeClaim(state.round.id, id);
      state.claimedEntryId = id;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  }
  const clear = document.getElementById('clear-claim');
  if (clear) {
    clear.onclick = (ev) => {
      ev.preventDefault();
      clearClaim(state.round.id);
      state.claimedEntryId = null;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  }
}

function wireForm() {
  const form = document.getElementById('join-form');
  if (!form) return;
  form.onsubmit = async (ev) => {
    ev.preventDefault();
    const errBox = document.getElementById('err');
    errBox.classList.remove('is-shown');
    const btn = document.getElementById('submit');
    btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Joining…';
    try {
      const body = {
        name: document.getElementById('f-name').value.trim(),
        handicap_index: document.getElementById('f-hcp').value ? Number(document.getElementById('f-hcp').value) : null,
      };
      // Include the user token in the header if signed in so the server
      // stamps `round_entries.user_id` and the entry shows up on the
      // user's "My games" list.
      const headers = { 'Content-Type': 'application/json' };
      const tok = localStorage.getItem('jord_user_token');
      if (tok) headers['x-user-token'] = tok;
      const r = await fetch('/api/round-public/' + encodeURIComponent(shareCode) + '/join', {
        method: 'POST', headers, body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Could not join');
      state.justJoined = true;
      // Newly-joined guests get auto-claimed for this device so they don't
      // have to find themselves in the dropdown on the next visit.
      if (data && data.entry_id) {
        writeClaim(state.round.id, data.entry_id);
        state.claimedEntryId = data.entry_id;
      }
      await load();
    } catch (e) {
      errBox.textContent = e.message;
      errBox.classList.add('is-shown');
      btn.disabled = false; btn.textContent = orig;
    }
  };
}

// ── Banter chat ────────────────────────────────────────────────────────
// Init runs once load() succeeds (so we know the share code is valid).
// All chat traffic uses the share code, not the tournament id, so guests
// don't need to know internal IDs.
const chat = { messages: [], es: null, open: false, unread: 0, ready: false };

function initBanter() {
  if (chat.ready) return;
  chat.ready = true;
  document.getElementById('chat-fab').hidden = false;
  // Pre-fill the "post as" name from the signed-in user, or from any entry
  // they already claimed in this round (matches by user_id), else blank.
  const meEntry = state.me && state.entries.find(e => e.user_id === state.me.id);
  document.getElementById('chat-name').value =
    state.me?.name || (meEntry?.player_name) || '';
  document.getElementById('chat-fab').onclick = openChat;
  document.getElementById('chat-close').onclick = closeChat;
  document.getElementById('chat-form').onsubmit = sendMessage;
  loadMessages();
  connectBanter();
}

function openChat() {
  chat.open = true;
  chat.unread = 0;
  document.getElementById('chat-panel').classList.add('is-open');
  document.getElementById('chat-fab').hidden = true;
  document.getElementById('chat-unread').hidden = true;
  setTimeout(() => {
    const list = document.getElementById('chat-msgs');
    list.scrollTop = list.scrollHeight;
    document.getElementById('chat-body').focus();
  }, 50);
}
function closeChat() {
  chat.open = false;
  document.getElementById('chat-panel').classList.remove('is-open');
  document.getElementById('chat-fab').hidden = false;
}

async function loadMessages() {
  try {
    const r = await fetch('/api/round-public/' + encodeURIComponent(shareCode) + '/banter?limit=100');
    if (!r.ok) throw new Error('Could not load messages');
    const data = await r.json();
    chat.messages = data.messages || [];
    renderMessages();
  } catch (e) {
    document.getElementById('chat-msgs').innerHTML =
      `<div class="chat-empty" style="color:#a33">${esc(e.message)}</div>`;
  }
}

function renderMessages() {
  const list = document.getElementById('chat-msgs');
  if (!chat.messages.length) {
    list.innerHTML = '<div class="chat-empty">No messages yet — be the first to post. 👋</div>';
    return;
  }
  const myUserId = state.me?.id || null;
  list.innerHTML = chat.messages.map(m => {
    const mine = myUserId && m.sender_user_id === myUserId;
    return `<div class="chat-msg ${mine ? 'is-me' : ''}">
      <div class="from">${esc(m.sender_name)}<span class="time"> · ${fmtChatTime(m.created_at)}</span></div>
      <div class="body">${esc(m.body)}</div>
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

function fmtChatTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    return sameDay
      ? d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' })
      : d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  } catch { return ''; }
}

function connectBanter() {
  // SSE auto-reconnects. Heartbeats every 15s from the server keep the
  // connection alive through proxies.
  if (chat.es) chat.es.close();
  chat.es = new EventSource('/api/round-public/' + encodeURIComponent(shareCode) + '/banter/stream');
  chat.es.onmessage = e => {
    try {
      const m = JSON.parse(e.data);
      // Dedupe: skip if we already have this message id (echoes from our
      // own POST that the optimistic add already inserted).
      if (chat.messages.some(x => x.id === m.id)) return;
      chat.messages.push(m);
      renderMessages();
      if (!chat.open) {
        chat.unread++;
        const badge = document.getElementById('chat-unread');
        badge.textContent = chat.unread;
        badge.hidden = false;
      }
    } catch {}
  };
}

async function sendMessage(ev) {
  ev.preventDefault();
  const bodyInput = document.getElementById('chat-body');
  const nameInput = document.getElementById('chat-name');
  const body = bodyInput.value.trim();
  const senderName = nameInput.value.trim();
  if (!body) return;
  if (!senderName) { nameInput.focus(); return; }
  bodyInput.disabled = true;
  try {
    const headers = { 'Content-Type': 'application/json' };
    const tok = localStorage.getItem('jord_user_token');
    if (tok) headers['x-user-token'] = tok;
    const r = await fetch('/api/round-public/' + encodeURIComponent(shareCode) + '/banter', {
      method: 'POST', headers,
      body: JSON.stringify({ body, sender_name: senderName }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Could not send');
    // Optimistic insert — SSE echo will dedupe via id.
    chat.messages.push(data);
    renderMessages();
    bodyInput.value = '';
  } catch (e) {
    alert(e.message);
  } finally {
    bodyInput.disabled = false;
    bodyInput.focus();
  }
}

// Patch the existing load() to also init the chat once round data is in.
const _origLoad = load;
load = async function() {
  await _origLoad();
  if (state.tournament) initBanter();
};

load();
</script>
