<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Player Registration · JORD Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/jord.css">
<style>
  body { background: var(--bg); }
  .reg-wrap { max-width: 540px; margin: 0 auto; padding: var(--s-4) var(--s-4) var(--s-8); }

  .step-bar { display: flex; align-items: center; gap: 6px; margin-bottom: var(--s-5); }
  .step-pip {
    width: 28px; height: 6px; border-radius: 3px;
    background: var(--border-2); transition: background var(--t-med);
  }
  .step-pip.done { background: var(--primary); }
  .step-pip.active { background: var(--accent); }

  .player-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: var(--r-pill);
    background: var(--primary); color: var(--primary-ink);
    font-size: 13px; font-weight: 700; margin-bottom: var(--s-3);
  }

  .code-row { display: flex; gap: var(--s-2); align-items: flex-end; }
  .code-row .field { flex: 1; margin-bottom: 0; }

  .qr-toggle { font-size: 13px; color: var(--accent); cursor: pointer; margin-top: 6px; display: inline-block; border-bottom: 1px solid rgba(184,136,77,0.3); }
  .qr-area { margin-top: var(--s-3); display: none; }
  .qr-area.is-open { display: block; }

  .players-done {
    display: flex; flex-direction: column; gap: var(--s-2); margin-bottom: var(--s-4);
  }
  .player-chip {
    display: flex; align-items: center; gap: var(--s-3);
    padding: 10px 14px; background: var(--surface-2); border-radius: var(--r-md);
    border: 1px solid var(--border); font-size: 14px;
  }
  .player-chip .code { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }

  .add-more {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border: 2px dashed var(--border-2); border-radius: var(--r-md);
    font-size: 14px; font-weight: 600; color: var(--ink-2); cursor: pointer;
    background: none; width: 100%; text-align: left;
    transition: border-color var(--t-fast), color var(--t-fast);
  }
  .add-more:hover { border-color: var(--accent); color: var(--accent); }
  .add-more:disabled { opacity: 0.4; cursor: not-allowed; }

  .success-card { text-align: center; padding: var(--s-6); }
  .success-icon { font-size: 56px; margin-bottom: var(--s-3); }
  .code-list { display: flex; flex-wrap: wrap; gap: var(--s-2); justify-content: center; margin-top: var(--s-3); }
  .code-pill {
    font-family: var(--font-mono); font-size: 13px; font-weight: 700;
    padding: 6px 12px; background: var(--primary); color: var(--primary-ink);
    border-radius: var(--r-sm);
  }

  .opt-in-box {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 12px 14px; margin-top: var(--s-3);
  }
  .opt-in-box .opt-in-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--ink-2); margin-bottom: 10px;
  }
  .opt-in-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-top: 1px solid var(--border);
    font-size: 13px; line-height: 1.45; cursor: pointer;
  }
  .opt-in-row:first-of-type { border-top: none; padding-top: 0; }
  .opt-in-row input[type="checkbox"] {
    width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px;
    accent-color: var(--primary); cursor: pointer;
  }
  .opt-in-row .opt-in-label { color: var(--ink); }
  .opt-in-row .opt-in-fine { display: block; font-size: 11px; color: var(--ink-2); margin-top: 2px; }
</style>
</head>
<body>

<script src="/js/jord.js"></script>
<script>
(function () {
  var eid = JORD.path(1);
  var eventInfo         = null;
  var MAX               = 4;
  var teamCode          = JORD.qs('team');  /* Team share code — from QR scan or the dropdown pick */
  var existingTeam      = null;  /* Set when teamCode resolves to a real team — triggers the join flow */

  /* ── Bootstrap ── */
  document.addEventListener('DOMContentLoaded', function () {
    JORD.renderTopbar('Player Registration');
    if (!eid) { renderError('No event ID in URL.'); return; }
    loadEvent();
  });

  function loadEvent() {
    renderLoading();
    fetch('/api/events/' + eid + '/info')
      .then(function (r) { return r.json(); })
      .then(function (info) {
        if (info.error) { renderError(info.error); return; }
        eventInfo = info;
        /* Registration is open during setup (pre-tournament) AND active.
           Only an ended tournament closes registration. */
        if (info.status === 'ended') { renderError('This tournament has ended. Registration is closed.'); return; }

        /* If a team code is in the URL, check whether that team has been finalized already.
           If so, switch into "join existing team" mode. */
        if (teamCode) {
          fetch('/api/events/' + eid + '/teams/by-share-code/' + encodeURIComponent(teamCode))
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (team) {
              if (team && team.team_id) existingTeam = team;
              renderStep();
            })
            .catch(function () { renderStep(); });
        } else {
          renderStep();
        }
      })
      .catch(function () { renderError('Could not connect to server. Make sure it is running.'); });
  }

  /* ── Renders ── */
  function getRoot() {
    var r = document.getElementById('root');
    if (!r) { r = document.createElement('div'); r.id = 'root'; r.className = 'reg-wrap'; document.body.appendChild(r); }
    return r;
  }

  function renderLoading() {
    getRoot().innerHTML = '<div class="text-center" style="padding:80px 0"><div class="spinner spinner-lg" style="margin:0 auto"></div><p class="mt-4">Loading tournament…</p></div>';
  }

  function renderError(msg) {
    getRoot().innerHTML = '<div class="empty" style="padding:80px 24px"><div class="empty-icon">⚠️</div><div class="empty-title">Oops</div><p>' + msg + '</p><a href="/admin" class="btn btn-ghost mt-3">← Back to Admin</a></div>';
  }

  /* Generate a 6-character team code */
  function generateTeamCode() {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var code = '';
    for (var i = 0; i < 6; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return code;
  }

  /* Generate QR code using QR server API */
  function generateQRCode(containerId, text) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(text);
    container.innerHTML = '<img src="' + qrUrl + '" style="max-width:200px;border-radius:var(--r-md);border:2px solid var(--border)">';
  }

  function renderStep() {
    var root = getRoot();
    /* A team code (from a scanned QR or the dropdown) that resolved to a real
       team → join flow. Otherwise → start a new team. */
    if (existingTeam && existingTeam.team_id) {
      showAddToExistingTeamForm(root);
      return;
    }
    showNewTeamScreen(root);
  }

  /* ── Popup: drop code already in use ── */
  function showCodeInUsePopup() {
    JORD.modal({
      title: 'Code already in use',
      body: '<p style="font-size:14px;line-height:1.6;margin:0">'
          + 'This code is already in use. Please talk to admin.'
          + '</p>',
    });
  }

  /* ── New-team screen — player 1 sets the team name + their own details ── */
  function showNewTeamScreen(root) {
    root.innerHTML = '';

    /* Header */
    var evHead = document.createElement('div');
    evHead.style.cssText = 'margin-bottom:var(--s-4)';
    var preNote = (eventInfo.status === 'setup')
      ? '<div style="background:rgba(184,136,77,0.12);border:1px solid rgba(184,136,77,0.4);border-radius:var(--r-md);padding:10px 14px;font-size:13px;margin-bottom:var(--s-3);color:var(--ink)">📋 <strong>Pre-registration is open.</strong> Register your team now — you\'ll be ready to submit shots once the tournament starts.</div>'
      : '';
    evHead.innerHTML = '<div class="hero-eyebrow">' + (eventInfo.venue || 'JORD Golf Tournament') + '</div>'
      + '<h2 class="mt-1">' + eventInfo.name + '</h2>'
      + preNote
      + '<p class="text-muted" style="margin-top:4px;font-size:14px">Start your team below — you\'ll get a QR code to share with your teammates.</p>';
    root.appendChild(evHead);

    var form = document.createElement('div');
    form.className = 'card';

    /* Team name — FIRST, set right away */
    var teamField = document.createElement('div');
    teamField.className = 'field';
    teamField.innerHTML = '<label>Team Name</label>'
      + '<p style="font-size:12px;color:var(--ink-2);margin-bottom:8px">Your teammates will see this when they scan your QR code.</p>';
    var teamInput = document.createElement('input');
    teamInput.className = 'input input-lg';
    teamInput.placeholder = 'e.g. The Bogeymen';
    teamInput.maxLength = 60;
    teamField.appendChild(teamInput);
    form.appendChild(teamField);

    var divider = document.createElement('div');
    divider.className = 'divider mt-3 mb-3';
    form.appendChild(divider);

    var badge = document.createElement('div');
    badge.className = 'player-badge';
    badge.textContent = 'Your details';
    form.appendChild(badge);

    /* Drop code + QR scanner */
    var codeGroup = document.createElement('div');
    var codeField = document.createElement('div');
    codeField.className = 'field';
    codeField.innerHTML = '<label>Drop Code</label>';
    var codeInput = document.createElement('input');
    codeInput.className = 'input input-code';
    codeInput.placeholder = 'e.g. ABC123';
    codeInput.maxLength = 12;
    codeInput.autocomplete = 'off';
    codeInput.addEventListener('input', function () {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });
    codeField.appendChild(codeInput);
    codeGroup.appendChild(codeField);

    var qrToggle = document.createElement('span');
    qrToggle.className = 'qr-toggle';
    qrToggle.textContent = '📷 Scan QR code instead';
    var qrArea = document.createElement('div');
    qrArea.className = 'qr-area';
    var scanner = null;
    qrToggle.addEventListener('click', function () {
      qrArea.classList.toggle('is-open');
      if (qrArea.classList.contains('is-open')) {
        qrToggle.textContent = '⌨️ Type code instead';
        if (!scanner) {
          scanner = new JORD.QRScanner(qrArea, function (raw) {
            var code = JORD.extractDropCode(raw);
            if (code) {
              codeInput.value = code;
              scanner.stop(); scanner = null;
              qrArea.classList.remove('is-open');
              qrToggle.textContent = '📷 Scan QR code instead';
            }
          });
          scanner.start().catch(function (e) { JORD.error(e.message); });
        }
      } else {
        qrToggle.textContent = '📷 Scan QR code instead';
        if (scanner) { scanner.stop(); scanner = null; }
      }
    });
    codeGroup.appendChild(qrToggle);
    codeGroup.appendChild(qrArea);
    form.appendChild(codeGroup);

    /* Names */
    var nameGrid = document.createElement('div');
    nameGrid.className = 'field-grid mt-3';
    var firstField = document.createElement('div');
    firstField.className = 'field';
    firstField.innerHTML = '<label>First Name</label>';
    var firstInput = document.createElement('input');
    firstInput.className = 'input'; firstInput.placeholder = 'First';
    firstField.appendChild(firstInput);
    var lastField = document.createElement('div');
    lastField.className = 'field';
    lastField.innerHTML = '<label>Last Name</label>';
    var lastInput = document.createElement('input');
    lastInput.className = 'input'; lastInput.placeholder = 'Last';
    lastField.appendChild(lastInput);
    nameGrid.appendChild(firstField);
    nameGrid.appendChild(lastField);
    form.appendChild(nameGrid);

    /* Email + phone */
    var contactGrid = document.createElement('div');
    contactGrid.className = 'field-grid';
    var emailField = document.createElement('div');
    emailField.className = 'field';
    emailField.innerHTML = '<label>Email <span style="font-weight:400;color:var(--ink-2)">(optional)</span></label>';
    var emailInput = document.createElement('input');
    emailInput.className = 'input'; emailInput.type = 'email'; emailInput.placeholder = 'you@example.com';
    emailField.appendChild(emailInput);
    var phoneField = document.createElement('div');
    phoneField.className = 'field';
    phoneField.innerHTML = '<label>Phone <span style="font-weight:400;color:var(--ink-2)">(optional)</span></label>';
    var phoneInput = document.createElement('input');
    phoneInput.className = 'input'; phoneInput.type = 'tel'; phoneInput.placeholder = '+1 555 000 0000';
    phoneField.appendChild(phoneInput);
    contactGrid.appendChild(emailField);
    contactGrid.appendChild(phoneField);
    form.appendChild(contactGrid);

    /* Marketing opt-ins */
    var optInBox = document.createElement('div');
    optInBox.className = 'opt-in-box';
    optInBox.innerHTML = '<div class="opt-in-title">Stay in the loop</div>';
    var emailOptLabel = document.createElement('label');
    emailOptLabel.className = 'opt-in-row';
    var emailOptCheck = document.createElement('input');
    emailOptCheck.type = 'checkbox';
    emailOptLabel.appendChild(emailOptCheck);
    var emailOptText = document.createElement('span');
    emailOptText.className = 'opt-in-label';
    emailOptText.innerHTML = 'Email me results, future events, and offers from JORD Golf.'
      + '<span class="opt-in-fine">We\'ll never share your email or spam you. Unsubscribe anytime.</span>';
    emailOptLabel.appendChild(emailOptText);
    optInBox.appendChild(emailOptLabel);
    var smsOptLabel = document.createElement('label');
    smsOptLabel.className = 'opt-in-row';
    var smsOptCheck = document.createElement('input');
    smsOptCheck.type = 'checkbox';
    smsOptLabel.appendChild(smsOptCheck);
    var smsOptText = document.createElement('span');
    smsOptText.className = 'opt-in-label';
    smsOptText.innerHTML = 'Text me live updates and results from JORD Golf tournaments.'
      + '<span class="opt-in-fine">Message &amp; data rates may apply. Reply STOP to opt out anytime.</span>';
    smsOptLabel.appendChild(smsOptText);
    optInBox.appendChild(smsOptLabel);
    form.appendChild(optInBox);

    /* Tee box */
    if (eventInfo.tee_boxes && eventInfo.tee_boxes.length > 0) {
      var teeField = document.createElement('div');
      teeField.className = 'field';
      teeField.innerHTML = '<label>Tee Box</label>';
      var teeSelect = document.createElement('select');
      teeSelect.className = 'select';
      eventInfo.tee_boxes.forEach(function (tb) {
        var opt = document.createElement('option');
        opt.value = tb.id;
        opt.textContent = tb.name + (tb.hole_type === 'closest_pin' ? ' (Closest to Pin)' : ' (Longest Drive)');
        teeSelect.appendChild(opt);
      });
      teeField.appendChild(teeSelect);
      form.appendChild(teeField);
    }

    /* Submit */
    var submitBtn = document.createElement('button');
    submitBtn.className = 'btn btn-primary btn-block btn-lg mt-3';
    submitBtn.textContent = 'Create Team →';
    var errEl = document.createElement('div');
    errEl.className = 'text-danger mt-2 small';

    submitBtn.addEventListener('click', function () {
      var teamName = teamInput.value.trim();
      var code  = codeInput.value.trim().toUpperCase();
      var first = firstInput.value.trim();
      var last  = lastInput.value.trim();
      if (!teamName) { errEl.textContent = 'Enter a team name first.'; teamInput.focus(); return; }
      if (!code || code.length < 4) { errEl.textContent = 'Enter a valid drop code (at least 4 characters).'; return; }
      if (!first || !last) { errEl.textContent = 'First and last name are required.'; return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating team…';
      errEl.textContent = '';
      if (scanner) { scanner.stop(); scanner = null; }

      var shareCode = generateTeamCode();
      var teeBoxId = (eventInfo.tee_boxes && eventInfo.tee_boxes.length)
        ? (form.querySelector('select') ? form.querySelector('select').value : null) : null;

      /* Step 1 — register player 1's ball */
      fetch('/api/events/' + eid + '/register-player', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          drop_code: code, first_name: first, last_name: last,
          email: emailInput.value.trim() || null,
          phone: phoneInput.value.trim() || null,
          tee_box_id: teeBoxId, player_index: 1,
          email_opt_in: emailOptCheck.checked, sms_opt_in: smsOptCheck.checked
        })
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) {
          /* Duplicate / already-used code → friendly popup, not just inline text */
          if (/already registered/i.test(data.error)) { showCodeInUsePopup(); }
          else { errEl.textContent = data.error; }
          submitBtn.disabled = false; submitBtn.textContent = 'Create Team →';
          return null;
        }
        /* Step 2 — finalize the team immediately so it exists in the DB
           (teammates can now find it by QR or the dropdown) */
        return fetch('/api/events/' + eid + '/finalize-team', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ team_name: teamName, drop_codes: [code], share_code: shareCode })
        }).then(function (r) { return r.json(); });
      })
      .then(function (data) {
        if (!data) return;
        if (data.error) { errEl.textContent = data.error; submitBtn.disabled = false; submitBtn.textContent = 'Create Team →'; return; }
        var phone = phoneInput.value.trim();
        if (phone) localStorage.setItem('jord_player_phone', phone);
        localStorage.setItem('jord_drop_code', code);
        renderNewTeamSuccess(teamName, data.share_code || shareCode, code, first + ' ' + last);
      })
      .catch(function () {
        errEl.textContent = 'Network error. Check your connection and try again.';
        submitBtn.disabled = false; submitBtn.textContent = 'Create Team →';
      });
    });

    form.appendChild(submitBtn);
    form.appendChild(errEl);
    root.appendChild(form);

    /* ── "Join an existing team" dropdown ── */
    var joinCard = document.createElement('div');
    joinCard.className = 'card mt-4';
    joinCard.innerHTML = '<h3 class="card-title" style="font-size:18px">Joining a team that\'s already registered?</h3>'
      + '<p class="card-sub">Scan your team\'s QR code, or pick the team below.</p>';
    var teamSelect = document.createElement('select');
    teamSelect.className = 'select';
    teamSelect.innerHTML = '<option value="">— loading teams… —</option>';
    teamSelect.addEventListener('change', function () {
      if (!teamSelect.value) return;
      teamCode = teamSelect.value;
      loadExistingTeam();
    });
    joinCard.appendChild(teamSelect);
    root.appendChild(joinCard);
    loadTeamsDropdown(teamSelect);
  }

  /* Fetch the event's teams and fill the dropdown */
  function loadTeamsDropdown(selectEl) {
    fetch('/api/events/' + eid + '/teams')
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (teams) {
        if (!teams || !teams.length) {
          selectEl.innerHTML = '<option value="">No teams registered yet — be the first!</option>';
          selectEl.disabled = true;
          return;
        }
        selectEl.innerHTML = '<option value="">— pick your team —</option>';
        teams.forEach(function (t) {
          var opt = document.createElement('option');
          opt.value = t.share_code;
          var full = t.member_count >= MAX;
          opt.textContent = t.team_name + ' (' + t.member_count + '/' + MAX + ')' + (full ? ' — full' : '');
          if (full) opt.disabled = true;
          selectEl.appendChild(opt);
        });
      })
      .catch(function () {
        selectEl.innerHTML = '<option value="">Could not load teams</option>';
        selectEl.disabled = true;
      });
  }

  /* Resolve the current teamCode to a real team, then re-render into the join flow */
  function loadExistingTeam() {
    renderLoading();
    fetch('/api/events/' + eid + '/teams/by-share-code/' + encodeURIComponent(teamCode))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (team) {
        if (team && team.team_id) { existingTeam = team; }
        else { existingTeam = null; teamCode = ''; }
        renderStep();
      })
      .catch(function () { existingTeam = null; renderStep(); });
  }

  /* ── Add-to-existing-team flow ── */
  /* Triggered when the URL ?team= matches a team that has already been finalized.
     Single-player form that posts to /teams/by-share-code/:code/add-player. */
  function showAddToExistingTeamForm(root) {
    root.innerHTML = '';

    var memberCount = existingTeam.member_count || 0;
    var seatsLeft   = Math.max(0, 4 - memberCount);

    /* Header */
    var evHead = document.createElement('div');
    evHead.style.cssText = 'margin-bottom:var(--s-4)';
    evHead.innerHTML = '<div class="hero-eyebrow">' + (eventInfo.venue || 'JORD Golf Tournament') + '</div>'
      + '<h2 class="mt-1">' + eventInfo.name + '</h2>';
    root.appendChild(evHead);

    /* Team banner */
    var banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(190,255,58,0.12);border:1px solid rgba(190,255,58,0.45);border-radius:var(--r-md);padding:14px 18px;margin-bottom:var(--s-4)';
    banner.innerHTML = '<div style="font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700">Joining team</div>'
      + '<div style="font-family:var(--font-display);font-size:24px;font-weight:700;margin-bottom:2px">' + existingTeam.team_name + '</div>'
      + '<div style="font-size:13px;color:var(--ink-2)">' + memberCount + ' player' + (memberCount === 1 ? '' : 's') + ' already on this team · ' + seatsLeft + ' spot' + (seatsLeft === 1 ? '' : 's') + ' left</div>';
    root.appendChild(banner);

    /* Team full? Show message and stop */
    if (seatsLeft <= 0) {
      var full = document.createElement('div');
      full.className = 'card';
      full.innerHTML = '<div style="font-size:48px;text-align:center;margin-bottom:var(--s-3)">⛳</div>'
        + '<h3 style="text-align:center;margin-bottom:var(--s-2)">Team is full</h3>'
        + '<p style="text-align:center;color:var(--ink-2);font-size:14px">' + existingTeam.team_name + ' already has 4 players. Talk to the tournament admin if you need to swap someone out.</p>';
      root.appendChild(full);
      return;
    }

    /* Existing members list */
    if (existingTeam.members && existingTeam.members.length) {
      var membersCard = document.createElement('div');
      membersCard.className = 'players-done';
      existingTeam.members.forEach(function (m) {
        var chip = document.createElement('div');
        chip.className = 'player-chip';
        var name = (m.first_name || '') + ' ' + (m.last_name || '');
        name = name.trim() || '(no name yet)';
        chip.innerHTML = '<span style="font-size:18px">✅</span>'
          + '<span><strong>' + name + '</strong></span>'
          + '<span class="code">' + m.drop_code + '</span>';
        membersCard.appendChild(chip);
      });
      root.appendChild(membersCard);
    }

    /* Form */
    var form = document.createElement('div');
    form.className = 'card';

    var badge = document.createElement('div');
    badge.className = 'player-badge';
    badge.textContent = 'Add yourself';
    form.appendChild(badge);

    /* Drop code */
    var codeField = document.createElement('div');
    codeField.className = 'field';
    codeField.innerHTML = '<label>Drop Code</label>';
    var codeInput = document.createElement('input');
    codeInput.className = 'input input-code';
    codeInput.placeholder = 'e.g. ABC123';
    codeInput.maxLength = 12;
    codeInput.autocomplete = 'off';
    codeInput.addEventListener('input', function () {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });
    codeField.appendChild(codeInput);
    form.appendChild(codeField);

    /* Names */
    var nameGrid = document.createElement('div');
    nameGrid.className = 'field-grid mt-3';
    var firstField = document.createElement('div');
    firstField.className = 'field';
    firstField.innerHTML = '<label>First Name</label>';
    var firstInput = document.createElement('input');
    firstInput.className = 'input';
    firstInput.placeholder = 'First';
    firstField.appendChild(firstInput);
    var lastField = document.createElement('div');
    lastField.className = 'field';
    lastField.innerHTML = '<label>Last Name</label>';
    var lastInput = document.createElement('input');
    lastInput.className = 'input';
    lastInput.placeholder = 'Last';
    lastField.appendChild(lastInput);
    nameGrid.appendChild(firstField);
    nameGrid.appendChild(lastField);
    form.appendChild(nameGrid);

    /* Contact */
    var contactGrid = document.createElement('div');
    contactGrid.className = 'field-grid mt-3';
    var emailField = document.createElement('div');
    emailField.className = 'field';
    emailField.innerHTML = '<label>Email <span style="color:var(--ink-3);font-weight:400">(optional)</span></label>';
    var emailInput = document.createElement('input');
    emailInput.className = 'input';
    emailInput.type = 'email';
    emailInput.placeholder = 'you@example.com';
    emailField.appendChild(emailInput);
    var phoneField = document.createElement('div');
    phoneField.className = 'field';
    phoneField.innerHTML = '<label>Phone <span style="color:var(--ink-3);font-weight:400">(optional)</span></label>';
    var phoneInput = document.createElement('input');
    phoneInput.className = 'input';
    phoneInput.type = 'tel';
    phoneInput.placeholder = '(555) 123-4567';
    phoneField.appendChild(phoneInput);
    contactGrid.appendChild(emailField);
    contactGrid.appendChild(phoneField);
    form.appendChild(contactGrid);

    /* Submit */
    var submitBtn = document.createElement('button');
    submitBtn.className = 'btn btn-primary btn-block mt-4';
    submitBtn.textContent = 'Join the team';
    var errEl = document.createElement('div');
    errEl.className = 'text-danger mt-2 small';

    submitBtn.addEventListener('click', function () {
      var code  = codeInput.value.trim().toUpperCase();
      var first = firstInput.value.trim();
      var last  = lastInput.value.trim();
      if (!code || code.length < 4) { errEl.textContent = 'Enter a valid drop code (at least 4 characters).'; return; }
      if (!first || !last) { errEl.textContent = 'First and last name are required.'; return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining…';
      errEl.textContent = '';

      fetch('/api/events/' + eid + '/teams/by-share-code/' + encodeURIComponent(teamCode) + '/add-player', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          drop_code:  code,
          first_name: first,
          last_name:  last,
          email:      emailInput.value.trim() || null,
          phone:      phoneInput.value.trim() || null
        })
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) {
          /* Duplicate / already-used code → friendly popup */
          if (/already registered/i.test(data.error)) { showCodeInUsePopup(); }
          else { errEl.textContent = data.error; }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join the team';
          return;
        }
        if (phoneInput.value.trim()) localStorage.setItem('jord_player_phone', phoneInput.value.trim());
        localStorage.setItem('jord_drop_code', code);
        renderJoinSuccess(first + ' ' + last, code, existingTeam.team_name);
      })
      .catch(function () {
        errEl.textContent = 'Network error. Try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join the team';
      });
    });

    form.appendChild(submitBtn);
    form.appendChild(errEl);
    root.appendChild(form);
  }

  function renderJoinSuccess(playerName, dropCode, teamName) {
    var root = getRoot();
    root.innerHTML = '';
    var card = document.createElement('div');
    card.className = 'card success-card';
    card.innerHTML = '<div class="success-icon">🏆</div>'
      + '<h2>Welcome, ' + playerName + '!</h2>'
      + '<p class="text-muted mt-2">You\'re on team <strong>' + teamName + '</strong></p>'
      + '<div class="divider mt-4 mb-4"></div>'
      + '<p style="font-size:14px;font-weight:600;margin-bottom:8px">Your drop code:</p>'
      + '<div class="code-list"><div class="code-pill">' + dropCode + '</div></div>'
      + '<p class="text-muted mt-4" style="font-size:13px">Keep your drop code safe — you\'ll need it on course to submit your shot.</p>'
      + '<a href="/team/' + eid + '/' + teamCode + '" class="btn btn-ghost btn-block mt-4">👥 View Team Page</a>'
      + '<a href="/leaderboard/' + eid + '" class="btn btn-primary btn-block mt-2" target="_blank">📺 View Live Leaderboard</a>';
    root.appendChild(card);
  }

  /* ── Success screen for player 1 — team created, show QR for teammates ── */
  function renderNewTeamSuccess(teamName, shareCode, dropCode, playerName) {
    var root = getRoot();
    root.innerHTML = '';
    var card = document.createElement('div');
    card.className = 'card success-card';
    card.innerHTML = '<div class="success-icon">🏆</div>'
      + '<h2>' + teamName + '</h2>'
      + '<p class="text-muted mt-2">Team created — you\'re registered for <strong>' + (eventInfo.name || 'the tournament') + '</strong>!</p>'
      + '<div class="divider mt-4 mb-4"></div>'
      /* Team QR — teammates scan this to join; they will see the team name */
      + '<div style="font-size:11px;color:var(--ink-2);text-transform:uppercase;font-weight:700;letter-spacing:.06em;margin-bottom:6px">Share with your teammates</div>'
      + '<div style="font-family:var(--font-mono);font-size:26px;font-weight:700;letter-spacing:2px;margin-bottom:var(--s-2)">' + shareCode + '</div>'
      + '<div id="qr-container" style="display:flex;justify-content:center;margin:var(--s-2) 0"></div>'
      + '<p style="font-size:12px;color:var(--ink-2);margin-bottom:var(--s-3)">Teammates scan this QR (or pick <strong>' + teamName + '</strong> from the team list) to join.</p>'
      + '<div class="divider mt-3 mb-3"></div>'
      + '<div style="background:var(--surface-2);border-radius:var(--r-md);padding:14px 16px;margin-bottom:var(--s-3);border:1px solid var(--accent)">'
      + '<p style="font-size:14px;font-weight:600;margin:0 0 6px;color:var(--accent)">📱 Keep this tab open</p>'
      + '<p style="font-size:13px;margin:0;color:var(--ink-2);line-height:1.5">When you reach your ball on course, tap the button below to capture your GPS location.</p>'
      + '</div>'
      + '<a href="/scan/' + dropCode + '" class="btn btn-primary btn-block btn-lg mt-2" style="font-size:16px;padding:16px">📍 Get My Ball Location Now</a>'
      + '<p style="font-size:12px;color:var(--ink-2);text-align:center;margin-top:var(--s-3)">Your drop code:</p>'
      + '<div class="code-list"><div class="code-pill">' + dropCode + '</div></div>'
      + '<a href="/team/' + eid + '/' + shareCode + '" class="btn btn-ghost btn-block mt-4" style="font-size:13px">👥 Team Page · invite more players</a>'
      + '<a href="/leaderboard/' + eid + '" class="btn btn-ghost btn-block mt-2" target="_blank" style="font-size:13px">📺 View Live Leaderboard</a>';
    root.appendChild(card);

    /* QR encodes the join URL — teammates land in the join flow and see the team name */
    var teamUrl = window.location.origin + '/register/' + eid + '?team=' + shareCode;
    generateQRCode('qr-container', teamUrl);
  }
})();
</script>
</body>
</html>
